<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATO 故事书跳转器</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260614structure1" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">ATO</div>
        <div>
          <h1>故事书跳转器</h1>
          <p id="bookMeta">正在载入故事索引</p>
        </div>
      </div>
      <a class="home-link" href="../index.html">返回主控台</a>
      <a class="home-link" href="../record/index.html" style="margin-top:-12px;margin-bottom:4px;font-size:13px;border-color:#c89742;color:#ffd480;background:#17140f;">阿尔戈号记录表</a>
      <a class="home-link" href="../hero/index.html" style="margin-top:0;margin-bottom:18px;font-size:13px;border-color:#c89742;color:#ffd480;background:#17140f;">英雄记录表</a>

      <label class="field">
        <span>故事书</span>
        <select id="bookSelect"></select>
      </label>

      <label class="field">
        <span>模块 / 大章</span>
        <select id="chapterSelect"></select>
      </label>

      <label class="field">
        <span>入口层 / 小章节</span>
        <select id="encounterSelect"></select>
      </label>

      <label class="field">
        <span>段落号或关键词</span>
        <input id="searchInput" autocomplete="off" placeholder="例如 0001、M009、21、尼采超人" />
      </label>

      <div class="quick-row">
        <button id="goButton" type="button">读取</button>
        <button id="backButton" type="button" title="返回上一段">返回</button>
      </div>

      <div class="memory-tools">
        <button id="rememberButton" type="button">记下段落</button>
      </div>

      <div id="chapterSummary" class="chapter-summary"></div>

      <section class="memory-panel" aria-label="已记下段落">
        <div class="memory-title">已记下段落</div>
        <div id="memoryList" class="memory-list"></div>
      </section>

      <nav id="resultList" class="result-list" aria-label="搜索结果"></nav>
    </aside>

    <main class="reader">
      <header class="reader-head">
        <div>
          <div id="sectionLabel" class="section-label">选择一个模块</div>
          <h2 id="entryTitle">选择模块或输入段落号后开始阅读</h2>
        </div>
        <div class="reader-actions">
          <button id="ttsButton" type="button" class="tts-btn" title="朗读">朗读</button>
          <select id="ttsSpeed" class="tts-select">
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2x</option>
          </select>
          <select id="ttsVoice" class="tts-select"></select>
          <div id="entryBadge" class="entry-badge">----</div>
        </div>
      </header>

      <article id="storyText" class="story-text">
        <p>左侧先选择故事书、模块和入口层，再输入段落号。正文里的段落号会按当前上下文优先跳转。</p>
      </article>

      <footer class="reader-foot">
        <div id="linkPanel" class="link-panel"></div>
      </footer>
    </main>

    <aside class="side-panels" id="sidePanels">
      <div class="side-panel-tabs">
        <button class="side-panel-tab active" data-panel="record">记录表</button>
        <button class="side-panel-tab" data-panel="hero">英雄</button>
        <button class="side-panel-tab" data-panel="dashboard">主控台</button>
      </div>
      <iframe id="sidePanelRecord" class="side-panel-frame active" src="../record/index.html"></iframe>
      <iframe id="sidePanelHero" class="side-panel-frame" src="../hero/index.html"></iframe>
      <iframe id="sidePanelDashboard" class="side-panel-frame" src="../index.html"></iframe>
    </aside>

    <script src="../page-focus-router.js?v=20260607a"></script>
    <script src="./data/storybook-data.js?v=20260614structure1"></script>
    <script src="./data/entity-index.js?v=20260614structure1"></script>
    <script src="./audio-packs/audio/manifest.js?v=20260614structure1"></script>
    <script src="./assets/app.js?v=20260614structure1"></script>
    <script>
      document.querySelectorAll(".side-panel-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".side-panel-tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".side-panel-frame").forEach(f => f.classList.remove("active"));
          tab.classList.add("active");
          const panelMap = { record: "sidePanelRecord", hero: "sidePanelHero", dashboard: "sidePanelDashboard" };
          document.getElementById(panelMap[tab.dataset.panel])?.classList.add("active");
        });
      });
    </script>
  </body>
</html>
