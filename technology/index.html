<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATO 科技树</title>
<style>
:root {
  color-scheme: light;
  --ink: #1d2328;
  --muted: #66727d;
  --line: #d6dde3;
  --surface: #f7f8f5;
  --panel: #ffffff;
  --accent: #b44b34;
  --accent-2: #1d6f78;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--surface);
  color: var(--ink);
}
.app {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  min-height: 100vh;
}
.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 5;
}
.tabs { display: flex; gap: 8px; align-items: center; }
.tab {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 12px;
  font-weight: 650;
  cursor: pointer;
}
.tab.active {
  border-color: var(--accent-2);
  color: #fff;
  background: var(--accent-2);
}
.tools { display: flex; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; }
.tool-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 10px;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
}
.tool-btn:hover { border-color: var(--accent-2); color: var(--accent-2); }
.tool-btn.active {
  border-color: var(--accent-2);
  background: var(--accent-2);
  color: #fff;
}
.tool-btn.return-main {
  border-color: var(--accent-2);
  background: var(--accent-2);
  color: #fff;
}
.tool-btn.return-main:hover {
  background: #15575f;
  color: #fff;
}
.search {
  width: 220px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 10px;
  font: inherit;
  background: #fff;
}
.cycle-select,
.account-select {
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 10px;
  font: inherit;
  background: #fff;
  color: var(--ink);
}
.account-select { max-width: 150px; }
.viewport {
  min-height: 0;
  overflow: auto;
  padding: 18px;
}
.tree-wrap {
  position: relative;
  width: min(1400px, 100%);
  margin: 0 auto;
  background: #fff;
  border: 1px solid var(--line);
  box-shadow: 0 10px 30px rgba(27, 36, 44, .08);
}
.tree-img {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
}
.node {
  position: absolute;
  border: 2px solid transparent;
  background: transparent;
  border-radius: 0;
  cursor: pointer;
  min-width: 14px;
  min-height: 14px;
  transition: border-color .12s ease, background .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.node-label {
  display: none;
  pointer-events: none;
}
.tree-wrap.zh-labels .node {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px 5px;
  background: #fff;
  color: var(--ink);
  overflow: hidden;
  text-align: center;
  box-shadow: inset 0 0 0 1px #111;
}
.tree-wrap.zh-labels .node-label {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  width: 100%;
  overflow: hidden;
  font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
  font-size: 12px;
  font-weight: 850;
  line-height: 1.08;
  letter-spacing: .02em;
  text-shadow: 0 1px 0 rgba(255, 255, 255, .62);
}
.tree-wrap.zh-labels .node.unlocked {
  background: #fff;
  box-shadow: inset 0 0 0 1px #111, 0 0 0 1px rgba(30, 138, 85, .18);
}
.tree-wrap.zh-labels .node.unlockable {
  background: #fff;
  box-shadow: inset 0 0 0 1px #111, 0 0 0 1px rgba(216, 163, 25, .2);
}
.node::after {
  display: none;
}
.node:hover {
  background: rgba(29, 35, 40, .04);
}
.node.unlocked {
  border-color: #1e8a55;
  background: rgba(30, 138, 85, .08);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .72), 0 0 0 1px rgba(30, 138, 85, .18);
}
.node.unlockable {
  border-color: #d8a319;
  background: rgba(216, 163, 25, .08);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .72), 0 0 0 1px rgba(216, 163, 25, .2);
}
.node.unlocked:hover,
.node.unlocked.active {
  background: rgba(30, 138, 85, .14);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .8), 0 0 0 3px rgba(30, 138, 85, .2);
}
.node.unlockable:hover,
.node.unlockable.active {
  background: rgba(216, 163, 25, .16);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .8), 0 0 0 3px rgba(216, 163, 25, .24);
}
.node.active:not(.unlocked):not(.unlockable) {
  background: rgba(29, 35, 40, .05);
}
.tree-wrap.zh-labels .node:hover,
.tree-wrap.zh-labels .node.active:not(.unlocked):not(.unlockable) {
  background: #fff;
}
.tree-wrap.zh-labels .node.unlocked:hover,
.tree-wrap.zh-labels .node.unlocked.active {
  background: #fff;
  box-shadow: inset 0 0 0 1px #111, 0 0 0 3px rgba(30, 138, 85, .2);
}
.tree-wrap.zh-labels .node.unlockable:hover,
.tree-wrap.zh-labels .node.unlockable.active {
  background: #fff;
  box-shadow: inset 0 0 0 1px #111, 0 0 0 3px rgba(216, 163, 25, .24);
}
.node.filtered { opacity: .16; pointer-events: none; }
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 2px 7px;
  border-radius: 999px;
  background: #eef3f4;
  color: #31575d;
  font-size: 12px;
  font-weight: 700;
}
.unlocked-page {
  width: min(1440px, 100%);
  margin: 0 auto;
  --unlocked-card-short-edge: 156px;
}
.unlocked-columns {
  display: grid;
  gap: 14px;
  align-items: start;
}
.unlocked-column {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 10px;
}
.unlocked-column > summary {
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 850;
  color: var(--ink);
  padding: 2px 2px 8px;
}
.unlocked-column[open] > summary { margin-bottom: 2px; }
.unlocked-list.big {
  grid-template-columns: repeat(auto-fill, minmax(260px, max-content));
  gap: 14px;
}
.unlocked-list.mixed {
  grid-template-columns: repeat(auto-fill, 174px);
}
.unlocked-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, 174px);
  gap: 14px 10px;
  align-items: start;
  justify-content: start;
}
.unlocked-list.big .unlocked-item {
  width: 100%;
}
.unlocked-item {
  border: 0;
  background: transparent;
  color: var(--ink);
  border-radius: 6px;
  padding: 0;
  font: inherit;
  font-size: 12px;
  font-weight: 750;
  text-align: center;
  cursor: pointer;
  min-width: 0;
}
.unlocked-item:hover {
  color: #1e6647;
}
.unlocked-item.important .unlocked-thumb,
.unlocked-item.important .unlocked-thumb-rotated,
.unlocked-item.important .unlocked-thumb-img {
  outline: 3px solid #268058;
  outline-offset: 3px;
}
.unlocked-empty {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
  padding: 12px 0;
}
.unlocked-thumb {
  margin: 0 auto;
  background-repeat: no-repeat;
  background-color: #e9ecef;
  border-radius: 4px;
  box-shadow: 0 2px 7px rgba(0,0,0,.16);
}
.unlocked-thumb-rotated {
  margin: 0 auto;
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 2px 7px rgba(0,0,0,.16);
}
.unlocked-thumb-rotated .unlocked-thumb {
  margin: 0;
  box-shadow: none;
}
.unlocked-thumb-img {
  display: block;
  width: var(--unlocked-card-short-edge);
  max-width: 100%;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 2px 7px rgba(0,0,0,.16);
  margin: 0 auto;
}
.unlocked-thumb-img.big {
  width: auto;
  height: var(--unlocked-card-short-edge);
  max-width: 100%;
}
.unlocked-thumb-img.small.landscape {
  width: auto;
  height: var(--unlocked-card-short-edge);
}
.unlocked-thumb-img.small.portrait {
  width: var(--unlocked-card-short-edge);
}
.unlocked-name {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.unlocked-cycle {
  display: block;
  color: var(--muted);
  font-size: 11px;
  margin-top: 2px;
}
.category-pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 8px;
  background: #eef3f4;
  color: #31575d;
  font-size: 12px;
  font-weight: 800;
}
.category-pill.battle {
  background: #f6e8e3;
  color: #8f3e2b;
}
.empty {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.55;
  padding: 16px 2px;
}
.card-block + .card-block { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--line); }
.card-name { font-size: 20px; line-height: 1.15; font-weight: 850; margin: 0 0 10px; }
.card-previews {
  display: grid;
  gap: 12px;
  align-items: start;
}
.card-previews.side-by-side {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.card-previews.stacked {
  grid-template-columns: 1fr;
}
.meta { display: grid; grid-template-columns: 96px 1fr; gap: 5px 8px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.meta b { color: var(--ink); font-weight: 700; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
.tag { border-radius: 999px; background: #f2eee5; color: #74531c; padding: 3px 7px; font-size: 12px; font-weight: 700; }
.preview-frame {
  width: 100%;
  background: #f1f3f4;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  overflow: hidden;
  margin-top: 10px;
}
.preview-frame.landscape {
  padding: 12px;
}
.preview-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .04em;
  margin: 0 0 8px;
}
.card-preview {
  margin: 0 auto;
  background-repeat: no-repeat;
  box-shadow: 0 5px 15px rgba(0,0,0,.18);
  border-radius: 4px;
}
.card-preview-rotated {
  margin: 0 auto;
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 5px 15px rgba(0,0,0,.18);
}
.card-preview-rotated .card-preview {
  margin: 0;
  box-shadow: none;
}
.card-preview-img {
  display: block;
  width: min(100%, 300px);
  height: auto;
  margin: 0 auto;
  box-shadow: 0 5px 15px rgba(0,0,0,.18);
  border-radius: 4px;
}
.small-note { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 10px; }
.modal-backdrop {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 40;
  background: rgba(16, 24, 28, .72);
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.unlocked-modal {
  width: min(980px, 96vw);
  max-height: 94vh;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 14px;
  background: #fff;
  border-radius: 10px;
  padding: 14px;
  box-shadow: 0 18px 50px rgba(0,0,0,.35);
}
.unlocked-modal-image {
  min-height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  border-radius: 8px;
  background: #f1f3f4;
  padding: 12px;
}
.unlocked-modal-panel {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.unlocked-modal-title {
  font-size: 20px;
  font-weight: 900;
  line-height: 1.16;
  margin-bottom: 6px;
}
.unlocked-modal-meta {
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 14px;
}
.modal-tech-links {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.modal-tech-column {
  border: 1px solid var(--line);
  background: #fbfaf7;
  padding: 10px;
  min-width: 0;
}
.modal-tech-column h3 {
  margin: 0 0 8px;
  font-size: 13px;
  font-weight: 900;
  color: var(--ink);
}
.modal-tech-list {
  display: grid;
  gap: 6px;
}
.modal-tech-or-group {
  display: grid;
  gap: 6px;
  margin-top: 8px;
}
.modal-tech-or-label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.modal-tech-item {
  display: block;
  border: 1px solid rgba(32, 38, 41, .12);
  background: #fff;
  color: var(--ink);
  font-size: 12px;
  line-height: 1.25;
  padding: 6px 7px;
  text-align: left;
  width: 100%;
}
button.modal-tech-item {
  cursor: pointer;
  font: inherit;
}
button.modal-tech-item:hover {
  border-color: var(--accent-2);
  box-shadow: 0 2px 8px rgba(49, 87, 93, .14);
}
.modal-tech-item.met {
  border-color: rgba(30, 138, 85, .45);
  background: #eef8f2;
}
.modal-tech-item.missing {
  border-color: rgba(216, 163, 25, .45);
  background: #fff8e5;
}
.modal-tech-empty {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.modal-tech-conditions {
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
  margin-top: 8px;
  padding-top: 8px;
}
.modal-actions {
  display: grid;
  gap: 8px;
  margin-top: auto;
}
.modal-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 7px;
  padding: 10px 12px;
  font: inherit;
  font-weight: 800;
  cursor: pointer;
}
.modal-btn.primary {
  border-color: #268058;
  background: #268058;
  color: #fff;
}
.modal-btn.warn {
  border-color: #b7791f;
  color: #8a5a14;
}
.modal-btn.hidden {
  display: none;
}
.modal-card-list {
  width: 100%;
  display: grid;
  gap: 14px;
}
.modal-card-img {
  display: block;
  max-width: min(100%, 760px);
  max-height: 76vh;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
}
.modal-card-crop {
  background-repeat: no-repeat;
  border-radius: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
}
.modal-card-rotated {
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
}
.modal-card-rotated .modal-card-crop {
  box-shadow: none;
}
/* Gear Production Tab */
.gear-page {
  width: min(1200px, 100%);
  height: calc(100dvh - 92px);
  min-height: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.gear-search-hint { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
.gear-filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 16px;
  padding: 9px 12px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}
.gear-filter-option {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--ink);
  font-size: 12px;
  font-weight: 750;
  cursor: pointer;
  user-select: none;
}
.gear-filter-option input { margin: 0; accent-color: var(--accent); }
.gear-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
  gap: 14px;
  align-items: stretch;
  flex: 1;
  min-height: 0;
}
.gear-content {
  min-height: 0;
  overflow: auto;
  padding-right: 2px;
}
.gear-resource-sidebar {
  position: sticky;
  top: 0;
  align-self: start;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 12px;
  max-height: 100%;
  overflow: auto;
}
.gear-resource-title {
  font-size: 13px;
  font-weight: 850;
  margin-bottom: 8px;
}
.gear-resource-meta {
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 10px;
}
.gear-resource-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.gear-resource-row {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) auto auto auto;
  gap: 6px;
  align-items: center;
  padding: 6px 8px;
  border-radius: 6px;
  background: #f7f9fa;
  font-size: 12px;
}
.gear-resource-btn {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 0;
  background: #fff;
  color: var(--ink);
  font-size: 14px;
  font-weight: 900;
  line-height: 1;
  cursor: pointer;
}
.gear-resource-btn:hover {
  border-color: var(--accent-2);
  color: var(--accent-2);
}
.gear-resource-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  object-fit: contain;
  background: #fff;
  border: 1px solid #e3e8eb;
}
.gear-resource-name {
  min-width: 0;
  overflow-wrap: anywhere;
  color: var(--ink);
  font-weight: 700;
}
.gear-resource-value {
  color: #0d6274;
  font-weight: 850;
}
.gear-resource-empty {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.4;
}
.gear-group { border: 1px solid var(--line); border-radius: 8px; background: #fff; margin-bottom: 14px; }
.gear-group-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer; user-select: none;
}
.gear-group-header:hover { background: #f9fafb; }
.gear-group-name { font-size: 14px; font-weight: 850; flex: 1; }
button.gear-group-name {
  padding: 0;
  border: 0;
  background: transparent;
  color: inherit;
  text-align: left;
  cursor: pointer;
  font: inherit;
}
button.gear-group-name:hover {
  color: #0d6274;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.gear-group-count { font-size: 12px; color: var(--muted); font-weight: 700; }
.gear-group-chevron { color: var(--muted); transition: transform .15s; font-size: 12px; }
.gear-group.collapsed .gear-group-chevron { transform: rotate(-90deg); }
.gear-group.collapsed .gear-items { display: none; }
.gear-items {
  padding: 4px 14px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.gear-item {
  display: flex; flex-direction: column;
  padding: 10px;
  border: 1px solid #eef1f3; border-radius: 8px;
  background: #fafbfc;
  min-width: 0;
  position: relative;
}
.gear-item:hover { border-color: var(--accent-2); background: #f4fafb; }
.gear-card-thumb {
  width: 100%;
  aspect-ratio: 63 / 88;
  padding: 0;
  border-radius: 6px;
  background: #edf1f3;
  border: 1px solid #dde5ea;
  overflow: hidden;
  cursor: pointer;
  margin-bottom: 8px;
}
.gear-card-thumb img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #fff;
}
.gear-card-thumb.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  color: #8a98a4;
  font-size: 12px;
  font-weight: 800;
  cursor: default;
}
.gear-card-thumb.empty .empty-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #f6e8e3;
  color: #8f3e2b;
  font-size: 11px;
}
.gear-item-main { min-width: 0; }
.gear-item-main {
  position: relative;
  z-index: 1;
}
.gear-item-name {
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 6px;
  line-height: 1.25;
  position: relative;
  z-index: 2;
}

<script>

const GEAR_PRODUCTION_URL = 'ato_gear_production.json';
const GEAR_CARD_IMAGES_URL = 'gear_card_images.json';
const GEAR_PART_LABELS_URL = 'gear_part_labels.json';

const RESOURCE_NAMES_ZH = {
  ARMAMENT: '军备', RAW_AMBROSIA: '神浆原液', MUSCLE_CLUSTER: '肌肉簇',
  TRIREME: '船材', MONUMENT: '石筑', CALCIFIED_KNUCKLE_BONE: '钙化指节骨',
  FLESHY_MANTLE: '血肉块', INFUSED_MECHANISM: '浸液机件', ANCIENT_SHELL: '远古贝壳',
  GROTESQUE_BEAK: '怪异喙片', POWDERED_MATTER: '粉化奇物',

  ICARIAN_FEATHER: '伊卡洛斯之羽', WRITHING_TENTACLE: '扭动触手',

const TITAN_NAMES_ZH = {
  'tt_earthshaker': '撼地者',
  'tt_mazerunner': '迷宫疾行者',
  'tt_plogicbreaker': '破逻辑者',
  'tt_warkeeper': '守战者',
  'tt_firestarter': '燃火者',
  'tt_pabysswatcher': '深渊凝望者',
  'tt_shadowdancer': '影舞者',
  'tt_fatebound': '命运束缚者',
  'tt_chronoking': '时光之王',
  'tt_helldiver': '潜渊者',
  'tt_trespasser': '越界者',
  'tt_executioner': '行刑者',
  'tt_feareater': '无惧者',
  'tt_lunarlander': '原型登月者',
  'tt_messianic': '弥赛亚',
};

let gearProductionData = null;
let gearCardImages = {};
let gearPartLabels = {};

async function loadGearProductionData() {
  try {
    const productionResponse = await fetch(GEAR_PRODUCTION_URL, { cache: 'no-cache' });
    if (!productionResponse.ok) throw new Error('HTTP ' + productionResponse.status);
    gearProductionData = await productionResponse.json();
  } catch (e) {
    console.warn('Failed to load gear production data:', e);
    gearProductionData = null;
  }
  try {
    const imagesResponse = await fetch(GEAR_CARD_IMAGES_URL, { cache: 'no-cache' });
    if (imagesResponse.ok) {
      const payload = await imagesResponse.json();
      gearCardImages = payload?.images || {};
    }
  } catch (e) {
    console.warn('Failed to load gear card images:', e);
    gearCardImages = {};
  }
  try {
    const labelsResponse = await fetch(GEAR_PART_LABELS_URL, { cache: 'no-cache' });
    if (labelsResponse.ok) {
      const payload = await labelsResponse.json();
      gearPartLabels = payload?.labels || {};
    }
  } catch (e) {
    console.warn('Failed to load gear part labels:', e);
    gearPartLabels = {};
  }
}


function gearImageSrc(gearId) {
  if (!gearId) return '';
  if (gearId.startsWith('T:tt_')) {
    const titanKey = gearId.slice(2);
    return `images/titans/${titanKey}.png`;
  }
  return gearCardImages[gearId] || gearCardImages[String(gearId).toUpperCase()] || '';
}

function normalizeGearId(gearId) {
  return String(gearId || '').replace(/^1x/, '');
}

function getGearTechNodeKey(techId) {
  if (!gearProductionData?.techCardNames?.[techId]) return null;
  const fullName = gearProductionData.techCardNames[techId].trim();
  // Extract English name (everything before the first CJK character)
  const enName = fullName.replace(/[一-鿿㐀-䶿豈-﫿].*/g, '').trim();
  return enName.toLowerCase();
}

function getGearName(gearId) {
  gearId = normalizeGearId(gearId);
  if (gearId.startsWith('T:')) {
    const titanKey = gearId.slice(2);
    if (treeLanguage === 'zh') {
      return TITAN_NAMES_ZH[titanKey] || titanKey.replace(/^tt_/, '');
    }
    const en = titanKey.replace(/^tt_/, '').replace(/^p/, '');
    return en.charAt(0).toUpperCase() + en.slice(1);
  }
  if (!gearProductionData?.gearCards?.[gearId]) return gearId;
  const fullName = gearProductionData.gearCards[gearId].trim();
  if (treeLanguage === 'zh') {
    const zh = fullName.replace(/^[^一-鿿㐀-䶿豈-﫿]*/, '').trim();
    return zh || fullName;
  }
  return fullName.replace(/[一-鿿㐀-䶿豈-﫿].*/g, '').trim() || fullName;
}

function getTechDisplayName(techId) {
  if (!gearProductionData?.techCardNames?.[techId]) return techId;
  const fullName = gearProductionData.techCardNames[techId].trim();
  if (treeLanguage === 'zh') {
    const zh = fullName.replace(/^[^一-鿿㐀-䶿豈-﫿]*/, '').trim();
    return zh || fullName;
  }
  return fullName.replace(/[一-鿿㐀-䶿豈-﫿].*/g, '').trim() || fullName;
}

function formatCostPart(costStr) {
  const match = String(costStr).match(/^(\d+)x(.+)$/);
  if (!match) return { amount: '', resource: costStr };
  const amount = match[1];
  const key = match[2];
  let name;
  if (key.startsWith('CORE_')) {
    const enemyKey = key.slice(5);
    name = treeLanguage === 'zh'
      ? `${RESOURCE_NAMES_ZH[enemyKey] || enemyKey} 核心`
      : `${enemyKey.replace(/_/g, ' ').toLowerCase()} core`;
  } else if (RESOURCE_NAMES_ZH[key]) {
    name = treeLanguage === 'zh' ? RESOURCE_NAMES_ZH[key] : key.replace(/_/g, ' ').toLowerCase();
  } else if (/^[A-Z]J\d+$/i.test(key)) {
    // Gear-as-material reference (e.g. 1xAJ0280)
    name = getGearName(key);
  } else {
    name = treeLanguage === 'zh' ? key : key.replace(/_/g, ' ').toLowerCase();
  }
  return { amount, resource: name };
}

function formatCost(costStr) {
  // Support OR-cost: "2xA&&1xB||1xC" means (A and B) or C.
  const orParts = String(costStr).split('||');
  if (orParts.length === 1) return formatCostPart(orParts[0]);
  return {
    _or: true,
    alternatives: orParts.map(part => part.split('&&').map(formatCostPart))
  };
}
function productionRecordCycle(cycle) {
  return PRODUCTION_CYCLE_TO_RECORD_CYCLE[String(cycle || '').toUpperCase()] || normalizeMainCycleId(cycle);
}
function recordResourceKey(rawKey, recordCycle) {
  const normalized = String(rawKey || '').trim().toUpperCase();
  if (normalized.startsWith('CORE_')) {
    const coreKey = RECORD_CORE_KEYS[normalized.slice(5)];
    return coreKey ? `${recordCycle}-core-${coreKey}` : null;
  }
  const baseKey = RECORD_RESOURCE_KEYS[normalized];
  if (!baseKey) return null;
  return SHARED_RECORD_RESOURCE_KEYS.has(baseKey) ? baseKey : `${recordCycle}-${baseKey}`;
}
function parseRawCostPart(costStr, recordCycle) {
  const match = String(costStr).trim().match(/^(\d+)x(.+)$/);
  if (!match) return { amount: 0, key: String(costStr), label: String(costStr), unsupported: true, reason: '无法识别' };
  const amount = Math.max(0, Number(match[1] || 0));
  const key = match[2].trim();
  const formatted = formatCostPart(`${amount}x${key}`);
  const label = `${amount}×${formatted.resource}`;
  if (/^[A-Z]J\d+$/i.test(key)) {
    return { amount, key, label, unsupported: true, reason: '装备库存未记录，需手动处理' };
  }
  if (key === 'TITAN' || key.startsWith('T:')) {
    return { amount, key, label, unsupported: true, reason: '泰坦消耗需手动处理' };
  }
  const storageKey = recordResourceKey(key, recordCycle);
  if (!storageKey) {
    return { amount, key, label, unsupported: true, reason: '记录表未建档' };
  }
  return { amount, key, label, storageKey, unsupported: false };
}
function combineCostAlternatives(groups) {
  return groups.reduce((options, group) => {
    const next = [];
    options.forEach(option => {
      group.forEach(parts => next.push([...option, ...parts]));
    });
    return next;
  }, [[]]);
}
function mergeCostParts(parts) {
  const merged = new Map();
  const result = [];
  parts.forEach(part => {
    const mergeKey = part.storageKey || `${part.key}:${part.reason || ''}`;
    if (merged.has(mergeKey)) {
      const existing = merged.get(mergeKey);
      existing.amount += part.amount;
      existing.label = `${existing.amount}×${formatCostPart(`${existing.amount}x${existing.key}`).resource}`;
      existing.expandedFrom = [...new Set([...(existing.expandedFrom || []), ...(part.expandedFrom || [])])];
    } else {
      const copy = { ...part };
      merged.set(mergeKey, copy);
      result.push(copy);
    }
  });
  return result;
}
function gearRecipeRecords(gearId) {
  const normalized = normalizeGearId(gearId).toUpperCase();
  const records = [];
  (gearProductionData?.techProduction || []).forEach(entry => {
    (entry.produces || []).forEach(gear => {
      if (normalizeGearId(gear.gearId).toUpperCase() === normalized) records.push({ entry, gear });
    });
  });
  return records;
}
function scaleExpandedCostParts(parts, multiplier, gearId) {
  return parts.map(part => {
    const amount = part.amount * multiplier;
    return {
      ...part,
      amount,
      label: `${amount}×${formatCostPart(`${amount}x${part.key}`).resource}`,
      expandedFrom: [...new Set([...(part.expandedFrom || []), gearId])],
    };
  });
}
function parseCostPartAlternatives(costStr, recordCycle, ancestry) {
  const direct = parseRawCostPart(costStr, recordCycle);
  const alternatives = [[direct]];
  if (!/^[A-Z]J\d+$/i.test(direct.key) || ancestry.has(direct.key.toUpperCase())) return alternatives;

  const nextAncestry = new Set(ancestry);
  nextAncestry.add(direct.key.toUpperCase());
  gearRecipeRecords(direct.key).forEach(({ entry, gear }) => {
    parseGearCostOptions(gear.cost, entry.cycle, nextAncestry).forEach(parts => {
      alternatives.push(scaleExpandedCostParts(parts, direct.amount, direct.key));
    });
  });
  return alternatives;
}
function parseGearCostOptions(costItems, productionCycle, ancestry = new Set()) {
  const recordCycle = productionRecordCycle(productionCycle);
  const groups = (Array.isArray(costItems) ? costItems : []).map(item =>
    String(item).split('||').flatMap(alt => {
      const partGroups = alt.split('&&').map(part => parseCostPartAlternatives(part, recordCycle, ancestry));
      return combineCostAlternatives(partGroups);
    })
  );
  return combineCostAlternatives(groups).map(mergeCostParts);
}
function resourceAmount(resources, storageKey) {
  return Math.max(0, Math.floor(Number(resources?.[storageKey] || 0)));
}
function evaluateCraftOption(parts, resources) {
  const unsupported = parts.filter(part => part.unsupported);
  const missing = parts
    .filter(part => !part.unsupported)
    .map(part => ({ ...part, available: resourceAmount(resources, part.storageKey) }))
    .filter(part => part.available < part.amount);
  return {
    parts,
    unsupported,
    missing,
    canAutoCraft: unsupported.length === 0 && missing.length === 0,
  };
}
function craftPlanForGear(entry, gear) {
  const resources = gearRecordState?.resources || {};
  const options = parseGearCostOptions(gear.cost, entry.cycle).map(parts => evaluateCraftOption(parts, resources));
  const craftableIndex = options.findIndex(option => option.canAutoCraft);
  const actionableIndex = options.findIndex(option => option.missing.length === 0);
  const filterCraftable = actionableIndex >= 0;
  return {
    key: `${entry.techId}::${gear.gearId}`,
    techId: entry.techId,
    gearId: gear.gearId,
    gearName: getGearName(gear.gearId),
    cycle: entry.cycle,
    options,
    craftableIndex,
    actionableIndex,
    filterCraftable,
  };
}
function describeCraftPlan(plan) {
  if (gearRecordLoadInFlight && !gearRecordState) return { text: '正在检查记录表材料...', className: '' };
  if (gearRecordError) return { text: `无法读取记录表：${gearRecordError}`, className: 'blocked' };
  if (!gearRecordState) return { text: '未连接记录表', className: 'blocked' };
  if (plan.craftableIndex >= 0) {
    const expanded = plan.options[plan.craftableIndex].parts.flatMap(part => part.expandedFrom || []);
    const detail = expanded.length ? ` 已展开前置装备：${[...new Set(expanded)].map(getGearName).join('、')}。` : '';
    return { text: `材料足够，可制造并自动扣除。${detail}`, className: 'ready' };
  }
  if (plan.actionableIndex >= 0) {
    const option = plan.options[plan.actionableIndex];
    const manualText = option.unsupported.map(part => part.label).join('、');
    return { text: `自动材料足够；确认已处理 ${manualText} 后可制造。`, className: 'ready' };
  }
  const automatic = plan.options
    .filter(option => option.unsupported.length === 0)
    .sort((a, b) => a.missing.length - b.missing.length)[0];
  const manual = plan.options.find(option => option.unsupported.length);
  if (automatic?.missing.length) {
    const missingText = automatic.missing.map(part => `${part.label}，现有 ${part.available}`).join('；');
    const manualText = manual
      ? `；另有替代方案需手动处理：${manual.unsupported.map(part => part.label).join('，')}`
      : '';
    return { text: `材料不足：${missingText}${manualText}`, className: 'blocked' };
  }
  if (manual) {
    const names = manual.unsupported.map(part => `${part.label}（${part.reason}）`).join('，');
    return { text: `存在需手动处理的材料：${names}`, className: 'blocked' };
  }
  const missing = plan.options[0]?.missing || [];
  if (missing.length) {
    const text = missing.map(part => `${part.label}，现有 ${part.available}`).join('；');
    return { text: `材料不足：${text}`, className: 'blocked' };
  }
  return { text: '没有可自动扣除的材料。', className: 'blocked' };
}
function renderCraftPanel(entry, gear) {
  const plan = craftPlanForGear(entry, gear);
  gearCraftPlans.set(plan.key, plan);
  const status = describeCraftPlan(plan);
  const disabled = gearRecordLoadInFlight && !gearRecordState;
  const actionableOption = plan.options[plan.actionableIndex];
  const buttonText = gearRecordLoadInFlight && !gearRecordState
    ? '检查材料中'
    : gearRecordError
      ? '无法读取记录表'
      : plan.actionableIndex >= 0
        ? actionableOption?.unsupported.length
          ? '确认手动材料并制造'
          : '制造并扣除'
        : plan.options.some(option => option.unsupported.length === 0)
          ? '材料不足'
          : '需手动处理';
  return `<div class="gear-craft-panel">
    <button type="button" class="gear-craft-btn" data-craft-key="${esc(plan.key)}" data-craft-option="${plan.actionableIndex}" ${disabled ? 'disabled' : ''}>${buttonText}</button>
    <div class="gear-craft-status ${esc(status.className)}">${esc(status.text)}</div>
  </div>`;
}
function normalizeCraftRecordResources(value) {
  const resources = isPlainObject(value) ? JSON.parse(JSON.stringify(value)) : {};
  SHARED_RECORD_RESOURCE_KEYS.forEach(key => {
    const values = ['c1', 'c2', 'c3', 'c4', 'c5']
      .map(cycle => resources[`${cycle}-${key}`])
      .filter(item => item !== undefined && item !== null && item !== '');
    if (resources[key] !== undefined && resources[key] !== null && resources[key] !== '') values.unshift(resources[key]);
    if (!values.length) return;
    const numeric = values.map(Number).filter(Number.isFinite);
    if (numeric.length === values.length) resources[key] = Math.max(...numeric);
    ['c1', 'c2', 'c3', 'c4', 'c5'].forEach(cycle => {
      delete resources[`${cycle}-${key}`];
    });
  });

}
function recordStateFromCampaign(campaign) {

  const recordSection = campaign?.sections?.record;
  const userState = recordSection?.users?.[userId] || (recordSection?.users ? null : recordSection);
  const state = isPlainObject(userState) ? JSON.parse(JSON.stringify(userState)) : {};

async function readLatestRecordState() {
  const response = await fetch(CAMPAIGN_STORAGE_URL, { cache: 'no-store' });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const payload = await response.json();
  if (!payload.ok) throw new Error(payload.error || '读取记录表失败');
  return recordStateFromCampaign(payload.campaign || {});
}
async function loadGearRecordState() {
  if (gearRecordLoadInFlight) return;
  gearRecordLoadInFlight = true;
  gearRecordError = '';
  try {
    const latest = await readLatestRecordState();
    gearRecordUserId = latest.userId;
    gearRecordState = latest.state;
    gearRecordRevision = latest.revision;
  } catch (error) {
    gearRecordError = String(error.message || error);
  } finally {
    gearRecordLoadInFlight = false;
    if (currentTab === 'gear-production') renderGearProductionPage();
  }
}
function requestGearRecordState() {
  if (!gearRecordState && !gearRecordLoadInFlight && !gearRecordError) void loadGearRecordState();
}
async function mutateCampaignRecordState(mutator) {
  for (let attempt = 0; attempt < 5; attempt += 1) {
    const latest = await readLatestRecordState();
    const next = mutator(JSON.parse(JSON.stringify(latest.state)));
    if (next == null) return null;
    const response = await fetch(CAMPAIGN_RECORD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ section: 'record', userId: latest.userId, state: next, expectedRevision: latest.revision }),
    });
    const payload = await response.json().catch(() => null);
    if (response.status === 409 && payload?.code === 'SAVE_CONFLICT') continue;
    if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
    gearRecordUserId = latest.userId;
    gearRecordState = next;
    gearRecordRevision = Math.max(0, Number(payload.revision || latest.revision + 1));
    gearRecordSyncChannel?.postMessage({ revision: gearRecordRevision });
    return next;
  }
  throw new Error('保存记录表失败：并发冲突重试次数过多');
}
async function craftGear(planKey, optionIndex) {
  const plan = gearCraftPlans.get(planKey);
  const option = plan?.options?.[Number(optionIndex)];
  if (!plan) {
    alert('制造方案已失效，请刷新装备制造页面后重试。');
    return;
  }
  if (gearRecordError) {
    alert(`暂时无法制造 ${plan.gearName}：无法读取记录表：${gearRecordError}`);
    return;
  }
  if (!gearRecordState) {
    alert(`暂时无法制造 ${plan.gearName}：记录表尚未加载完成。`);
    return;
  }
  if (!option) {
    alert(`暂时无法制造 ${plan.gearName}：${describeCraftPlan(plan).text}`);
    return;
  }
  const initialCheck = evaluateCraftOption(option.parts, gearRecordState?.resources || {});
  if (initialCheck.missing.length) {
    const missingText = initialCheck.missing.map(part => `${part.label}，现有 ${part.available}`).join('；');
    alert(`暂时无法制造 ${plan.gearName}：材料不足：${missingText}`);
    return;
  }
  if (initialCheck.unsupported.length) {
    const manualText = initialCheck.unsupported.map(part => part.label).join('、');
    if (!confirm(`请确认已手动处理以下材料：${manualText}\n\n继续后只会从阿尔戈号记录表扣除其余材料。`)) return;
  }
  const buttons = mainView.querySelectorAll(`[data-craft-key="${CSS.escape(planKey)}"]`);
  buttons.forEach(btn => { btn.disabled = true; btn.textContent = '制造中...'; });
  try {
    await mutateCampaignRecordState((recordState) => {
      if (!isPlainObject(recordState.resources)) recordState.resources = {};
      const checked = evaluateCraftOption(option.parts, recordState.resources);
      if (checked.missing.length) {
        const missingText = checked.missing.map(part => `${part.label}，现有 ${part.available}`).join('；');
        throw new Error(`材料不足：${missingText}`);
      }
      option.parts.filter(part => !part.unsupported).forEach(part => {
        recordState.resources[part.storageKey] = resourceAmount(recordState.resources, part.storageKey) - part.amount;
      });
      return recordState;
    });
    renderGearProductionPage();
  } catch (error) {
    alert(`制造 ${plan.gearName} 失败：${String(error.message || error)}`);
    await loadGearRecordState();
  }
}
async function adjustGearResource(storageKey, delta) {
  if (!storageKey || !delta) return;
  if (!gearRecordState) { alert('记录表尚未加载。'); return; }
  try {
    await mutateCampaignRecordState((recordState) => {
      if (!isPlainObject(recordState.resources)) recordState.resources = {};
      const current = Number(recordState.resources[storageKey] || 0);
      recordState.resources[storageKey] = Math.max(0, current + delta);
      return recordState;
    });
    renderGearProductionPage();
  } catch (error) {
    alert(`调整资源失败：${String(error.message || error)}`);
    await loadGearRecordState();
  }
}

    .split(/[\r\n;；,，、]+/)
    .map(item => item.trim())

function recordResourceValue(value) {

function renderGearProductionPage() {
  currentTab = 'gear-production';
  cycleBadge.textContent = '装备制造';
  gearCraftPlans = new Map();
  requestGearRecordState();

  const productions = getUnlockedProductions();
  const allItems = productions.flatMap(entry => entry.produces.map(gear => ({ entry, gear })));
  const productionCycle = currentProductionCycle();
  const visibleItems = allItems.filter(({ entry, gear }) => {
    if (gearOnlyCurrentCycle && entry.cycle !== productionCycle && !isAdversaryProduction(entry)) return false;
    if (gearOnlyCraftable && !gearRecordLoadInFlight && !craftPlanForGear(entry, gear).filterCraftable) return false;
    return true;
  });
  if (!productions.length) {
    mainView.innerHTML = `<div class="gear-page"><div class="gear-layout"><div class="gear-content"><div class="gear-empty">还没有解锁任何生产科技。解锁 production 类型的科技卡后，这里将显示可制造的装备。</div></div>${gearResourceSidebarHtml()}</div></div>`;
    applyGearSearch();

  }

  let html = '<div class="gear-page">';
  html += gearFilterBarHtml(visibleItems.length, allItems.length);
  html += `<div class="gear-search-hint">共 ${productions.length} 项生产科技已解锁。使用搜索框继续过滤。</div>`;
  html += '<div class="gear-layout"><div class="gear-content">';
  const groups = new Map();
  visibleItems.forEach(item => {
    const group = gearGroupByPart
      ? gearPart(item.gear.gearId)
      : { key: item.entry.techId, label: getTechDisplayName(item.entry.techId), techId: item.entry.techId };
    if (!groups.has(group.key)) groups.set(group.key, { ...group, items: [] });
    groups.get(group.key).items.push(item);
  });
  if (!groups.size) html += `<div class="gear-empty">没有符合当前筛选条件的装备。</div>`;
  for (const group of groups.values()) {
    html += `<div class="gear-group" data-search-text="${esc(`${group.label} ${group.items.map(item => getGearName(item.gear.gearId)).join(' ')}`.toLowerCase())}">`;
    const groupName = group.techId
      ? `<button type="button" class="gear-group-name" data-tech-id="${esc(group.techId)}" title="点击查看科技卡">${esc(group.label)}</button>`
      : `<span class="gear-group-name">${esc(group.label)}</span>`;
    html += `<div class="gear-group-header">${groupName}<span class="gear-group-count">${group.items.length} 件装备</span><span class="gear-group-chevron">▼</span></div>`;
    html += `<div class="gear-items">${group.items.map(({ entry, gear }) => gearItemHtml(entry, gear)).join('')}</div>`;
    html += `</div>`;
  }
  html += `</div>${gearResourceSidebarHtml()}</div></div>`;
  mainView.innerHTML = html;

  mainView.querySelectorAll('[data-gear-filter]').forEach(input => {
    input.addEventListener('change', () => {
      if (input.dataset.gearFilter === 'cycle') gearOnlyCurrentCycle = input.checked;
      if (input.dataset.gearFilter === 'craftable') gearOnlyCraftable = input.checked;
      if (input.dataset.gearFilter === 'part') gearGroupByPart = input.checked;
      renderGearProductionPage();
    });
  });

  // Toggle collapse
  mainView.querySelectorAll('.gear-group-header').forEach(header => {
    header.addEventListener('click', event => {
      if (event.target.closest('.gear-group-name[data-tech-id]')) return;
      header.parentElement.classList.toggle('collapsed');
    });
  });

  mainView.querySelectorAll('.gear-group-name[data-tech-id]').forEach(btn => {
    btn.addEventListener('click', event => {
      event.stopPropagation();
      showGearTechCard(btn.dataset.techId);
    });

  mainView.querySelectorAll('.gear-card-thumb[data-gear-img]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();

  });

  mainView.querySelectorAll('.gear-craft-btn[data-craft-key]').forEach(btn => {
    btn.addEventListener('click', event => {
      event.stopPropagation();
      void craftGear(btn.dataset.craftKey, btn.dataset.craftOption);
    });

  mainView.querySelectorAll('.gear-resource-btn[data-resource-key]').forEach(btn => {
    btn.addEventListener('click', event => {
      event.stopPropagation();
      void adjustGearResource(btn.dataset.resourceKey, Number(btn.dataset.resourceDelta || 0));
    });
  });

  applyGearSearch();
}

function applyGearSearch() {
  if (currentTab !== 'gear-production') return;
  const query = search.value.trim().toLowerCase();
  const groups = mainView.querySelectorAll('.gear-group');
  let totalVisible = 0;
  groups.forEach(group => {
    if (!query) {
      group.classList.remove('filtered');
      group.querySelectorAll('.gear-item').forEach(item => item.classList.remove('filtered'));
      totalVisible++;
      return;
    }
    const groupText = group.dataset.searchText || '';
    const items = group.querySelectorAll('.gear-item');
    let hasVisibleItem = false;
    items.forEach(item => {
      const itemText = item.dataset.searchText || '';
      const match = itemText.includes(query) || groupText.includes(query);
      item.classList.toggle('filtered', !match);
      if (match) hasVisibleItem = true;
    });
    group.classList.toggle('filtered', !hasVisibleItem);
    if (hasVisibleItem) totalVisible++;
  });
  const productions = getUnlockedProductions();
  count.textContent = query
    ? `${totalVisible}/${productions.length} 科技匹配`
    : `已解锁 ${productions.length} 项生产科技`;
}

function computeDisambiguatedTechNames(pages) {
    const byName = new Map();
    for (const page of pages) {
      for (const node of page.nodes) {
        const key = String(node.name || '').trim().toLowerCase();
        if (!byName.has(key)) byName.set(key, new Set());
        byName.get(key).add((node.card_indexes || []).join(','));
      }
    }
    return new Set([...byName].filter(([, cardSets]) => cardSets.size > 1).map(([key]) => key));
  }

function dictionaryToAppData(dictionary) {
    const pages = PAGE_METADATA.map(page => ({ ...page, nodes: [] }));
    const pagesByKey = new Map(pages.map(page => [page.key, page]));
    const pageLabelsByKey = new Map(PAGE_METADATA.map(page => [page.key, page.label]));
    const records = (Array.isArray(dictionary.cards) ? dictionary.cards : Object.values(dictionary.cards || {}))
      .filter(Boolean)
      .sort((a, b) => Number(a.index ?? 0) - Number(b.index ?? 0));
    const cards = [];
    const tagDictionary = {};
    const mergedNodes = new Map();
    const namesFor = record => record.names || { en: record.en, zh: record.zh };
    const sheetFor = image => Array.isArray(image.sheet)
      ? { width: image.sheet[0], height: image.sheet[1], col: image.sheet[2], row: image.sheet[3] }
      : (image.sheet || {});
    const cropFor = image => Array.isArray(image.crop)
      ? { x: image.crop[0], y: image.crop[1], w: image.crop[2], h: image.crop[3] }
      : (image.crop || {});
    const boxFor = value => Array.isArray(value)
      ? { x: value[0], y: value[1], w: value[2], h: value[3] }
      : value;
    const positionFor = value => Array.isArray(value)
      ? { x: value[0], y: value[1], w: value[2], h: value[3] }
      : (value || {});
    const refKeys = refs => (refs || []).map(item => typeof item === 'string' ? item : item?.key).filter(Boolean);
    const refKeyGroups = groups => {
      if (!groups) return [];
      const rawGroups = Array.isArray(groups?.[0]) ? groups : [groups];
      return rawGroups.map(refKeys).filter(group => group.length);
    };
    const conditionsFor = conditions => (conditions || []).map(item => typeof item === 'string' ? { caption: item } : {
      order: item.order,
      caption: item.caption || item.text,
    }).filter(item => item.caption || item.order != null);

    for (const record of records) {
      const image = record.image || {};
      const sheet = sheetFor(image);
      const crop = cropFor(image);
      const tabletop = record.tabletop || {};
      const type = record.type || {};
      const names = namesFor(record);
      const cardIndex = Number(record.index);
      cards[cardIndex] = {
        key: record.key || '',
        guid: tabletop.guid,
        name: names.en || '',
        name_zh: names.zh || '',
        tech_category: record.category || type.category || '',
        type: { ...type },
        card_id: tabletop.card_id,
        deck_key: tabletop.deck_key,
        deck_instance_id: tabletop.deck_instance_id,
        tags: record.core ? ['CoreTechnology'] : (type.tags || []),
        raw_tags: type.raw_tags || [],
        cycle_tags: type.cycle_tags || [],
        face_image_file: image.face,
        back_image_file: image.back,
        single_card_images: Boolean(image.single_card_images ?? image.single),
        sheet_width: sheet.width,
        sheet_height: sheet.height,
        crop_x_px: crop.x,
        crop_y_px: crop.y,
        crop_width_px: crop.w,
        crop_height_px: crop.h,
        sheet_col_1_based: sheet.col,
        sheet_row_1_based: sheet.row,
      };

      const nodePages = new Set();
      for (const treeNode of record.tree_nodes || record.nodes || []) {
        const page = pagesByKey.get(treeNode.page);
        if (!page) continue;
        nodePages.add(treeNode.page);
        const position = positionFor(treeNode.position || treeNode.pos);
        const nodeId = treeNode.node_id || treeNode.id;
        const nodeKeyValue = treeNode.node_key || treeNode.key || record.key;
        const nodeName = treeNode.name || names.en || '';
        const xlsmType = treeNode.xlsm_type ?? treeNode.xlsm?.type ?? (treeNode.core ? 'Core' : null);
        const requirements = refKeys(treeNode.requirements || treeNode.req);
        const requirementAnyGroups = [
          ...refKeyGroups(treeNode.requirements_any || treeNode.req_any),
          ...refKeyGroups(treeNode.requirement_any_groups || treeNode.req_any_groups),
        ];
        const unlocks = refKeys(treeNode.unlocks);
        const requirementConditions = conditionsFor(treeNode.requirement_conditions || treeNode.req_conditions);
        const unlockConditions = conditionsFor(treeNode.unlock_conditions);
        const mergeKey = treeNode.page + '::' + nodeId;
        let node = mergedNodes.get(mergeKey);
        if (!node) {
          node = {
            id: nodeId,
            name: nodeName,
            name_zh: treeNode.name_zh || treeNode.zh || names.zh || '',
            tech_category: treeNode.category || record.category || type.category || '',
            card_indexes: [],
            x: position.x,
            y: position.y,
            w: position.w,
            h: position.h,
            tree_box: boxFor(treeNode.tree_box || treeNode.box),
            requires: requirements,
            requires_any_groups: requirementAnyGroups,
            xlsm_requirements: requirements,
            xlsm_requirement_any_groups: requirementAnyGroups,
            xlsm_leads_to: unlocks,
          };
          if (xlsmType) {
            node.xlsm = { type: xlsmType };
            node.xlsm_type = xlsmType;
          }
          if (requirementConditions.length) {
            node.xlsm_special_requirements = { tech: node.xlsm_requirements, conditions: requirementConditions };
          }
          if (unlockConditions.length) {
            node.xlsm_special_leads_to = { tech: node.xlsm_leads_to, conditions: unlockConditions };
          }
          mergedNodes.set(mergeKey, node);
          page.nodes.push(node);
        }
        if (!node.card_indexes.includes(cardIndex)) node.card_indexes.push(cardIndex);

        const pageLabel = pageLabelsByKey.get(treeNode.page);
        const tagRecord = tagDictionary[nodeKeyValue] || {
          category: record.category || type.category || '',
          cycles: [],
          tag: {},
        };
        if (type.battle_card_type != null) tagRecord.tag.battle_card_type = type.battle_card_type;
        if (type.loop_limited != null) tagRecord.tag.loop_limited = type.loop_limited;
        if (type.negotiation != null) tagRecord.tag.negotiation = Boolean(type.negotiation);
        if (pageLabel && !tagRecord.cycles.includes(pageLabel)) tagRecord.cycles.push(pageLabel);
        tagDictionary[nodeKeyValue] = tagRecord;
      }

      if (record.key && !tagDictionary[record.key]) {
        tagDictionary[record.key] = {
          category: record.category || type.category || '',
          cycles: [...nodePages].map(pageKey => pageLabelsByKey.get(pageKey)).filter(Boolean),
          tag: {},
        };
        if (type.battle_card_type != null) tagDictionary[record.key].tag.battle_card_type = type.battle_card_type;
        if (type.loop_limited != null) tagDictionary[record.key].tag.loop_limited = type.loop_limited;
        if (type.negotiation != null) tagDictionary[record.key].tag.negotiation = Boolean(type.negotiation);
      }
    }

    for (const page of pages) {
      page.nodes.sort((a, b) => String(a.id).localeCompare(String(b.id)) || String(a.name).localeCompare(String(b.name)));
    }

    return { pages, cards, tag_dictionary: tagDictionary };
  }

async function saveCampaignTechnologySection() {

      const userId = activeAccountId;

      const response = await fetch(CAMPAIGN_TECH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ section: 'technology', userId, state: sectionState, expectedRevision: campaignTechRevision }),
      });
      const payload = await response.json().catch(() => null);
      if (response.status === 409 && payload?.code === 'SAVE_CONFLICT') {
        // Another writer bumped this section. Re-read the latest revision and
        // resend our value: the technology section is bucketed per profile and
        // only this page writes it, so retrying with the local state is safe.
        campaignTechRevision = Math.max(0, Number(payload.revision || 0));
        campaignSavePending = true;
        continue;
      }
      if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
      campaignTechRevision = Math.max(0, Number(payload.revision || campaignTechRevision));

    const response = await fetch(CAMPAIGN_DASHBOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ section: 'dashboard', state: next, expectedRevision: current.revision }),
    });
    const payload = await response.json().catch(() => null);

  const scale = thumbOuterW / (rotate ? cropH : cropW);

  const thumbH = Math.round(cropH * scale);
  const outerW = rotate ? thumbH : thumbW;
  const outerH = rotate ? thumbW : thumbH;
  const bgW = Math.round(sheetW * scale);

  if (!rotate) return crop;

function toggleUnlocked(pageKey, node) {
  if (isAutoUnlockedNode(pageKey, node)) {
    refreshUnlockState();
    if (activeModalMode === 'tree') updateModalUnlockButton(pageKey, node);
    return;
  }
  const key = nodeKey(pageKey, node);
  if (unlocked.has(key)) {
    unlocked.delete(key);
    unimportant.delete(key);
  } else {
    unlocked.add(key);
  }
  saveAccounts();
  refreshUnlockState();
  const page = pageByKey(viewPage);
  const selectedNode = page?.nodes.find(item => item.id === selectedNodeId);
  if (selectedNode && activeModalMode === 'tree') updateModalUnlockButton(page.key, selectedNode);
}
function refreshUnlockState() {
  document.querySelectorAll('.node').forEach(el => {
    const page = pageByKey(el.dataset.pageKey);
    const node = page?.nodes.find(item => item.id === el.dataset.nodeId);
    if (page && node) applyNodeState(el, page.key, node);
  });
  applySearch();
  if (currentTab === 'unlocked') renderUnlockedPage();
}
function cardPreview(card, side = 'front') {
  const imageFile = side === 'back' ? card.back_image_file : card.face_image_file;
  const label = side === 'back' ? '背面' : '正面';
  if (card.single_card_images) {
    return `<div class="preview-frame"><div class="preview-label">${label}</div><img class="card-preview-img" src="${esc(rel(imageFile))}" alt="${esc(card.name)} ${label}"></div>`;
  }
  const cropW = Number(card.crop_width_px || 1);
  const cropH = Number(card.crop_height_px || 1);
  const sheetW = Number(card.sheet_width || cropW);
  const sheetH = Number(card.sheet_height || cropH);
  const rotate = shouldRotateLargeCard(card);
  const landscape = rotate || cropW > cropH;
  const maxW = landscape ? 430 : 300;
  const scale = maxW / (rotate ? cropH : cropW);
  const w = Math.round(cropW * scale);
  const h = Math.round(cropH * scale);
  const outerW = rotate ? h : w;
  const outerH = rotate ? w : h;
  const bgW = Math.round(sheetW * scale);
  const bgH = Math.round(sheetH * scale);
  const x = -Math.round(Number(card.crop_x_px || 0) * scale);
  const y = -Math.round(Number(card.crop_y_px || 0) * scale);
  const crop = `<div class="card-preview" style="width:${w}px;height:${h}px;background-image:url('${esc(rel(imageFile))}');background-size:${bgW}px ${bgH}px;background-position:${x}px ${y}px"></div>`;
  const preview = rotate
    ? `<div class="card-preview-rotated" style="width:${outerW}px;height:${outerH}px">${crop.replace('style="', `style="transform:rotate(-90deg) translateX(-${w}px);transform-origin:top left;`)}</div>`
    : crop;
  return `<div class="preview-frame ${landscape ? 'landscape' : ''}"><div class="preview-label">${label}</div>${preview}</div>`;
}
function renderCard(card, node) {
  const layout = isLargeTechCard(card) ? 'stacked' : 'side-by-side';
  return `<section class="card-block">
    <h2 class="card-name">${esc(displayCardName(card, node?.name || ''))}</h2>
    <div class="card-previews ${layout}">
      ${cardPreview(card, 'front')}
      ${cardPreview(card, 'back')}
    </div>
  </section>`;
}
function renderTabs() {
  const tabItems = [
    ...data.pages.map(page => ({ key: page.key, label: page.label })),
    { key: 'unlocked', label: '已解锁科技' },
    { key: 'gear-production', label: '装备制造' },
  ];
  tabs.innerHTML = tabItems.map(p => `<button class="tab ${p.key === currentTab ? 'active' : ''}" data-page="${esc(p.key)}">${esc(p.label)}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
    currentTab = btn.dataset.page;
    if (currentTab === 'unlocked') {
      selectedNodeId = null;
      renderTabs();
      renderUnlockedPage();
      return;
    }
    if (currentTab === 'gear-production') {
      selectedNodeId = null;
      renderTabs();
      renderGearProductionPage();
      void loadGearRecordState();
      return;
    }
    viewPage = currentTab;
    selectedNodeId = null;
    renderTabs();
    renderTree();
  }));
}
function renderCycleSelect() {
  const baseOptions = data.pages.map(page => `<option value="${esc(page.key)}">当前${esc(page.label)}</option>`).join('');
  cycleSelect.innerHTML = baseOptions + `<option value="cycle4">当前循环 IV</option>`;
  cycleSelect.value = currentCycle;
}
function renderTree() {
  document.querySelector('.app').classList.remove('unlocked-mode');
  const page = pageByKey(viewPage);
  currentTab = viewPage;
  cycleBadge.textContent = page.label;
  mainView.innerHTML = `<div class="tree-wrap" id="treeWrap"></div>`;
  const treeWrap = document.getElementById('treeWrap');
  treeWrap.style.aspectRatio = `${page.width} / ${page.height}`;
  treeWrap.classList.toggle('zh-labels', treeLanguage === 'zh');
  treeWrap.innerHTML = `<img class="tree-img" src="${esc(page.image)}" alt="${esc(page.label)} technology tree">`;
  for (const node of page.nodes) {
    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'node';
    el.title = displayTechName(node);
    el.dataset.nodeId = node.id;
    el.dataset.pageKey = page.key;
    el.dataset.name = `${node.name || ''} ${node.name_zh || ''}`.toLowerCase();
    el.dataset.techName = node.name;
    el.dataset.progressKey = nodeKey(page.key, node);
    applyNodeState(el, page.key, node);
    const box = node.tree_box || node;
    el.style.left = (box.x / page.width * 100) + '%';
    el.style.top = (box.y / page.height * 100) + '%';
    el.style.width = (box.w / page.width * 100) + '%';
    el.style.height = (box.h / page.height * 100) + '%';
    el.innerHTML = `<span class="node-label">${esc(node.name_zh || node.name)}</span>`;
    let clickTimer = null;
    el.addEventListener('click', (event) => {
      if (event.detail > 1) return;
      clickTimer = window.setTimeout(() => {
        clickTimer = null;
        showNodeModal(node);
      }, 180);
    });
    el.addEventListener('dblclick', (event) => {
      if (clickTimer) {
        window.clearTimeout(clickTimer);
        clickTimer = null;
      }
      event.preventDefault();
      event.stopPropagation();
      toggleUnlocked(page.key, node);
    });
    treeWrap.appendChild(el);
  }
  applySearch();
}
function applySearch() {
  if (currentTab === 'gear-production') {
    applyGearSearch();
    return;
  }
  if (currentTab === 'unlocked') {
    count.textContent = `已解锁 ${unlockedRecords().length}`;
    return;
  }
  const query = search.value.trim().toLowerCase();
  const nodes = [...document.querySelectorAll('.node')];
  let visible = 0;
  nodes.forEach(el => {
    const ok = !query || el.dataset.name.includes(query);
    el.classList.toggle('filtered', !ok);
    if (ok) visible++;
  });
  count.textContent = `${visible}/${nodes.length} 节点 · 已解锁 ${unlockedVisibleCount()}`;
}
modalViewTree.addEventListener('click', () => {
  if (!activeUnlockedRecord) return;
  navigateToNode(activeUnlockedRecord.page.key, activeUnlockedRecord.node.id);
});
modalToggleUnlock.addEventListener('click', () => {
  if (!activeUnlockedRecord) return;
  toggleUnlocked(activeUnlockedRecord.page.key, activeUnlockedRecord.node);
});
modalToggleUnimportant.addEventListener('click', toggleUnimportantForActive);
modalClose.addEventListener('click', closeUnlockedModal);
unlockedModal.addEventListener('click', event => {
  const techButton = event.target.closest('.modal-tech-item[data-page][data-node]');
  if (techButton) {
    event.preventDefault();
    navigateToNode(techButton.dataset.page, techButton.dataset.node);
    return;
  }
  if (event.target === unlockedModal) closeUnlockedModal();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && unlockedModal.classList.contains('open')) closeUnlockedModal();
});
gearRecordSyncChannel?.addEventListener('message', () => {
  if (currentTab === 'gear-production') void loadGearRecordState();
});
window.addEventListener('focus', () => {
  if (currentTab === 'gear-production') void loadGearRecordState();
});
search.addEventListener('input', applySearch);
languageToggle.addEventListener('click', () => {
  treeLanguage = treeLanguage === 'zh' ? 'en' : 'zh';
  queueCampaignTechnologySave();
  updateLanguageToggle();
  if (currentTab === 'unlocked') {
    renderUnlockedPage();
  } else if (currentTab === 'gear-production') {
    renderGearProductionPage();
  } else {
    renderTree();
  }
  if (activeUnlockedRecord) {
    const { page, node } = activeUnlockedRecord;
    if (activeModalMode === 'tree') showNodeModal(node);
    if (activeModalMode === 'unlocked') showUnlockedModal(page.key, node.id);
  }
});
cycleSelect.addEventListener('change', () => {
  currentCycle = cycleSelect.value;
  unlockAutomaticCyclesThrough(currentCycle);
  selectedNodeId = null;
  saveAccounts();
  if (currentCycle === 'cycle4') {
    // Virtual cycle: no tree page to render. Jump to gear production view.
    currentTab = 'gear-production';
    cycleBadge.textContent = '循环 IV · 装备制造';
    renderTabs();
    renderGearProductionPage();
    refreshUnlockState();
    return;
  }
  viewPage = currentCycle;
  currentTab = viewPage;
  renderTabs();
  renderTree();
  refreshUnlockState();
});
clearUnlocked.addEventListener('click', () => {
  if (!confirm('重置当前账号的解锁进度？')) return;
  unlocked.clear();
  unimportant.clear();
  currentCycle = data.pages[0].key;
  viewPage = currentCycle;
  currentTab = viewPage;
  selectedNodeId = null;
  unlockAutomaticCyclesThrough(currentCycle);
  saveAccounts();
  renderCycleSelect();
  renderTabs();
  renderTree();
  refreshUnlockState();
});
returnMain.addEventListener('click', saveAndReturnMain);
function boot(appData) {
  data = appData;
  PAGE_INDEX = new Map(data.pages.map((page, index) => [page.key, index]));
  DISAMBIGUATED_TECH_NAMES = computeDisambiguatedTechNames(data.pages);
  accounts = loadAccounts();
  activeAccountId = 'default';
  if (!accounts[activeAccountId]) activeAccountId = Object.keys(accounts)[0];
  const params = new URLSearchParams(window.location.search);
  const requestedTechCycle = validPageKey(TECH_CYCLE_BY_MAIN_CYCLE[String(params.get('cycle') || '').toLowerCase()] || params.get('cycle'));
  currentCycle = requestedTechCycle || validPageKey(accounts[activeAccountId]?.currentCycle) || data.pages[0].key;
  viewPage = viewPageFor(currentCycle);
  currentTab = currentCycle === 'cycle4' ? 'gear-production' : viewPage;
  selectedNodeId = null;
  unlocked = new Set(accounts[activeAccountId]?.unlocked || []);
  unimportant = new Set(accounts[activeAccountId]?.unimportant || []);
  unlockAutomaticCyclesThrough(currentCycle);
  updateLanguageToggle();
  renderAccountSelect();
  renderCycleSelect();
  renderTabs();
  if (currentCycle === 'cycle4') {
    renderGearProductionPage();
  } else {
    renderTree();
  }
  loadCampaignTechnologySection();
}

loadDictionaryData().then(async (appData) => {
  await loadGearProductionData();
  boot(appData);
}).catch(showLoadError);
</script>
