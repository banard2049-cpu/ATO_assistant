<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科技卡属性编辑器</title>
  <style>
    :root { --ink:#263238; --muted:#6b7c86; --line:#d9e1e6; --accent:#0d6274; --good:#16794a; --warn:#8f3e2b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); background: #f5f7f8; }
    .topbar { position: sticky; top: 0; z-index: 5; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 10px 14px; background: #fff; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 8px 0 0; font-size: 16px; }
    input, select, button { font: inherit; }
    .search { width: min(360px, 100%); padding: 7px 9px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
    select, button { padding: 7px 9px; border: 1px solid var(--line); border-radius: 5px; background: #fff; color: var(--ink); font-weight: 750; }
    button { cursor: pointer; }
    button.primary { border-color: #9fc9d1; background: #e8f7fa; color: var(--accent); }
    .status { margin-left: auto; color: var(--muted); font-size: 12px; font-weight: 750; }
    .grid { padding: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; align-items: start; }
    .card { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 9px; min-width: 0; }
    .card.dirty { outline: 3px solid rgba(13,98,116,.2); border-color: #9fc9d1; }
    .thumb { width: 100%; aspect-ratio: 63 / 88; border: 1px solid #e3e8eb; border-radius: 6px; background: #eef2f4; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .thumb img { width: 100%; height: 100%; object-fit: contain; background: #fff; display: block; }
    .name { margin-top: 8px; font-size: 12px; font-weight: 850; line-height: 1.3; overflow-wrap: anywhere; min-height: 32px; }
    .meta { margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 700; overflow-wrap: anywhere; }
    .controls { margin-top: 8px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .controls select { min-width: 0; width: 100%; }
    .check { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 850; white-space: nowrap; }
    .check input { margin: 0; accent-color: var(--good); }
    .badge-row { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 5px; }
    .badge { border-radius: 999px; padding: 2px 7px; background: #eef3f4; color: #60717b; font-size: 11px; font-weight: 800; }
    .badge.battle { background: #f6e8e3; color: var(--warn); }
    .badge.structure { background: #e7f6ee; color: var(--good); }
    .badge.core { background: #fff4e0; color: #9a6700; }
    .empty { padding: 30px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>科技卡属性编辑器</h1>
    <input id="search" class="search" placeholder="搜索科技卡" autocomplete="off">
    <select id="cycle"><option value="">全部循环</option></select>
    <select id="category">
      <option value="">全部分类</option>
      <option value="structure">结构科技</option>
      <option value="battle">战斗科技</option>
    </select>
    <select id="coreFilter">
      <option value="">全部核心</option>
      <option value="yes">只看核心</option>
      <option value="no">只看非核心</option>
    </select>
    <button id="save" class="primary" type="button">保存到科技字典</button>
    <a href="../index.html"><button type="button">返回科技树</button></a>
    <span id="status" class="status"></span>
  </div>
  <main id="grid" class="grid"></main>

<script>
const DICTIONARY_URL = '../tech_card_dictionary.min.json';
const SAVE_URL = '../../api/tech-card-dictionary.php';
let cards = [];
let dirty = false;

const $ = id => document.getElementById(id);
const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
const techKey = value => String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
const nameFor = card => card.names?.zh || card.names?.en || card.key || '';
const categoryFor = card => card.category === 'battle' ? 'battle' : 'structure';
const imageFor = card => {
  const image = card.image?.back || card.image?.face || '';
  return image ? `../${image}` : '';
};
const isCoreCard = card => Boolean(card.core) || (card.nodes || []).some(node => node?.core) || (card.type?.tags || []).includes('CoreTechnology') || (card.type?.raw_tags || []).includes('CoreTechnology');

function currentItems() {
  const q = $('search').value.trim().toLowerCase();
  const cycle = $('cycle').value;
  const category = $('category').value;
  const core = $('coreFilter').value;
  return cards.filter(card =>
    (!q || card.search.includes(q)) &&
    (!cycle || card.cycles.includes(cycle)) &&
    (!category || card.category === category) &&
    (!core || (core === 'yes') === Boolean(card.core))
  );
}

function render() {
  const items = currentItems();
  const coreCount = cards.filter(card => card.core).length;
  const battleCount = cards.filter(card => card.category === 'battle').length;
  $('status').textContent = `显示 ${items.length}/${cards.length} 张 · 战斗 ${battleCount} · 结构 ${cards.length - battleCount} · 核心 ${coreCount}${dirty ? ' · 尚未保存' : ''}`;
  $('grid').innerHTML = items.length ? items.map(card => `
    <article class="card ${card.dirty ? 'dirty' : ''}">
      <div class="thumb">${imageFor(card) ? `<img src="${esc(imageFor(card))}" alt="${esc(nameFor(card))}">` : esc(card.key)}</div>
      <div class="name">${esc(nameFor(card))}</div>
      <div class="meta">${esc(card.cycles.join(' / ') || '无节点')} · ${esc(card.key)}</div>
      <div class="controls">
        <select data-category-key="${esc(card.key)}">
          <option value="structure" ${card.category === 'structure' ? 'selected' : ''}>结构科技</option>
          <option value="battle" ${card.category === 'battle' ? 'selected' : ''}>战斗科技</option>
        </select>
        <label class="check"><input type="checkbox" data-core-key="${esc(card.key)}" ${card.core ? 'checked' : ''}>核心</label>
      </div>
      <div class="badge-row">
        <span class="badge ${card.category}">${card.category === 'battle' ? '战斗' : '结构'}</span>
        ${card.core ? '<span class="badge core">核心</span>' : ''}
        ${card.type?.battle_card_type ? `<span class="badge">${esc(card.type.battle_card_type)}</span>` : ''}
      </div>
    </article>
  `).join('') : '<div class="empty">没有符合条件的科技卡。</div>';

  $('grid').querySelectorAll('[data-category-key]').forEach(select => {
    select.addEventListener('change', () => {
      const card = cards.find(item => item.key === select.dataset.categoryKey);
      if (!card) return;
      card.category = select.value === 'battle' ? 'battle' : 'structure';
      card.dirty = true;
      dirty = true;
      render();
    });
  });
  $('grid').querySelectorAll('[data-core-key]').forEach(input => {
    input.addEventListener('change', () => {
      const card = cards.find(item => item.key === input.dataset.coreKey);
      if (!card) return;
      card.core = input.checked;
      card.dirty = true;
      dirty = true;
      render();
    });
  });
}

async function save() {
  $('save').disabled = true;
  try {
    const cardUpdates = cards.map(card => ({ key: card.key, category: card.category, core: Boolean(card.core) }));
    const response = await fetch(SAVE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cardUpdates }),
    });
    const payload = await response.json().catch(() => null);
    if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
    cards.forEach(card => { card.dirty = false; });
    dirty = false;
    render();
  } catch (error) {
    alert(`保存失败：${error.message || error}`);
  } finally {
    $('save').disabled = false;
  }
}

async function boot() {
  try {
    const data = await fetch(DICTIONARY_URL, { cache: 'no-cache' }).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
    cards = (data.cards || [])
      .filter(card => card && (card.key || card.names?.en))
      .map(card => ({
        ...card,
        key: techKey(card.key || card.names?.en),
        category: categoryFor(card),
        core: isCoreCard(card),
        cycles: [...new Set((card.nodes || []).map(node => node.page).filter(Boolean))],
        search: `${card.key || ''} ${card.names?.en || ''} ${card.names?.zh || ''}`.toLowerCase(),
        dirty: false,
      }))
      .sort((a, b) => (a.cycles[0] || '').localeCompare(b.cycles[0] || '') || nameFor(a).localeCompare(nameFor(b), 'zh-Hans-CN'));
    [...new Set(cards.flatMap(card => card.cycles))].forEach(cycle => $('cycle').insertAdjacentHTML('beforeend', `<option value="${esc(cycle)}">${esc(cycle)}</option>`));
    render();
  } catch (error) {
    $('grid').innerHTML = `<div class="empty">加载失败：${esc(error.message || error)}</div>`;
  }
}

['search', 'cycle', 'category', 'coreFilter'].forEach(id => $(id).addEventListener(id === 'search' ? 'input' : 'change', render));
$('save').addEventListener('click', save);
boot();
</script>
</body>
</html>
