<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>阿尔戈号记录表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f3f2;
      --paper: #fffdf8;
      --panel: #ffffff;
      --ink: #1c2422;
      --muted: #66726d;
      --line: #d9dfdc;
      --line-strong: #aab6b0;
      --accent: #176c62;
      --accent-2: #8a5b17;
      --red: #a03832;
      --blue: #285f9f;
      --green: #27724c;
      --shadow: 0 16px 36px rgba(34, 44, 40, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.92);
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #f8faf8;
      color: var(--ink);
    }

    button.danger {
      background: var(--red);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 88px;
      line-height: 1.55;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .app {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 3vw, 34px) 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .topbar-tools {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: min(560px, 48vw);
    }

    .header-fields {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) minmax(170px, 0.7fr);
      gap: 10px;
      width: 100%;
    }

    .header-fields label {
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .header-fields input,
    .header-fields select {
      min-height: 38px;
      background: #fff;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 680px;
    }

    .toolbar a {
      display: inline-grid;
      place-items: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 13px;
      background: #f8faf8;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .save-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: right;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 0.98fr) minmax(380px, 0.84fr);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-body {
      padding: 15px;
    }

    .identity-grid,
    .ship-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .record-basics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 15px;
      border-bottom: 1px solid var(--line);
      background: #f8faf8;
    }

    .panel-heading h2 {
      font-size: 16px;
    }

    .resource-grid,
    .notes-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
    }

    .resource-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .identity-grid {
      grid-template-columns: max-content max-content max-content;
      column-gap: 28px;
      justify-content: start;
    }

    .identity-grid label {
      grid-template-columns: max-content max-content;
      align-items: center;
      gap: 8px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .identity-grid input,
    .identity-grid select {
      min-height: 38px;
    }

    .identity-grid .number-field {
      display: grid;
      grid-template-columns: 24px 42px 24px;
      gap: 4px;
      align-items: center;
      justify-content: start;
      width: max-content;
    }

    .identity-grid .number-field.fate-number-field {
      grid-template-columns: 24px 42px 24px 48px;
      gap: 5px;
    }

    .identity-grid .number-field button {
      width: 100%;
      min-width: 0;
      min-height: 30px;
      padding: 0;
      font-size: 12px;
      font-weight: 900;
    }

    .identity-grid .fate-rollback {
      width: 48px;
      padding: 0 6px;
      background: var(--accent-2);
      font-size: 11px;
      white-space: nowrap;
    }

    .identity-grid .number-field input {
      width: 42px;
      min-width: 0;
      min-height: 30px;
      padding: 6px 4px;
      text-align: center;
      font-weight: 900;
      font-size: 13px;
    }

    .identity-grid .number-field input::-webkit-outer-spin-button,
    .identity-grid .number-field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .identity-grid .number-field input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .titan-list-panel {
      grid-column: auto;
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfa;
    }

    .titan-list-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      list-style: none;
      cursor: pointer;
    }

    .titan-list-head::-webkit-details-marker {
      display: none;
    }

    .titan-list-head strong::before {
      content: ">";
      display: inline-block;
      margin-right: 6px;
      color: var(--accent);
      transition: transform 0.16s ease;
    }

    .titan-list-panel[open] .titan-list-head strong::before {
      transform: rotate(90deg);
    }

    .titan-list {
      display: grid;
      gap: 8px;
    }

    .titan-empty {
      min-height: 42px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .titan-row,
    .titan-add-row {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .titan-row {
      grid-template-columns: minmax(120px, 1fr) 82px auto auto;
    }

    .titan-add-row {
      grid-template-columns: minmax(120px, 1fr) 82px auto 96px auto;
    }

    .titan-row {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: #fff;
    }

    .titan-row input[type="text"],
    .titan-add-row input[type="text"] {
      min-width: 0;
    }

    .titan-row input[type="number"],
    .titan-add-row input[type="number"] {
      width: 100%;
      padding: 8px 6px;
      text-align: center;
      font-weight: 900;
    }

    .titan-add-row .titan-total-limit {
      width: 96px;
    }

    .titan-number-field {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.1;
    }

    .titan-crippled,
    .titan-crippled-add {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .titan-crippled input,
    .titan-crippled-add input {
      width: 16px;
      height: 16px;
      padding: 0;
      accent-color: var(--red);
    }

    .titan-remove {
      min-height: 34px;
      padding: 0 10px;
      background: var(--red);
      color: #fff;
    }

    .summon-panel {
      display: grid;
      gap: 14px;
    }

    .summon-controls {
      display: grid;
      grid-template-columns: repeat(4, max-content) auto;
      gap: 8px;
      align-items: end;
    }

    .summon-controls button {
      min-height: 34px;
      white-space: nowrap;
    }

    .summon-usage {
      grid-template-columns: auto auto;
      align-items: center;
      gap: 8px;
      min-height: 34px;
    }

    .summon-usage-fields {
      display: grid;
      grid-template-columns: 40px auto 40px;
      gap: 4px;
      align-items: center;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .summon-usage-fields.single {
      grid-template-columns: 48px;
    }

    .summon-usage-fields.nymph-usage-fields {
      grid-template-columns: 48px auto 48px;
    }

    .summon-usage-fields.aa-limit-field {
      grid-template-columns: 54px;
    }

    .summon-usage input {
      min-height: 34px;
      padding: 6px 4px;
      text-align: center;
    }

    .summon-controls input[readonly] {
      background: #f8faf8;
      color: var(--ink);
      font-weight: 900;
    }

    .summon-pickers {
      display: grid;
      grid-template-columns: minmax(180px, 320px) auto;
      gap: 8px;
      align-items: end;
      margin-top: 10px;
    }

    details.summon-group {
      display: grid;
      gap: 9px;
    }

    .summon-group-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      list-style: none;
      cursor: pointer;
    }

    .summon-group-head::-webkit-details-marker {
      display: none;
    }

    .summon-group-head strong::before {
      content: ">";
      display: inline-block;
      margin-right: 6px;
      color: var(--accent);
      transition: transform 0.16s ease;
    }

    details.summon-group[open] .summon-group-head strong::before {
      transform: rotate(90deg);
    }

    details.summon-group:not([open]) .summon-card-grid {
      display: none;
    }

    .summon-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 188px), 220px));
      justify-content: start;
      gap: 12px;
    }

    .summon-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .summon-card.used {
      border-color: var(--red);
      box-shadow: inset 0 0 0 2px rgba(160, 56, 50, 0.18);
      opacity: 0.78;
    }

    .summon-card.used::after {
      content: "已用";
      position: absolute;
      top: 8px;
      right: 8px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    .summon-card:focus-visible {
      outline: 3px solid rgba(23, 108, 98, 0.32);
      outline-offset: 2px;
    }

    .summon-card-face {
      display: block;
      background: #f4f5f2;
    }

    .summon-card img {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: contain;
      object-position: top center;
    }

    .summon-empty {
      min-height: 48px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      background: #fbfcfa;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .track {
      display: grid;
      gap: 8px;
    }

    .track-row {
      display: grid;
      grid-template-columns: minmax(124px, max-content) minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    .track-name strong {
      display: block;
      font-size: 14px;
    }

    .track-name span {
      color: var(--muted);
      font-size: 12px;
    }

    .track-lock-button {
      min-height: 30px;
      margin-top: 7px;
      border: 1px solid var(--line);
      background: #f8faf8;
      color: var(--ink);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .track-lock-button:disabled {
      cursor: default;
      opacity: 0.68;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 0;
    }

    .chip-stack {
      display: grid;
      justify-items: center;
      gap: 4px;
    }

    .chip {
      min-width: 34px;
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 8px;
      font-size: 13px;
      font-weight: 900;
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .chip.locked-max {
      border-style: dashed;
      color: var(--muted);
    }

    .chip.locked-max.active {
      color: #fff;
    }

    .chip.shared-stage {
      box-shadow: inset 0 -3px 0 rgba(40, 95, 159, 0.36);
    }

    .chip.triangle-marker {
      min-width: 30px;
      padding: 0 6px;
    }

    .chip.warning.active {
      border-color: var(--red);
      background: var(--red);
    }

    .track-extra-box {
      width: 26px;
      height: 22px;
      min-height: 0;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      padding: 0;
    }

    .track-extra-box.active {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: inset 0 0 0 4px #fff;
    }

    .track-extra-box.refugee,
    .track-extra-box.captive {
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .track-extra-box.refugee {
      border-color: var(--blue);
      background: var(--blue);
    }

    .track-extra-box.captive {
      border-color: var(--red);
      background: var(--red);
    }

    .chip.blue.active {
      border-color: var(--blue);
      background: var(--blue);
    }

    .chip.green.active {
      border-color: var(--green);
      background: var(--green);
    }

    .diplomacy-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .diplomacy-scale {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .diplomacy-markers,
    .diplomacy-chips {
      display: grid;
      grid-template-columns: repeat(16, 34px);
      gap: 6px;
      width: max-content;
      min-width: max-content;
    }

    .diplomacy-markers {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.1;
    }

    .diplomacy-marker {
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 34px;
      text-align: center;
      white-space: nowrap;
    }

    .diplomacy-marker::after {
      content: "";
      width: 1px;
      height: 10px;
      background: var(--line-strong);
    }

    .diplomacy-chips {
      grid-auto-flow: column;
    }

    .diplomacy-chips .chip {
      min-width: 34px;
      padding: 0;
    }

    .adventure-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .check-card strong {
      display: block;
      font-size: 14px;
    }

    .check-card span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .adventure-boxes {
      display: grid;
      grid-template-columns: repeat(4, 32px);
      gap: 6px;
      align-items: center;
    }

    .adventure-box {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0;
      font-size: 13px;
      font-weight: 900;
    }

    .adventure-box.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .pygmalion-group {
      display: grid;
      grid-template-columns: repeat(3, 34px);
      gap: 6px;
    }

    .pygmalion-cell {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      padding: 0;
      font-size: 12px;
    }

    .pygmalion-cell.special {
      background: #f5f3ee;
      color: var(--muted);
    }

    .pygmalion-cell.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .rooting-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .rooting-list,
    .rooting-deck {
      display: grid;
      gap: 6px;
    }

    .rooting-list {
      margin-top: 12px;
    }

    .rooting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .rooting-row span,
    .rooting-deck span {
      min-width: 0;
    }

    .rooting-row button {
      min-height: 30px;
      padding: 0 9px;
    }

    .rooting-deck {
      max-height: 190px;
      overflow: auto;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    .rooting-deck span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .number-field {
      display: grid;
      grid-template-columns: 20px 20px 44px 20px 20px;
      gap: 2px;
      align-items: center;
      justify-content: start;
    }

    .number-field button {
      width: 100%;
      min-width: 0;
      min-height: 26px;
      padding: 0;
      font-size: 10px;
    }

    .number-field input {
      width: 38px;
      min-width: 0;
      min-height: 26px;
      padding: 4px 2px;
      text-align: center;
      font-weight: 900;
      font-size: 12px;
    }

    .number-field input::-webkit-outer-spin-button,
    .number-field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .number-field input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .resource-text {
      min-height: 38px;
      padding: 8px 9px;
      font-size: 13px;
      line-height: 1.35;
      resize: vertical;
    }

    .resource-card .resource-text {
      min-height: 42px;
    }

    .resource-card {
      display: grid;
      gap: 7px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 7px;
    }

    .resource-card .number-field {
      grid-template-columns: 20px 34px 44px 34px 20px;
    }

    .resource-card .number-field button:not(.resource-step-five) {
      font-size: 11px;
    }

    .resource-heading {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      min-width: 0;
    }

    .resource-face {
      position: relative;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      overflow: hidden;
      background: transparent;
    }

    .resource-face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .resource-face-fallback {
      width: 100%;
      height: 100%;
      min-height: 92px;
      display: grid;
      place-items: center;
      padding: 8px;
      background:
        linear-gradient(135deg, rgba(23, 108, 98, 0.16), rgba(138, 91, 23, 0.18)),
        #fbfaf5;
      color: var(--ink);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
    }

    .resource-name {
      display: grid;
      gap: 2px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.05;
      min-width: 0;
    }

    .resource-name span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .matrix-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .matrix-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      border-bottom: 1px solid var(--line);
      background: #f8faf8;
      list-style: none;
      cursor: pointer;
    }

    .matrix-head::-webkit-details-marker {
      display: none;
    }

    .matrix-head::before {
      content: ">";
      color: var(--muted);
      font-weight: 900;
      transition: transform 0.16s ease;
    }

    details[open] > .matrix-head::before {
      transform: rotate(90deg);
    }

    .matrix-head h2 {
      font-size: 16px;
      line-height: 1.2;
      margin-right: auto;
    }

    .matrix-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .matrix-tools button {
      min-height: 34px;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(12, 48px);
      gap: 0;
      width: max-content;
      min-width: 100%;
    }

    .matrix button {
      min-height: 36px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      padding: 0;
      font-size: 12px;
      cursor: default;
    }

    .matrix.unlocked button {
      cursor: pointer;
    }

    .matrix.locked {
      background: #fafafa;
    }

    .matrix button.marked {
      background: var(--accent);
      color: #fff;
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .map-slot {
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .map-slot span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 6px;
    }

    .timeline-day {
      display: grid;
      gap: 3px;
      min-height: 52px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px;
      text-align: left;
    }

    .timeline-day.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .timeline-day.event {
      box-shadow: inset 0 -3px 0 var(--accent-2);
    }

    .timeline-day small {
      color: inherit;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.2;
      opacity: 0.82;
    }

    .status-line {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 980px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar-tools {
        justify-items: stretch;
        min-width: 0;
      }

      .header-fields {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        justify-content: flex-start;
      }

      .identity-grid,
      .ship-grid,
      .summon-pickers {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .resource-grid,
      .notes-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .summon-controls button {
        align-self: stretch;
      }

      .rooting-tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .identity-grid,
      .header-fields,
      .ship-grid,
      .record-basics,
      .resource-grid,
      .summon-controls,
      .summon-pickers,
      .titan-row,
      .titan-add-row,
      .notes-grid,
      .adventure-list,
      .track-row,
      .map-grid {
        grid-template-columns: 1fr;
      }

      .titan-list-panel {
        grid-column: 1;
      }

      .summon-usage {
        grid-template-columns: minmax(68px, auto) auto;
        justify-content: start;
      }

    }

    @media print {
      body {
        background: #fff;
      }

      .app {
        width: 100%;
        padding: 0;
      }

      .toolbar,
      .number-field button {
        display: none;
      }

      .panel {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
