    function applyRequestedCycleFromUrl() {
      if (!requestedCycleFromUrl) return false;
      state.cycle = requestedCycleFromUrl;
      return true;
    }

    function isPlainObject(value) {
      return value && typeof value === "object" && !Array.isArray(value);
    }

    function cloneJson(value) {
      return value === undefined ? undefined : JSON.parse(JSON.stringify(value));
    }

    function jsonEqual(left, right) {
      if (left === right) return true;
      if (Array.isArray(left) || Array.isArray(right)) {
        return Array.isArray(left)
          && Array.isArray(right)
          && left.length === right.length
          && left.every((value, index) => jsonEqual(value, right[index]));
      }
      if (isPlainObject(left) || isPlainObject(right)) {
        if (!isPlainObject(left) || !isPlainObject(right)) return false;
        const leftKeys = Object.keys(left);
        const rightKeys = Object.keys(right);
        return leftKeys.length === rightKeys.length
          && leftKeys.every((key) => Object.prototype.hasOwnProperty.call(right, key) && jsonEqual(left[key], right[key]));
      }
      return false;
    }

    function mergeRecordChanges(base, local, remote, path = "") {
      if (jsonEqual(local, remote)) return { value: cloneJson(local), conflicts: [] };
      if (jsonEqual(local, base)) return { value: cloneJson(remote), conflicts: [] };
      if (jsonEqual(remote, base)) return { value: cloneJson(local), conflicts: [] };

      if (isPlainObject(base) || isPlainObject(local) || isPlainObject(remote)) {
        const baseObject = isPlainObject(base) ? base : {};
        const localObject = isPlainObject(local) ? local : {};
        const remoteObject = isPlainObject(remote) ? remote : {};
        const value = {};
        const conflicts = [];
        const keys = new Set([
          ...Object.keys(baseObject),
          ...Object.keys(localObject),
          ...Object.keys(remoteObject),
        ]);

        keys.forEach((key) => {
          const childPath = path ? `${path}.${key}` : key;
          const result = mergeRecordChanges(baseObject[key], localObject[key], remoteObject[key], childPath);
          if (result.value !== undefined) value[key] = result.value;
          conflicts.push(...result.conflicts);
        });
        return { value, conflicts };
      }

      return {
        value: cloneJson(local),
        conflicts: [path || "record"],
      };
    }

    function recordStateFromCampaign(campaign) {
      const dashboard = campaign?.sections?.dashboard;
      const userId = dashboard?.activeProfileId || campaignUserId || "default";
      const recordSection = campaign?.sections?.record;
      const userState = recordSection?.users?.[userId] || (recordSection?.users ? null : recordSection);
      return {
        userId,
        state: normalizeState(userState || defaultState),
        revision: Math.max(0, Number(campaign?.sectionRevisions?.record || 0)),
      };
    }

    async function readLatestRecordState() {
      const response = await fetch(serverStorageUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      if (!payload.ok) throw new Error(payload.error || "读取失败");
      return recordStateFromCampaign(payload.campaign || {});
    }

    async function syncRecordFromExternalUpdate(options = {}) {
      if (!serverStorageAvailable || serverExternalSyncInFlight || serverConflictMerging || serverSaveInFlight) return;
      serverExternalSyncInFlight = true;
      try {
        const latest = await readLatestRecordState();
        if (latest.revision <= serverSectionRevision) {
          if (options.retry && !options.retried) {
            window.setTimeout(() => void syncRecordFromExternalUpdate({ retry: true, retried: true }), 500);
          }
          return;
        }
        const localChanged = !jsonEqual(state, serverStateBaseline || state);
        campaignUserId = latest.userId;
        serverSectionRevision = latest.revision;
        if (!localChanged) {
          serverStateBaseline = cloneJson(latest.state);
          state = latest.state;
          renderAll();
          setSaveStatus("已自动载入其他页面的最新修改");
          return;
        }

        const merged = mergeRecordChanges(serverStateBaseline || defaultState, state, latest.state);
        serverStateBaseline = cloneJson(latest.state);
        if (merged.conflicts.length) {
          const shown = merged.conflicts.slice(0, 8).join("\n");
          const more = merged.conflicts.length > 8 ? `\n另有 ${merged.conflicts.length - 8} 项` : "";
          if (!window.confirm(`其他页面修改了记录表中的相同字段：\n${shown}${more}\n\n确定：保留当前页面的值并合并\n取消：加载其他页面的最新修改`)) {
            state = latest.state;
            renderAll();
            setSaveStatus("已加载其他页面的最新记录表");
            return;
          }
        }
        state = normalizeState(merged.value);
        renderAll();
        setSaveStatus("已合并其他页面的修改，正在同步");
        queueServerSave();
      } catch (error) {
        console.warn(error);
      } finally {
        serverExternalSyncInFlight = false;
      }
    }

    function loadState() {
      return normalizeState(defaultState);
    }

    function defaultDayForCycle(cycleId) {
      return cycleId === "c1" ? "T0" : "0";
    }

    function normalizeCycleDay(value, cycleId) {
      const text = String(value ?? "").trim().toUpperCase();
      if (cycleId === "c1" && /^(?:T[0-5]|T6\/00)$/.test(text)) return text;
      if (text === "") return defaultDayForCycle(cycleId);
      return String(Math.max(0, Math.floor(Number(text) || 0)));
    }

    function normalizeState(value) {
      const legacySummonLimit = value?.summonLimit ?? "";
      const titans = normalizeTitanList(value?.titans, value?.titan);
      const hasTitanLimit = value && Object.prototype.hasOwnProperty.call(value, "titanLimit");
      const { apotheosis: _removedApotheosis, ...storedState } = isPlainObject(value) ? value : {};
      return {
        ...defaultState,
        ...storedState,
        cycle: cycleData[value?.cycle] ? value.cycle : defaultState.cycle,
        godformLimit: value?.godformLimit ?? legacySummonLimit,
        nymphLimit: value?.nymphLimit ?? legacySummonLimit,
        godformUsed: normalizeCount(value?.godformUsed),
        nymphUsed: normalizeCount(value?.nymphUsed),
        nymphCharges: normalizeCount(value?.nymphCharges),
        hull: value?.hull === "" || value?.hull === null || value?.hull === undefined ? defaultState.hull : String(value.hull),
        crew: value?.crew === "" || value?.crew === null || value?.crew === undefined ? defaultState.crew : String(value.crew),
        enemies: isPlainObject(value?.enemies) ? value.enemies : {},
        crewBoxes: isPlainObject(value?.crewBoxes) ? value.crewBoxes : {},
        cycleStats: normalizeCycleStats(value),
        cycleDays: isPlainObject(value?.cycleDays)
          ? value.cycleDays
          : { [cycleData[value?.cycle] ? value.cycle : defaultState.cycle]: normalizeCycleDay(value?.day, value?.cycle) },
        adventures: isPlainObject(value?.adventures) ? value.adventures : {},
        diplomacy: isPlainObject(value?.diplomacy) ? value.diplomacy : {},
        resources: normalizeResources(value?.resources),
        map: isPlainObject(value?.map) ? value.map : {},
        matrix: normalizeMatrix(value?.matrix),
        maxUnlocked: isPlainObject(value?.maxUnlocked) ? value.maxUnlocked : {},
        pygmalion: isPlainObject(value?.pygmalion) ? value.pygmalion : {},
        rooting: normalizeRooting(value?.rooting),
        godforms: normalizeSummonSelection(value?.godforms, summonCards.godforms),
        nymphCards: normalizeSummonSelection(value?.nymphCards, summonCards.nymphs),
        godformUsedCards: normalizeSummonSelection(value?.godformUsedCards, summonCards.godforms),
        nymphUsedCards: normalizeSummonSelection(value?.nymphUsedCards, summonCards.nymphs),
        titans,
        titanLimit: hasTitanLimit ? normalizeTitanLimit(value?.titanLimit) : migrateTitanLimit(titans),
        titan: undefined,
      };
    }

    function normalizeCycleStats(value) {
      const stats = isPlainObject(value?.cycleStats) ? cloneJson(value.cycleStats) : {};
      const activeCycle = cycleData[value?.cycle] ? value.cycle : defaultState.cycle;
      stats[activeCycle] ||= {};
      [
        "storyCard", "doomCard", "mapTiles", "fate", "aaLimit", "knowledge",
        "humanity", "renegade", "strangers", "loopLength", "frozenTime", "paradox", "hull", "crew",
        "boons", "afflictions", "counters", "notes", "syncLog",
      ].forEach((key) => {
        if (stats[activeCycle][key] === undefined && value?.[key] !== undefined) {
          stats[activeCycle][key] = value[key];
        }
      });
      return stats;
    }

    function normalizeResources(value) {
      const resources = isPlainObject(value) ? cloneJson(value) : {};
      sharedResourceKeys.forEach((key) => {
        migrateSharedResourceKey(resources, key);
        migrateSharedResourceKey(resources, `${key}-names`);
      });
      return resources;
    }

    function migrateSharedResourceKey(resources, key) {
      const values = Object.keys(cycleData)
        .map((cycleId) => resources[`${cycleId}-${key}`])
        .filter((value) => value !== undefined && value !== null && value !== "");
      if (resources[key] !== undefined && resources[key] !== null && resources[key] !== "") {
        values.unshift(resources[key]);
      }
      if (!values.length) return;
      const numericValues = values
        .map((value) => Number(value))
        .filter((value) => Number.isFinite(value));
      resources[key] = numericValues.length === values.length
        ? Math.max(...numericValues)
        : values.map(String).filter(Boolean).join("\n");
      Object.keys(cycleData).forEach((cycleId) => {
        delete resources[`${cycleId}-${key}`];
      });
    }

    function normalizeRooting(value) {
      const normalized = {};
      if (!isPlainObject(value)) return normalized;
      Object.entries(value).forEach(([cycleId, rows]) => {
        normalized[cycleId] = Array.isArray(rows)
          ? rows
            .filter((row) => isPlainObject(row) && row.from && row.to)
            .map((row) => ({ from: String(row.from), to: String(row.to) }))
          : [];
      });
      return normalized;
    }

    function normalizeCount(value) {
      if (value === "" || value === null || value === undefined) return "0";
      return String(Math.max(0, Number(value || 0)));
    }

    function normalizeSummonSelection(selection, cardList) {
      if (!Array.isArray(selection)) return [];
      const validIds = new Set(cardList.map((card) => card.id));
      return [...new Set(selection.map(String))].filter((id) => validIds.has(id));
    }

    function normalizeTitanList(value, legacyTitanCount = "") {
      if (Array.isArray(value)) {
        return value
          .filter(isPlainObject)
          .map((item) => ({
            id: String(item.id || `titan-${Date.now()}-${Math.random().toString(16).slice(2)}`),
            name: String(item.name || "泰坦"),
            count: Math.max(1, Math.floor(Number(item.count || 1))),
            limit: Math.max(1, Math.floor(Number(item.limit || item.count || 1))),
            crippled: Boolean(item.crippled),
          }));
      }

      const count = Math.max(0, Math.floor(Number(legacyTitanCount || 0)));
      return count > 0
        ? [{ id: "legacy-titan", name: "泰坦", count, limit: count, crippled: false }]
        : [];
    }

    function normalizeTitanLimit(value) {
      if (value !== "" && value !== null && value !== undefined) {
        return String(Math.max(0, Math.floor(Number(value || 0))));
      }
      return "";
    }

    function migrateTitanLimit(titans = []) {
      const migratedLimit = titans.reduce((sum, titan) => {
        return sum + Math.max(1, Math.floor(Number(titan.limit || titan.count || 1)));
      }, 0);
      return migratedLimit ? String(migratedLimit) : "";
    }

    function normalizeMatrix(matrix) {
      if (!isPlainObject(matrix)) return {};
      const normalized = {};
      Object.entries(matrix).forEach(([key, value]) => {
        const sharedKey = key.replace(/^c\d-/, "");
        normalized[sharedKey] = Boolean(value);
      });
      return normalized;
    }

    function currentCycle() {
      return cycleData[state.cycle] || cycleData.c2;
    }

    function saveState() {
      queueServerSave();
      setSaveStatus(serverStorageAvailable
        ? `正在同步 NAS ${new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`
        : "NAS 存档接口不可用，当前修改只保留在页面内存中");
    }

    function setSaveStatus(message) {
      if (elements.saveStatus) elements.saveStatus.textContent = message;
    }

    async function loadServerState() {
      try {
        const response = await fetch(serverStorageUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.error || "读取失败");
        serverStorageAvailable = true;
        const flushQueuedSave = serverSaveQueuedBeforeReady;
        serverSaveQueuedBeforeReady = false;
        const latest = recordStateFromCampaign(payload.campaign || {});
        campaignUserId = latest.userId;
        serverSectionRevision = latest.revision;
        serverStateBaseline = cloneJson(latest.state);
        if (payload.campaign?.sections?.record) {
          state = latest.state;
          applyRequestedCycleFromUrl();
          renderAll();
          setSaveStatus(`已从 NAS 读取 ${new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`);
        } else {
          setSaveStatus("NAS 存档已启用，当前账号首次修改时会创建记录表存档");
        }
        if (flushQueuedSave) queueServerSave();
      } catch (error) {
        serverStorageAvailable = false;
        console.warn(error);
        setSaveStatus("NAS 存档接口不可用，当前仅保存到本机浏览器");
      }
    }

    function queueServerSave() {
      if (!serverStorageAvailable) {
        serverSaveQueuedBeforeReady = true;
        return;
      }
      clearTimeout(serverSaveTimer);
      serverSaveTimer = setTimeout(saveStateToServer, 260);
    }

    async function saveStateToServer() {
      if (!serverStorageAvailable) return;
      if (serverSaveInFlight) {
        serverSavePending = true;
        return;
      }
      serverSaveInFlight = true;
      serverSavePending = false;
      const stateBeingSaved = cloneJson(state);
      try {
        const response = await fetch(serverStorageUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            section: serverStorageSection,
            userId: campaignUserId,
            state: stateBeingSaved,
            expectedRevision: serverSectionRevision,
          }),
        });
        const payload = await response.json().catch(() => null);
        if (response.status === 409 && payload?.code === "SAVE_CONFLICT") {
          serverSavePending = false;
          if (!serverConflictMerging) {
            serverConflictMerging = true;
            const latest = await readLatestRecordState();
            const merged = mergeRecordChanges(serverStateBaseline || defaultState, state, latest.state);
            campaignUserId = latest.userId;
            serverSectionRevision = latest.revision;
            serverStateBaseline = cloneJson(latest.state);

            if (merged.conflicts.length) {
              const shown = merged.conflicts.slice(0, 8).join("\n");
              const more = merged.conflicts.length > 8 ? `\n另有 ${merged.conflicts.length - 8} 项` : "";
              const keepLocal = window.confirm(
                `另一个页面修改了记录表中的相同字段：\n${shown}${more}\n\n确定：保留当前页面的值并合并保存\n取消：放弃当前页面修改并加载服务器最新数据`
              );
              if (!keepLocal) {
                state = latest.state;
                renderAll();
                setSaveStatus("已加载服务器最新记录表");
                serverConflictMerging = false;
                return;
              }
            }

            state = normalizeState(merged.value);
            renderAll();
            serverSavePending = true;
            serverConflictMerging = false;
            setSaveStatus("已自动合并其他页面的修改，正在重新同步");
          }
          return;
        }
        if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
        serverSectionRevision = Math.max(0, Number(payload.revision || serverSectionRevision));
        serverStateBaseline = stateBeingSaved;
        recordSyncChannel?.postMessage({ revision: serverSectionRevision });
        setSaveStatus(`已同步到 NAS ${new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`);
      } catch (error) {
        serverConflictMerging = false;
        console.warn(error);
        setSaveStatus("NAS 同步失败，本机浏览器已有临时存档");
      } finally {
        serverSaveInFlight = false;
        if (serverSavePending) saveStateToServer();
      }
    }

    function normalizeAdventureTitle(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/travelled/g, "traveled")
        .replace(/[^a-z0-9]+/g, "");
    }

    function adventureSlotLabel(slot) {
      if (slot === "alpha") return "Alpha";
      if (slot === "omega") return "Omega";
      if (slot === "mid1") return "左侧空白格";
      if (slot === "mid2") return "右侧空白格";
      return slot || "";
    }

    function appendSyncLog(message) {
      const stamp = new Date().toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
      const line = `${stamp} ${message}`;
      setCycleStat("syncLog", [line, getCycleStat("syncLog")].filter(Boolean).join("\n").slice(0, 6000));
    }

    function markAdventureFromSurvey(cycleId, adventureTitle, boxId) {
      if (!cycleData[cycleId] || !adventureTitle) return false;
      const target = normalizeAdventureTitle(adventureTitle);
      const index = cycleData[cycleId].adventures.findIndex(([, en]) => normalizeAdventureTitle(en) === target);
      if (index < 0) return false;

      const prefix = `${cycleId}-${index}`;
      let slot = "";
      if (boxId === "alpha" || boxId === "omega") {
        slot = boxId;
      } else if (!state.adventures[`${prefix}-mid1`]) {
        slot = "mid1";
      } else if (!state.adventures[`${prefix}-mid2`]) {
        slot = "mid2";
      }

      if (!slot) return false;
      delete state.adventures[prefix];
      state.adventures[`${prefix}-${slot}`] = true;
      return slot;
    }

    function consumeDashboardSurveyNote() {
      const params = new URLSearchParams(window.location.search || "");
      if (params.get("surveyAction") !== "adventure") return false;

      const cycle = params.get("cycle");
      if (cycleData[cycle]) state.cycle = cycle;
      const day = params.get("day");
      if (day != null && day !== "") {
        const normalizedDay = normalizeCycleDay(day, state.cycle);
        state.day = normalizedDay;
        state.cycleDays[state.cycle] = normalizedDay;
      }
      const adventure = params.get("adventure") || "";
      const slot = markAdventureFromSurvey(state.cycle, adventure, params.get("box") || "");
      if (slot) {
        appendSyncLog(`Day ${state.day} 定数写入：${adventure} -> ${adventureSlotLabel(slot)}`);
      }

      try {
        window.history?.replaceState?.(null, "", window.location.pathname || "index.html");
      } catch {
      }
      return true;
    }

    function queueSave() {
      setSaveStatus("正在保存...");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveState, 160);
    }

    function currentCycleStats() {
      state.cycleStats ||= {};
      state.cycleStats[state.cycle] ||= {};
      return state.cycleStats[state.cycle];
    }

    function getCycleStat(key) {
      return currentCycleStats()[key] ?? "";
    }

    function setCycleStat(key, value) {
      currentCycleStats()[key] = value;
      if (cycleScopedBindKeys.has(key)) {
        delete state[key];
      } else {
        state[key] = value;
      }
    }

    function getBindValue(key) {
      return cycleScopedBindKeys.has(key) ? getCycleStat(key) : state[key] ?? "";
    }

    function setBindValue(key, value) {
      if (cycleScopedBindKeys.has(key)) {
        setCycleStat(key, value);
        return;
      }
      state[key] = value;
    }

    function setupIdentityNumberFields() {
      const config = {
        fate: { min: 0, max: 12 },
        humanity: { min: null, max: null },
        renegade: { min: 0, max: null },
        strangers: { min: 0, max: null },
        loopLength: { min: 0, max: null },
        frozenTime: { min: 0, max: null },
        paradox: { min: 0, max: 12 },
      };

      Object.entries(config).forEach(([bindKey, limits]) => {
        const input = document.querySelector(`[data-cycle-bind="${bindKey}"]`);
        if (!input || input.dataset.stepBound === "1") return;
        const label = input.closest("label");
        if (!label) return;

        const wrapper = document.createElement("span");
        wrapper.className = "number-field";
        if (bindKey === "fate") wrapper.classList.add("fate-number-field");
        wrapper.dataset.stepField = bindKey;

        const down = document.createElement("button");
        down.type = "button";
        down.dataset.step = "down";
        down.textContent = "-";

        const up = document.createElement("button");
        up.type = "button";
        up.dataset.step = "up";
        up.textContent = "+";

        if (limits.min !== null) {
          input.min = String(limits.min);
        } else {
          input.removeAttribute("min");
        }
        if (limits.max !== null) {
          input.max = String(limits.max);
        } else {
          input.removeAttribute("max");
        }

        input.replaceWith(wrapper);
        wrapper.append(down, input, up);
        if (bindKey === "fate") {
          const rollback = document.createElement("button");
          rollback.type = "button";
          rollback.className = "fate-rollback";
          rollback.textContent = "回退";
          rollback.title = "C1 -2 命运，C2 -3 命运";
          rollback.addEventListener("click", () => {
            const delta = state.cycle === "c1" ? 2 : state.cycle === "c2" ? 3 : 0;
            if (!delta) return;
            sync(Number(input.value || 0) - delta);
          });
          wrapper.appendChild(rollback);
        }
        input.dataset.stepBound = "1";

        const clamp = (value) => {
          let next = Number(value || 0);
          if (!Number.isFinite(next)) next = 0;
          if (limits.min !== null) next = Math.max(limits.min, next);
          if (limits.max !== null) next = Math.min(limits.max, next);
          return next;
        };

        const sync = (value) => {
          const next = clamp(value);
          input.value = String(next);
          setCycleStat(bindKey, String(next));
          queueSave();
        };

        down.addEventListener("click", () => sync(Number(input.value || 0) - 1));
        up.addEventListener("click", () => sync(Number(input.value || 0) + 1));
        input.addEventListener("input", () => sync(input.value));
      });
    }

    function setupAaLimitField() {
      const input = document.querySelector('[data-cycle-bind="aaLimit"]');
      const controls = document.querySelector(".summon-controls");
      if (!input || !controls || input.closest(".summon-controls")) return;

      const oldLabel = input.closest("label");
      const label = document.createElement("label");
      label.className = "summon-usage";

      const text = document.createElement("span");
      text.textContent = "AA 上限";

      const field = document.createElement("span");
      field.className = "summon-usage-fields aa-limit-field";

      field.appendChild(input);
      label.append(text, field);
      elements.powerTideButton.after(label);
      oldLabel?.remove();
    }

    function setupPanelOrder() {
      const summonPanel = document.querySelector(".summon-panel")?.closest(".panel");
      const enemyPanel = elements.enemyTracks?.closest(".panel");
      const diplomacyPanel = elements.diplomacyTracks?.closest(".panel");
      const adventurePanel = elements.adventureList?.closest(".panel");

      if (enemyPanel && diplomacyPanel && enemyPanel.previousElementSibling !== diplomacyPanel) {
        enemyPanel.before(diplomacyPanel);
      }
      if (summonPanel && adventurePanel && adventurePanel.previousElementSibling !== summonPanel) {
        adventurePanel.before(summonPanel);
      }
    }

    function bindInputs() {
      setupPanelOrder();
      setupAaLimitField();
      setupIdentityNumberFields();
      document.querySelectorAll("[data-bind]").forEach((input) => {
        input.value = getBindValue(input.dataset.bind);
        input.addEventListener("input", () => {
          setBindValue(input.dataset.bind, input.value);
          if (summonUsageKeys.has(input.dataset.bind)) {
            renderSummons();
          }
          queueSave();
        });
        input.addEventListener("change", () => {
          setBindValue(input.dataset.bind, input.value);
          if (input.dataset.bind === "cycle") {
            renderAll();
          } else if (summonUsageKeys.has(input.dataset.bind)) {
            renderSummons();
          }
          queueSave();
        });
      });
      document.querySelectorAll("[data-cycle-bind]").forEach((input) => {
        input.value = getCycleStat(input.dataset.cycleBind);
        input.addEventListener("input", () => {
          setCycleStat(input.dataset.cycleBind, input.value);
          queueSave();
        });
      });
    }

    function renderCycleOptions() {
      elements.cycleSelect.innerHTML = Object.entries(cycleData)
        .map(([id, cycle]) => `<option value="${id}">${cycle.label}</option>`)
        .join("");
      elements.cycleSelect.value = state.cycle;
    }

    function renderSummons() {
      renderSummonOptions();
      renderSummonList(elements.godformList, "godforms", summonCards.godforms, "尚未添加神之形态");
      renderSummonList(elements.nymphList, "nymphCards", summonCards.nymphs, "尚未添加宁芙");
      renderSummonCounts();
      updateSummonActionButtons();
    }

    function renderSummonCounts() {
      syncSummonUsedCounts();
      elements.godformCount.textContent = `已添加 ${state.godforms.length}/${summonCards.godforms.length} · 已用 ${state.godformUsedCards.length}`;
      elements.nymphCount.textContent = `已添加 ${state.nymphCards.length}/${summonCards.nymphs.length} · 充能 ${formatLimitedUsage(state.nymphCharges, state.nymphLimit)} · 已召唤 ${state.nymphUsedCards.length}`;
    }

    function syncSummonUsedCounts() {
      state.godformUsedCards = state.godformUsedCards.filter((id) => state.godforms.includes(id));
      state.nymphUsedCards = state.nymphUsedCards.filter((id) => state.nymphCards.includes(id));
      state.godformUsed = String(state.godformUsedCards.length);
      state.nymphUsed = String(state.nymphUsedCards.length);
      state.nymphCharges = String(getNymphCharges());
      document.querySelector('[data-bind="godformUsed"]').value = state.godformUsed;
      document.querySelector('[data-bind="nymphCharges"]').value = state.nymphCharges;
    }

    function formatUsage(used, limit) {
      const usedValue = Math.max(0, Number(used || 0));
      return limit === "" || limit === null || limit === undefined
        ? String(usedValue)
        : `${usedValue}/${Math.max(0, Number(limit || 0))}`;
    }

    function formatLimitedUsage(used, limit) {
      const usedValue = Math.max(0, Number(used || 0));
      return `${usedValue}/${limit === "" || limit === null || limit === undefined ? "-" : Math.max(0, Number(limit || 0))}`;
    }

    function getNymphCharges() {
      const charges = Math.max(0, Math.floor(Number(state.nymphCharges || 0)));
      return hasNymphLimit() ? Math.min(charges, getNymphLimit()) : charges;
    }

    function hasNymphLimit() {
      return state.nymphLimit !== "" && state.nymphLimit !== null && state.nymphLimit !== undefined;
    }

    function getNymphLimit() {
      return Math.max(0, Math.floor(Number(state.nymphLimit || 0)));
    }

    function isNymphSummonLimitReached() {
      if (!hasNymphLimit()) return false;
      return state.nymphUsedCards.length >= getNymphLimit();
    }

    function titanTotals() {
      return state.titans.reduce((totals, titan) => {
        const count = Math.max(1, Number(titan.count || 1));
        totals.total += count;
        if (titan.crippled) totals.crippled += count;
        return totals;
      }, { total: 0, crippled: 0 });
    }

    function updateTitanListCount() {
      const totals = titanTotals();
      const limit = state.titanLimit === "" ? "-" : Math.max(0, Number(state.titanLimit || 0));
      elements.titanListCount.textContent = `总数 ${totals.total}/${limit} · 残废 ${totals.crippled}`;
    }

    function renderTitans() {
      state.titans = normalizeTitanList(state.titans);
      state.titanLimit = normalizeTitanLimit(state.titanLimit);
      elements.titanLimitInput.value = state.titanLimit;
      updateTitanListCount();
      elements.titanList.innerHTML = "";

      if (!state.titans.length) {
        const empty = document.createElement("div");
        empty.className = "titan-empty";
        empty.textContent = "尚未添加泰坦";
        elements.titanList.appendChild(empty);
        return;
      }

      state.titans.forEach((titan, index) => {
        const row = document.createElement("div");
        row.className = "titan-row";

        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = titan.name;
        nameInput.placeholder = "泰坦名称";
        nameInput.addEventListener("input", () => {
          state.titans[index].name = nameInput.value;
          queueSave();
        });

        const countInput = document.createElement("input");
        countInput.type = "number";
        countInput.min = "1";
        countInput.step = "1";
        countInput.value = titan.count;
        countInput.title = "当前数量";
        countInput.setAttribute("aria-label", `${titan.name || "泰坦"} 数量`);
        countInput.addEventListener("input", () => {
          state.titans[index].count = Math.max(1, Math.floor(Number(countInput.value || 1)));
          updateTitanListCount();
          queueSave();
        });
        const countField = document.createElement("label");
        countField.className = "titan-number-field";
        countField.append("数量", countInput);

        const crippledLabel = document.createElement("label");
        crippledLabel.className = "titan-crippled";
        const crippledInput = document.createElement("input");
        crippledInput.type = "checkbox";
        crippledInput.checked = Boolean(titan.crippled);
        crippledInput.addEventListener("change", () => {
          state.titans[index].crippled = crippledInput.checked;
          updateTitanListCount();
          queueSave();
        });
        const crippledText = document.createElement("span");
        crippledText.textContent = "残废";
        crippledLabel.append(crippledInput, crippledText);

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "titan-remove";
        removeButton.textContent = "删除";
        removeButton.addEventListener("click", () => {
          state.titans.splice(index, 1);
          renderTitans();
          queueSave();
        });

        row.append(nameInput, countField, crippledLabel, removeButton);
        elements.titanList.appendChild(row);
      });
    }

    function addTitan() {
      const name = elements.titanNameInput.value.trim() || "泰坦";
      const count = Math.max(1, Math.floor(Number(elements.titanCountInput.value || 1)));
      state.titans.push({
        id: `titan-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name,
        count,
        crippled: elements.titanCrippledInput.checked,
      });
      elements.titanNameInput.value = "";
      elements.titanCountInput.value = "1";
      elements.titanCrippledInput.checked = false;
      renderTitans();
      queueSave();
    }

    function renderAll() {
      renderCycleOptions();
      document.querySelectorAll("[data-bind]").forEach((input) => {
        input.value = getBindValue(input.dataset.bind);
      });
      const cycle = currentCycle();
      elements.cycleTag.textContent = `${cycle.subtitle} · ${cycle.fateWarning}`;
      renderCycleFields();
      renderCoreTracks();
      renderEnemyTracks();
      renderAdventures();
      renderDiplomacy();
      renderSummons();
      renderTitans();
      renderResources();
      renderTimeline();
      renderRooting();
      renderMap();
      renderMatrix();
      toggleCycleVisibility();
    }

    function renderCycleFields() {
      const cycle = currentCycle();
      elements.cycleTitle.textContent = cycle.label;
      elements.cycleWarning.textContent = cycle.fateWarning;
      document.querySelectorAll("[data-cycle-field]").forEach((field) => {
        field.classList.toggle("hidden", !field.dataset.cycleField.split(/\s+/).includes(state.cycle));
      });
      document.querySelectorAll("[data-cycle-bind]").forEach((input) => {
        const value = getCycleStat(input.dataset.cycleBind);
        input.value = value;
        state[input.dataset.cycleBind] = value;
      });
      state.day = String(state.cycleDays?.[state.cycle] ?? defaultDayForCycle(state.cycle));
    }

    function toggleCycleVisibility() {
      const cyclePanels = [
        elements.mapGrid?.closest(".panel"),
        elements.timeline?.closest(".panel"),
        elements.rootingPanel?.closest(".panel"),
      ].filter(Boolean);

      cyclePanels.forEach((el) => {
        el.classList.add("hidden");
      });

      document.querySelectorAll("[data-cycle-bind='knowledge']").forEach((field) => {
        field.closest("label")?.classList.add("hidden");
      });
    }

    function renderTimeline() {
      const cycle = currentCycle();
      const prefixDays = cycle.prefixDays || [];
      const firstNumericDay = prefixDays.length ? 1 : 0;
      const days = [
        ...prefixDays,
        ...Array.from({ length: cycle.maxDay - firstNumericDay + 1 }, (_, index) => String(index + firstNumericDay).padStart(2, "0")),
      ];
      const currentDay = String(state.cycleDays?.[state.cycle] ?? state.day ?? defaultDayForCycle(state.cycle));
      elements.timelineMeta.textContent = `当前 ${currentDay} · 共 ${days.length} 格`;
      elements.timeline.innerHTML = "";
      days.forEach((label) => {
        const numericDay = /^\d+$/.test(label) ? Number(label) : null;
        const eventText = numericDay === null ? "" : cycle.events?.[numericDay] || "";
        const button = document.createElement("button");
        button.type = "button";
        button.className = `timeline-day${currentDay === label || (numericDay !== null && Number(currentDay) === numericDay) ? " active" : ""}${eventText ? " event" : ""}`;
        button.append(document.createTextNode(label));
        if (eventText) {
          const small = document.createElement("small");
          small.textContent = eventText;
          button.appendChild(small);
        }
        button.addEventListener("click", () => {
          state.cycleDays[state.cycle] = label;
          state.day = label;
          renderTimeline();
          queueSave();
        });
        elements.timeline.appendChild(button);
      });
    }

    function renderMap() {
      elements.mapGrid.innerHTML = "";
      for (let index = 1; index <= 10; index += 1) {
        const key = `${state.cycle}-${index}`;
        const label = document.createElement("label");
        label.className = "map-slot";
        const text = document.createElement("span");
        text.textContent = `地图 ${index}`;
        const input = document.createElement("input");
        input.value = state.map[key] ?? "";
        input.placeholder = "板块 / 标记";
        input.addEventListener("input", () => {
          state.map[key] = input.value;
          queueSave();
        });
        label.append(text, input);
        elements.mapGrid.appendChild(label);
      }
    }

    function makeTrackTitle(zh, en) {
      const title = document.createElement("div");
      title.className = "track-name";
      title.innerHTML = `<strong>${escapeHtml(zh)}</strong><span>${escapeHtml(en || "")}</span>`;
      return title;
    }

    function renderTrack(container, zh, en, values, key, options = {}) {
      container.innerHTML = "";
      const title = makeTrackTitle(zh, en);
      const unlockKey = `${state.cycle}-${key}`;
      const cycleScoped = key === "hull" || key === "crew";
      const selectedValue = cycleScoped ? getCycleStat(key) : state[key];
      const isMaxLocked = (value) => Boolean(options.lockMax && (state.cycle === "c2" || state.cycle === "c3") && String(value) === String(values[0]) && !state.maxUnlocked[unlockKey]);
      if (options.lockMax && (state.cycle === "c2" || state.cycle === "c3")) {
        const unlockButton = document.createElement("button");
        unlockButton.type = "button";
        unlockButton.className = "track-lock-button";
        unlockButton.textContent = state.maxUnlocked[unlockKey] ? "锁回最大值" : "解锁最大值";
        unlockButton.addEventListener("click", () => {
          state.maxUnlocked[unlockKey] = !state.maxUnlocked[unlockKey];
          if (!state.maxUnlocked[unlockKey] && String(selectedValue ?? "") === String(values[0])) {
            if (cycleScoped) setCycleStat(key, "");
            else state[key] = "";
          }
          renderAll();
          queueSave();
        });
        title.appendChild(unlockButton);
      }
      const chips = document.createElement("div");
      chips.className = "chips";
      values.forEach((value, index) => {
        const locked = isMaxLocked(value);
        const button = document.createElement("button");
        button.type = "button";
        button.className = [
          "chip",
          options.className || "",
          String(selectedValue ?? "") === String(value) ? "active" : "",
          locked ? "locked-max" : "",
        ].filter(Boolean).join(" ");
        button.textContent = value;
        button.title = locked ? "循环 II 最大值需先解锁" : "";
        button.addEventListener("click", () => {
          if (locked) return;
          if (cycleScoped) setCycleStat(key, String(value));
          else state[key] = String(value);
          renderAll();
          queueSave();
        });
        if (options.extraBoxesKey) {
          const stack = document.createElement("span");
          stack.className = "chip-stack";
          const boxKey = `${state.cycle}-${key}-${index}-${value}`;
          const boxState = state[options.extraBoxesKey]?.[boxKey];
          const normalizedBoxState = boxState === true ? "refugee" : boxState || "";
          const extraBox = document.createElement("button");
          extraBox.type = "button";
          extraBox.className = `track-extra-box${normalizedBoxState ? ` ${normalizedBoxState}` : ""}`;
          extraBox.textContent = normalizedBoxState === "refugee" ? "R" : normalizedBoxState === "captive" ? "C" : "";
          extraBox.title = normalizedBoxState === "refugee" ? "难民" : normalizedBoxState === "captive" ? "俘虏" : "普通";
          extraBox.addEventListener("click", () => {
            state[options.extraBoxesKey] ||= {};
            const current = state[options.extraBoxesKey][boxKey] === true ? "refugee" : state[options.extraBoxesKey][boxKey] || "";
            const next = current === "" ? "refugee" : current === "refugee" ? "captive" : "";
            if (next) {
              state[options.extraBoxesKey][boxKey] = next;
            } else {
              delete state[options.extraBoxesKey][boxKey];
            }
            renderAll();
            queueSave();
          });
          stack.append(button, extraBox);
          chips.appendChild(stack);
        } else {
          chips.appendChild(button);
        }
      });
      container.append(title, chips);
    }

    function getEvolutionStage(value, index) {
      if (isPlainObject(value)) return value;
      return { id: `${String(value)}-${index}`, label: String(value), legacyId: String(value) };
    }

    function evolutionStages(values) {
      return values.map((value, index) => getEvolutionStage(value, index));
    }

    function getEvolutionStageKey(trackKey, stage) {
      if (stage.sharedWith) {
        return `${state.cycle}:shared:${[...stage.sharedWith].sort().join("+")}:${stage.id}`;
      }
      return `${state.cycle}:${trackKey}:${stage.id}`;
    }

    function clearEvolutionTrack(trackKey) {
      const directPrefix = `${state.cycle}:${trackKey}:`;
      const sharedPrefix = `${state.cycle}:shared:`;
      Object.keys(state.enemies || {}).forEach((key) => {
        if (key === trackKey || key.startsWith(directPrefix) || (key.startsWith(sharedPrefix) && key.includes(trackKey))) {
          delete state.enemies[key];
        }
      });
    }

    function hasEvolutionProgress(trackKey) {
      const directPrefix = `${state.cycle}:${trackKey}:`;
      const sharedPrefix = `${state.cycle}:shared:`;
      return Object.entries(state.enemies || {}).some(([key, value]) => {
        return Boolean(value) && (key === trackKey || key.startsWith(directPrefix) || (key.startsWith(sharedPrefix) && key.includes(trackKey)));
      });
    }

    function isEvolutionStageActive(trackKey, stage) {
      const markKey = getEvolutionStageKey(trackKey, stage);
      if (Object.prototype.hasOwnProperty.call(state.enemies, markKey)) {
        return Boolean(state.enemies[markKey]);
      }
      if (stage.marker === "triangle") return false;
      const legacyValue = state.enemies?.[trackKey];
      if (legacyValue === undefined || legacyValue === null || legacyValue === "") return false;
      return String(legacyValue) === String(stage.id) || (stage.legacyId != null && String(legacyValue) === String(stage.legacyId));
    }

    function toggleEvolutionStage(trackKey, stage) {
      const markKey = getEvolutionStageKey(trackKey, stage);
      const nextValue = !isEvolutionStageActive(trackKey, stage);
      if (stage.sharedWith) {
        stage.sharedWith.forEach((sharedTrackKey) => {
          delete state.enemies[sharedTrackKey];
        });
      } else {
        delete state.enemies[trackKey];
      }
      state.enemies[markKey] = nextValue;
    }

    function renderObjectTrack(container, zh, en, values, group, key, options = {}) {
      const row = document.createElement("div");
      row.className = "track-row";
      const chips = document.createElement("div");
      chips.className = "chips";
      const normalizedValues = group === "enemies" ? evolutionStages(values) : values;
      const trackValues = group === "enemies" && (key === "adversary" || options.hasTriangle)
        ? [{ id: "triangle", label: "▲", marker: "triangle", title: "三角标志" }, ...normalizedValues]
        : normalizedValues;
      trackValues.forEach((value, index) => {
        const stage = group === "enemies" ? (isPlainObject(value) ? value : getEvolutionStage(value, index)) : (isPlainObject(value) ? value : { id: String(value), label: String(value) });
        if (stage.marker === "spacer") {
          const spacer = document.createElement("span");
          spacer.className = "chip";
          spacer.style.visibility = "hidden";
          chips.appendChild(spacer);
          return;
        }
        const active = group === "enemies"
          ? isEvolutionStageActive(key, stage)
          : String(state[group]?.[key] ?? "") === String(stage.id);
        const button = document.createElement("button");
        button.type = "button";
        button.className = [
          "chip",
          options.className || "",
          active ? "active" : "",
          stage.sharedWith ? "shared-stage" : "",
          stage.marker === "triangle" ? "triangle-marker" : "",
        ].filter(Boolean).join(" ");
        button.textContent = stage.label;
        button.title = stage.title || (stage.sharedWith ? "共用格：只占用这个格子，不移动另一条轨的其它进度" : "");
        button.addEventListener("click", () => {
          if (group === "enemies") {
            toggleEvolutionStage(key, stage);
          } else {
            state[group][key] = String(stage.id);
          }
          renderAll();
          queueSave();
        });
        chips.appendChild(button);
      });
      row.append(makeTrackTitle(zh, en), chips);
      container.appendChild(row);
    }

    function renderCoreTracks() {
      const cycle = currentCycle();
      renderTrack(elements.hullTrack, "船体", "Hull", cycle.hull, "hull", { className: "warning", lockMax: true });
      const crewOptions = { className: "warning", lockMax: true };
      if (state.cycle === "c2") {
        crewOptions.extraBoxesKey = "crewBoxes";
      }
      renderTrack(elements.crewTrack, "船员", "Crew", cycle.crew, "crew", crewOptions);
    }

    function renderEnemyTracks() {
      elements.enemyTracks.innerHTML = "";
      currentCycle().enemies.forEach((enemy) => {
        renderObjectTrack(elements.enemyTracks, enemy.zh, enemy.en, enemy.stages, "enemies", enemy.key, { className: "green", hasTriangle: enemy.hasTriangle });
      });
    }

    function renderAdventures() {
      const cycle = currentCycle();
      elements.adventureMeta.textContent = `${cycle.adventures.length} 条`;
      elements.adventureList.innerHTML = "";
      const slots = [
        { id: "alpha", label: "α" },
        { id: "mid1", label: "" },
        { id: "mid2", label: "" },
        { id: "omega", label: "Ω" },
      ];
      cycle.adventures.forEach(([zh, en], index) => {
        const legacyKey = `${state.cycle}-${index}`;
        const card = document.createElement("article");
        card.className = "check-card";
        const text = document.createElement("span");
        text.innerHTML = `<strong>${escapeHtml(zh)}</strong><span>${escapeHtml(en)}</span>`;
        const boxes = document.createElement("div");
        boxes.className = "adventure-boxes";
        slots.forEach((slot) => {
          const key = `${legacyKey}-${slot.id}`;
          const active = Boolean(state.adventures[key] || (slot.id === "omega" && state.adventures[legacyKey]));
          const button = document.createElement("button");
          button.type = "button";
          button.className = `adventure-box${active ? " active" : ""}`;
          button.textContent = slot.label;
          button.setAttribute("aria-label", `${zh} ${slot.id}`);
          button.addEventListener("click", () => {
            delete state.adventures[legacyKey];
            state.adventures[key] = !active;
            renderAdventures();
            queueSave();
          });
          boxes.appendChild(button);
        });
        card.append(text, boxes);
        elements.adventureList.appendChild(card);
      });
    }

    function renderDiplomacy() {
      elements.diplomacyTracks.innerHTML = "";
      const diplomacyBonuses = {
        c1: { "开战": "-3", "恶劣": "-2", "交恶": "-1", "中立": "0", "友善": "+1", "结盟": "+2" },
        c3: { "开战": "-3", "恶劣": "-2", "交恶": "-1", "中立": "0", "友善": "+1", "结盟": "+2" },
        c2: { "隐藏": "-1", "怀疑": "0", "友善": "+1", "结盟": "+2" },
      };
      const bonuses = diplomacyBonuses[state.cycle] || {};
      currentCycle().diplomacy.forEach(([key, zh, en, min = 0, max = 15]) => {
        const markers = min < 0
          ? [
              { value: -10, label: "开战" },
              { value: -5, label: "恶劣" },
              { value: -2, label: "交恶" },
              { value: 0, label: "中立" },
              { value: 4, label: "友善" },
              { value: 8, label: "结盟" },
            ]
          : [
              { value: 0, label: "隐藏" },
              { value: 3, label: "怀疑" },
              { value: 7, label: "友善" },
              { value: 12, label: "结盟" },
            ];
        const stateKey = `${state.cycle}-${key}`;
        const row = document.createElement("div");
        row.className = "diplomacy-row";
        const scale = document.createElement("div");
        scale.className = "diplomacy-scale";
        const markerRow = document.createElement("div");
        markerRow.className = "diplomacy-markers";
        markerRow.style.gridTemplateColumns = `repeat(${max - min + 1}, 34px)`;
        markers.forEach((marker) => {
          const item = document.createElement("span");
          item.className = "diplomacy-marker";
          item.style.gridColumn = String(marker.value - min + 1);
          const bonus = bonuses[marker.label];
          item.textContent = bonus != null ? `${marker.label}(${bonus})` : marker.label;
          markerRow.appendChild(item);
        });
        const chips = document.createElement("div");
        chips.className = "diplomacy-chips";
        chips.style.gridTemplateColumns = `repeat(${max - min + 1}, 34px)`;
        for (let value = min; value <= max; value += 1) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `chip${String(state.diplomacy[stateKey] ?? "") === String(value) ? " active" : ""}`;
          button.textContent = value > 0 ? `+${value}` : String(value);
          button.addEventListener("click", () => {
            state.diplomacy[stateKey] = String(value);
            renderDiplomacy();
            queueSave();
          });
          chips.appendChild(button);
        }
        scale.append(markerRow, chips);
        row.append(makeTrackTitle(zh, en), scale);
        elements.diplomacyTracks.appendChild(row);
      });
    }

    function getRootingRows() {
      if (!Array.isArray(state.rooting[state.cycle])) state.rooting[state.cycle] = [];
      return state.rooting[state.cycle];
    }

    function getRootingCard(cycleId, cardId) {
      return rootingData[cycleId]?.cards.find((card) => card.id === String(cardId)) || null;
    }

    function getRootingCardByCorner(cycleId, cornerNumber) {
      const data = rootingData[cycleId];
      if (!data) return null;
      const id = Object.entries(data.cornerNumbers || {})
        .find(([, number]) => String(number) === String(cornerNumber))?.[0];
      return id ? getRootingCard(cycleId, id) : null;
    }

    function getRootingCardLabel(cycleId, cardId) {
      const card = getRootingCard(cycleId, cardId);
      const corner = rootingData[cycleId]?.cornerNumbers?.[cardId];
      return card ? `${card.name} #${corner || card.id}` : `探索卡 #${cardId}`;
    }

    function applyAcclimation(acclimation) {
      const rows = getRootingRows();
      acclimation.from.forEach((fromCorner, index) => {
        const toCorner = acclimation.to[index];
        const fromCard = getRootingCardByCorner(state.cycle, fromCorner);
        const toCard = getRootingCardByCorner(state.cycle, toCorner);
        if (!fromCard || !toCard) return;
        const existing = rows.find((row) => row.from === fromCard.id);
        if (existing) {
          existing.to = toCard.id;
          existing.acclimation = acclimation.id;
        } else {
          rows.push({ from: fromCard.id, to: toCard.id, acclimation: acclimation.id });
        }
      });
      renderRooting();
      queueSave();
    }

    function renderRooting() {
      const data = rootingData[state.cycle];
      elements.rootingPanel.innerHTML = "";
      elements.rootingMeta.textContent = data ? "按 Acclimation 自动替换探索卡" : "本循环暂无适应替换";
      if (!data) {
        const empty = document.createElement("p");
        empty.className = "status-line";
        empty.textContent = "当前循环没有 Acclimation 替换记录。";
        elements.rootingPanel.appendChild(empty);
        return;
      }

      const rows = getRootingRows();
      const tools = document.createElement("div");
      tools.className = "rooting-tools";
      data.acclimations.forEach((acclimation) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = `${acclimation.label} D${acclimation.day}`;
        button.title = `${acclimation.from.join(", ")} -> ${acclimation.to.join(", ")}`;
        button.addEventListener("click", () => applyAcclimation(acclimation));
        tools.appendChild(button);
      });
      elements.rootingPanel.appendChild(tools);

      const list = document.createElement("div");
      list.className = "rooting-list";
      if (!rows.length) {
        const empty = document.createElement("p");
        empty.className = "status-line";
        empty.textContent = "还没有应用 Acclimation 替换。";
        list.appendChild(empty);
      } else {
        rows.forEach((row, index) => {
          const item = document.createElement("div");
          item.className = "rooting-row";
          const text = document.createElement("span");
          text.textContent = `${getRootingCardLabel(state.cycle, row.from)} -> ${getRootingCardLabel(state.cycle, row.to)}`;
          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "secondary";
          remove.textContent = "删除";
          remove.addEventListener("click", () => {
            rows.splice(index, 1);
            renderRooting();
            queueSave();
          });
          item.append(text, remove);
          list.appendChild(item);
        });
      }
      elements.rootingPanel.appendChild(list);

      const deck = document.createElement("div");
      deck.className = "rooting-deck";
      const replacementMap = new Map(rows.map((row) => [row.from, row.to]));
      data.cards
        .filter((card) => data.cornerNumbers?.[card.id])
        .sort((a, b) => Number(data.cornerNumbers[a.id]) - Number(data.cornerNumbers[b.id]))
        .forEach((card) => {
          const line = document.createElement("span");
          const replacement = replacementMap.get(card.id);
          const corner = data.cornerNumbers[card.id];
          line.textContent = replacement
            ? `${card.name} #${corner} -> ${getRootingCardLabel(state.cycle, replacement)}`
            : `${card.name} #${corner}`;
          deck.appendChild(line);
        });
      elements.rootingPanel.appendChild(deck);
    }

    function renderSummonOptions() {
      [
        [elements.godformSelect, summonCards.godforms],
        [elements.nymphSelect, summonCards.nymphs],
      ].forEach(([select, cardList]) => {
        const selected = select.value;
        select.innerHTML = cardList
          .map((card) => `<option value="${escapeAttribute(card.id)}">${escapeHtml(card.zh)} / ${escapeHtml(card.en)}</option>`)
          .join("");
        if (cardList.some((card) => card.id === selected)) {
          select.value = selected;
        }
      });
    }

    function addSummonCard(stateKey, select, cardList) {
      const id = select.value;
      if (!cardList.some((card) => card.id === id) || state[stateKey].includes(id)) return;
      state[stateKey] = [...state[stateKey], id];
      if (stateKey === "nymphCards") {
        state.nymph = String(state.nymphCards.length);
      }
      renderSummons();
      queueSave();
    }

    function toggleSummonCard(stateKey, select, cardList) {
      const id = select.value;
      if (!cardList.some((card) => card.id === id)) return;
      if (state[stateKey].includes(id)) {
        removeSummonCard(stateKey, id);
      } else {
        addSummonCard(stateKey, select, cardList);
      }
    }

    function removeSummonCard(stateKey, id) {
      const usedKey = getSummonUsedKey(stateKey);
      state[stateKey] = state[stateKey].filter((cardId) => cardId !== id);
      state[usedKey] = state[usedKey].filter((cardId) => cardId !== id);
      if (stateKey === "nymphCards") {
        state.nymph = String(state.nymphCards.length);
      }
      renderSummons();
      queueSave();
    }

    function getSummonUsedKey(stateKey) {
      return stateKey === "godforms" ? "godformUsedCards" : "nymphUsedCards";
    }

    function updateSummonActionButton(stateKey, select, button, addLabel, removeLabel) {
      const id = select.value;
      const selectedCard = (stateKey === "godforms" ? summonCards.godforms : summonCards.nymphs)
        .find((card) => card.id === id);
      const added = state[stateKey].includes(id);
      button.textContent = added ? removeLabel : addLabel;
      button.disabled = !selectedCard;
      button.title = selectedCard ? `${added ? removeLabel : addLabel} ${selectedCard.zh}` : "";
    }

    function updateSummonActionButtons() {
      updateSummonActionButton("godforms", elements.godformSelect, elements.addGodformButton, "添加神之形态", "移除神之形态");
      updateSummonActionButton("nymphCards", elements.nymphSelect, elements.addNymphButton, "添加宁芙", "移除宁芙");
    }

    function toggleSummonUsed(stateKey, id) {
      const usedKey = getSummonUsedKey(stateKey);
      if (!state[stateKey].includes(id)) return;
      const alreadyUsed = state[usedKey].includes(id);
      if (stateKey === "nymphCards") {
        const charges = getNymphCharges();
        if (!alreadyUsed) {
          if (isNymphSummonLimitReached() || charges <= 0) return;
          state.nymphCharges = String(charges - 1);
        } else {
          state.nymphCharges = String(charges + 1);
        }
      }
      state[usedKey] = alreadyUsed
        ? state[usedKey].filter((cardId) => cardId !== id)
        : [...state[usedKey], id];
      renderSummons();
      queueSave();
    }

    function restorePowerTide() {
      const restore = () => {
        state.godformUsedCards = [];
        state.nymphUsedCards = [];
        state.nymphCharges = String(hasNymphLimit() ? getNymphLimit() : 0);
        renderSummons();
        queueSave();
      };
      restore();
      window.setTimeout(restore, 80);
    }

    function renderSummonList(container, stateKey, cardList, emptyText) {
      container.innerHTML = "";
      const selectedCards = state[stateKey]
        .map((id) => cardList.find((card) => card.id === id))
        .filter(Boolean);
      if (!selectedCards.length) {
        const empty = document.createElement("div");
        empty.className = "summon-empty";
        empty.textContent = emptyText;
        container.appendChild(empty);
        return;
      }
      selectedCards.forEach((card) => {
        const item = document.createElement("article");
        const used = state[getSummonUsedKey(stateKey)].includes(card.id);
        item.className = `summon-card${used ? " used" : ""}`;
        item.tabIndex = 0;
        if (stateKey === "nymphCards" && !used && getNymphCharges() <= 0) {
          item.title = "宁芙充能不足";
        } else if (stateKey === "nymphCards" && !used && isNymphSummonLimitReached()) {
          item.title = "宁芙召唤已达上限";
        } else {
          item.title = used ? "点击撤销召唤" : (stateKey === "nymphCards" ? "点击召唤宁芙，消耗 1 点充能" : "点击标记为已用");
        }
        item.setAttribute("role", "button");
        item.setAttribute("aria-pressed", used ? "true" : "false");
        item.setAttribute("aria-label", `${card.zh} / ${card.en}，${used ? "已用" : "未用"}`);
        item.addEventListener("click", () => toggleSummonUsed(stateKey, card.id));
        item.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          toggleSummonUsed(stateKey, card.id);
        });
        const face = document.createElement("div");
        face.className = "summon-card-face";
        const image = document.createElement("img");
        image.src = card.image;
        image.alt = `${card.zh} ${card.en}`;
        image.loading = "lazy";
        face.appendChild(image);
        item.appendChild(face);
        container.appendChild(item);
      });
    }

    const resourceImageMap = {
      armament: "./assets/resource-icons/armament.png",
      blackChain: "./assets/resource-icons/blackChain.png",
      calcifiedKnuckle: "./assets/resource-icons/calcifiedKnuckle.png",
      chimericTar: "./assets/resource-icons/chimericTar.png",
      clothflesh: "./assets/resource-icons/clothflesh.png",
      core: "./assets/resource-icons/core.png",
      cyclopeanMetal: "./assets/resource-icons/cyclopeanMetal.png",
      daedalusMakina: "./assets/resource-icons/daedalusMakina.png",
      echoes: "./assets/resource-icons/echoes.png",
      eyesCluster: "./assets/resource-icons/eyesCluster.png",
      fearEssence: "./assets/resource-icons/fearEssence.png",
      fleshyMantle: "./assets/resource-icons/fleshyMantle.png",
      frozenAmbrosia: "./assets/resource-icons/frozenAmbrosia.png",
      grotesqueBeak: "./assets/resource-icons/grotesqueBeak.png",
      hyperboreanAlloy: "./assets/resource-icons/hyperboreanAlloy.png",
      icarianFeather: "./assets/resource-icons/icarianFeather.png",
      infusedMechanism: "./assets/resource-icons/infusedMechanism.png",
      livingAbyss: "./assets/resource-icons/livingAbyss.png",

      sisyphusTears: "./assets/resource-icons/sisyphusTears.png",
      skinOfMalice: "./assets/resource-icons/skinOfMalice.png",
      sunburnedSkull: "./assets/resource-icons/sunburnedSkull.png",
      supersolidRelief: "./assets/resource-icons/supersolidRelief.png",
      trireme: "./assets/resource-icons/trireme.png",
      violentAmbrosia: "./assets/resource-icons/violentAmbrosia.png",
      warMachine: "./assets/resource-icons/warMachine.png",
      warTrireme: "./assets/resource-icons/warTrireme.png",
      writhingTentacle: "./assets/resource-icons/writhingTentacle.png",
    };

    function createResourceCardImage(zh, en, key) {
      const initials = en.split(/\s+/).map((part) => part[0] || "").join("").slice(0, 3).toUpperCase();
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220">
          <defs>
            <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#f9f5e9"/>
              <stop offset="1" stop-color="#dce9e3"/>
            </linearGradient>
          </defs>
          <rect width="320" height="220" rx="18" fill="url(#bg)"/>
          <rect x="14" y="14" width="292" height="192" rx="14" fill="none" stroke="#9ca9a4" stroke-width="3"/>
          <text x="160" y="92" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="800" fill="#176c62">${escapeSvg(initials || key.slice(0, 3).toUpperCase())}</text>
          <text x="160" y="136" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#1c2422">${escapeSvg(zh)}</text>
          <text x="160" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#66726d">${escapeSvg(en)}</text>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function escapeSvg(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&apos;",
      }[char]));
    }

    function currentResources() {
      return currentCycle().resources.flatMap(([key, zh, en]) => {
        if (key === "core") {
          return currentCycle().enemies.map((enemy) => ({
            key: `core-${enemy.key}`,
            zh: `${enemy.zh}核心`,
            en: `${enemy.en} Core`,
            icon: "core",
            type: "number",
          }));
        }
        return [{
          key,
          zh,
          en,
          icon: key,
          type: key === "rare" ? "text" : key === "priests" ? "number-text" : "number",
        }];
      });
    }

    function makeResourceHeading({ key, zh, en, icon }) {
      const heading = document.createElement("div");
      heading.className = "resource-heading";
      const face = document.createElement("div");
      face.className = "resource-face";
      const image = document.createElement("img");
      image.src = resourceImageMap[icon] || createResourceCardImage(zh, en, key);
      image.alt = `${zh} ${en}`;
      image.loading = "lazy";
      face.appendChild(image);
      const name = document.createElement("div");
      name.className = "resource-name";
      name.innerHTML = `${escapeHtml(zh)}<span>${escapeHtml(en)}</span>`;
      heading.append(face, name);
      return heading;
    }

    function makeNumberField(fullKey) {
      const numberField = document.createElement("div");
      numberField.className = "number-field";
      const minusFive = document.createElement("button");
      minusFive.type = "button";
      minusFive.className = "resource-step-five";
      minusFive.textContent = "-5";
      const minus = document.createElement("button");
      minus.type = "button";
      minus.textContent = "-";
      const input = document.createElement("input");
      input.type = "number";
      input.min = "0";
      input.step = "1";
      input.value = state.resources[fullKey] ?? 0;
      const plus = document.createElement("button");
      plus.type = "button";
      plus.textContent = "+";
      const plusFive = document.createElement("button");
      plusFive.type = "button";
      plusFive.className = "resource-step-five";
      plusFive.textContent = "+5";
      const update = (delta) => {
        const next = Math.max(0, Number(input.value || 0) + delta);
        input.value = next;
        state.resources[fullKey] = next;
        queueSave();
      };
      minusFive.addEventListener("click", () => update(-5));
      minus.addEventListener("click", () => update(-1));
      plus.addEventListener("click", () => update(1));
      plusFive.addEventListener("click", () => update(5));
      input.addEventListener("input", () => {
        state.resources[fullKey] = Math.max(0, Number(input.value || 0));
        queueSave();
      });
      input.addEventListener("wheel", (event) => {
        event.preventDefault();
      }, { passive: false });
      input.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp" || event.key === "ArrowDown") {
          event.preventDefault();
        }
      });
      numberField.append(minusFive, minus, input, plus, plusFive);
      return numberField;
    }

    function makePygmalionResourceField(fullKey) {
      const group = document.createElement("div");
      group.className = "pygmalion-group";
      const cellCount = 3;
      group.style.gridTemplateColumns = `repeat(${cellCount}, 34px)`;
      const progressKeys = Array.from({ length: cellCount }, (_, index) => `${fullKey}-progress-${index}`);
      for (let index = 0; index < cellCount; index += 1) {
        const progressKey = progressKeys[index];
        const active = Boolean(state.pygmalion[progressKey]);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `pygmalion-cell${active ? " active" : ""}`;
        button.title = `Pygmalion Stone ${index + 1}`;
        button.setAttribute("aria-label", `Pygmalion Stone ${index + 1}`);
        button.addEventListener("click", () => {
          state.pygmalion[progressKey] = !active;
          const filled = progressKeys.every((key) => state.pygmalion[key]);
          if (filled && window.confirm(`已点满 ${cellCount} 格，是否获得 1 个皮格马利翁之石？`)) {
            progressKeys.forEach((key) => {
              state.pygmalion[key] = false;
            });
            state.resources[fullKey] = Math.max(0, Number(state.resources[fullKey] || 0)) + 1;
          }
          renderResources();
          queueSave();
        });
        group.appendChild(button);
      }
      return group;
    }

    function makeResourceTextField(fullKey, placeholder) {
      const textarea = document.createElement("textarea");
      textarea.className = "resource-text";
      textarea.placeholder = placeholder;
      textarea.value = state.resources[fullKey] ?? "";
      textarea.addEventListener("input", () => {
        state.resources[fullKey] = textarea.value;
        queueSave();
      });
      return textarea;
    }

    function resourceStorageKey(key) {
      return sharedResourceKeys.has(key) ? key : `${state.cycle}-${key}`;
    }

    function renderResources() {
      elements.resourceGrid.innerHTML = "";
      currentResources().forEach((resource) => {
        const { key, zh, en, type } = resource;
        const fullKey = resourceStorageKey(key);
        const card = document.createElement("article");
        card.className = "resource-card";
        if (type === "text") card.classList.add("text-resource");
        card.appendChild(makeResourceHeading(resource));
        if (key === "pygmalionStones") {
          card.appendChild(makeNumberField(fullKey));
          card.appendChild(makePygmalionResourceField(fullKey));
        } else if (type === "text") {
          card.appendChild(makeResourceTextField(fullKey, "记录稀有资源名称"));
        } else {
          card.appendChild(makeNumberField(fullKey));
          if (type === "number-text") {
            card.appendChild(makeResourceTextField(`${fullKey}-names`, "记录祭司姓名"));
          }
        }
        elements.resourceGrid.appendChild(card);
      });
    }

    function renderMatrix() {
      const rows = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").concat(["Aa", "Bb", "Cc", "Dd", "Ee", "Ff"]);
      elements.choiceMatrix.innerHTML = "";
      elements.choiceMatrix.className = `matrix ${matrixUnlocked ? "unlocked" : "locked"}`;
      elements.matrixHint.textContent = matrixUnlocked ? "已解锁：双击格子勾选或取消" : "锁定中：点击解锁后双击修改";
      elements.matrixLockButton.textContent = matrixUnlocked ? "锁定矩阵" : "解锁矩阵";
      rows.forEach((row) => {
        for (let col = 1; col <= 12; col += 1) {
          const key = `${row}${col}`;
          const checked = Boolean(state.matrix[key]);
          const button = document.createElement("button");
          button.type = "button";
          button.className = checked ? "marked" : "";
          button.textContent = `${row}${col}`;
          button.title = matrixUnlocked ? "双击修改" : "矩阵已锁定";
          button.addEventListener("dblclick", () => {
            if (!matrixUnlocked) return;
            state.matrix[key] = !state.matrix[key];
            renderMatrix();
            queueSave();
          });
          elements.choiceMatrix.appendChild(button);
        }
      });
    }

    function exportState() {
      saveState();
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `${state.profileName || "argo-record"}.json`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function importState(file) {
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          state = normalizeState(JSON.parse(reader.result));
          renderAll();
          saveState();
        } catch (error) {
          alert("导入失败：不是有效的记录 JSON。");
        }
      });
      reader.readAsText(file);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    elements.matrixLockButton.addEventListener("click", () => {
      matrixUnlocked = !matrixUnlocked;
      renderMatrix();
    });
    elements.godformSelect.addEventListener("change", updateSummonActionButtons);
    elements.nymphSelect.addEventListener("change", updateSummonActionButtons);
    elements.addGodformButton.addEventListener("click", () => toggleSummonCard("godforms", elements.godformSelect, summonCards.godforms));
    elements.addNymphButton.addEventListener("click", () => toggleSummonCard("nymphCards", elements.nymphSelect, summonCards.nymphs));
    elements.addTitanButton.addEventListener("click", addTitan);
    elements.titanLimitInput.addEventListener("input", () => {
      state.titanLimit = normalizeTitanLimit(elements.titanLimitInput.value);
      updateTitanListCount();
      queueSave();
    });
    elements.titanNameInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      addTitan();
    });
    elements.powerTideButton.addEventListener("click", restorePowerTide);
    document.querySelector("#exportButton").addEventListener("click", exportState);
    document.querySelector("#importButton").addEventListener("click", () => elements.importInput.click());
    document.querySelector("#printButton").addEventListener("click", () => window.print());
    elements.importInput.addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (file) importState(file);
      event.target.value = "";
    });
    recordSyncChannel?.addEventListener("message", () => void syncRecordFromExternalUpdate({ retry: true }));
    window.setInterval(() => void syncRecordFromExternalUpdate(), 4000);
    window.addEventListener("focus", () => void syncRecordFromExternalUpdate());
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) void syncRecordFromExternalUpdate();
    });

    applyRequestedCycleFromUrl();
    const importedDashboardSurveyNote = consumeDashboardSurveyNote();
    bindInputs();
    renderAll();
    loadServerState();
  </script>
