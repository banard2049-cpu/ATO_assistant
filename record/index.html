    function createResourceCardImage(zh, en, key) {
      const initials = en.split(/\s+/).map((part) => part[0] || "").join("").slice(0, 3).toUpperCase();
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220">
          <defs>
            <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#f9f5e9"/>
              <stop offset="1" stop-color="#dce9e3"/>
            </linearGradient>
          </defs>
          <rect width="320" height="220" rx="18" fill="url(#bg)"/>
          <rect x="14" y="14" width="292" height="192" rx="14" fill="none" stroke="#9ca9a4" stroke-width="3"/>
          <text x="160" y="92" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="800" fill="#176c62">${escapeSvg(initials || key.slice(0, 3).toUpperCase())}</text>
          <text x="160" y="136" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#1c2422">${escapeSvg(zh)}</text>
          <text x="160" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#66726d">${escapeSvg(en)}</text>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function escapeSvg(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&apos;",
      }[char]));
    }

    function currentResources() {
      return currentCycle().resources.flatMap(([key, zh, en]) => {
        if (key === "core") {
          return currentCycle().enemies.map((enemy) => ({
            key: `core-${enemy.key}`,
            zh: `${enemy.zh}核心`,
            en: `${enemy.en} Core`,
            icon: "core",
            type: "number",
          }));
        }
        return [{
          key,
          zh,
          en,
          icon: key,
          type: key === "rare" ? "text" : key === "priests" ? "number-text" : "number",
        }];
      });
    }

    function makeNumberField(fullKey) {
      const numberField = document.createElement("div");
      numberField.className = "number-field";
      const minusFive = document.createElement("button");
      minusFive.type = "button";
      minusFive.className = "resource-step-five";
      minusFive.textContent = "-5";
      const minus = document.createElement("button");
      minus.type = "button";
      minus.textContent = "-";
      const input = document.createElement("input");
      input.type = "number";
      input.min = "0";
      input.step = "1";
      input.value = state.resources[fullKey] ?? 0;
      const plus = document.createElement("button");
      plus.type = "button";
      plus.textContent = "+";
      const plusFive = document.createElement("button");
      plusFive.type = "button";
      plusFive.className = "resource-step-five";
      plusFive.textContent = "+5";
      const update = (delta) => {
        const next = Math.max(0, Number(input.value || 0) + delta);
        input.value = next;
        state.resources[fullKey] = next;
        queueSave();
      };
      minusFive.addEventListener("click", () => update(-5));
      minus.addEventListener("click", () => update(-1));
      plus.addEventListener("click", () => update(1));
      plusFive.addEventListener("click", () => update(5));
      input.addEventListener("input", () => {
        state.resources[fullKey] = Math.max(0, Number(input.value || 0));
        queueSave();
      });
      input.addEventListener("wheel", (event) => {
        event.preventDefault();
      }, { passive: false });
      input.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp" || event.key === "ArrowDown") {
          event.preventDefault();
        }
      });
      numberField.append(minusFive, minus, input, plus, plusFive);
      return numberField;
    }

    function makePygmalionResourceField(fullKey) {
      const group = document.createElement("div");
      group.className = "pygmalion-group";
      const cellCount = 3;
      group.style.gridTemplateColumns = `repeat(${cellCount}, 34px)`;
      const progressKeys = Array.from({ length: cellCount }, (_, index) => `${fullKey}-progress-${index}`);
      for (let index = 0; index < cellCount; index += 1) {
        const progressKey = progressKeys[index];
        const active = Boolean(state.pygmalion[progressKey]);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `pygmalion-cell${active ? " active" : ""}`;
        button.title = `Pygmalion Stone ${index + 1}`;
        button.setAttribute("aria-label", `Pygmalion Stone ${index + 1}`);
        button.addEventListener("click", () => {
          state.pygmalion[progressKey] = !active;
          const filled = progressKeys.every((key) => state.pygmalion[key]);
          if (filled && window.confirm(`已点满 ${cellCount} 格，是否获得 1 个皮格马利翁之石？`)) {
            progressKeys.forEach((key) => {
              state.pygmalion[key] = false;
            });
            state.resources[fullKey] = Math.max(0, Number(state.resources[fullKey] || 0)) + 1;
          }
          renderResources();
          queueSave();
        });
        group.appendChild(button);
      }
      return group;
    }

    function makeResourceTextField(fullKey, placeholder) {
      const textarea = document.createElement("textarea");
      textarea.className = "resource-text";
      textarea.placeholder = placeholder;
      textarea.value = state.resources[fullKey] ?? "";
      textarea.addEventListener("input", () => {
        state.resources[fullKey] = textarea.value;
        queueSave();
      });
      return textarea;
    }

    function resourceStorageKey(key) {
      return sharedResourceKeys.has(key) ? key : `${state.cycle}-${key}`;
    }

    function renderResources() {
      elements.resourceGrid.innerHTML = "";
      currentResources().forEach((resource) => {
        const { key, zh, en, type } = resource;
        const fullKey = resourceStorageKey(key);
        const card = document.createElement("article");
        card.className = "resource-card";
        if (type === "text") card.classList.add("text-resource");
        card.appendChild(makeResourceHeading(resource));
        if (key === "pygmalionStones") {
          card.appendChild(makeNumberField(fullKey));
          card.appendChild(makePygmalionResourceField(fullKey));
        } else if (type === "text") {
          card.appendChild(makeResourceTextField(fullKey, "记录稀有资源名称"));
        } else {
          card.appendChild(makeNumberField(fullKey));
          if (type === "number-text") {

    let matrixClickTimer = 0;
    let matrixSummaries = window.MATRIX_SUMMARIES || {};

    function matrixSourceTarget(notes) {
      const source = (notes || []).find((note) => /\bC[1-5]\s*\|/.test(note));
      if (!source) return null;
      const match = source.match(/\bC([1-5])\s*\|\s*(.+?)\s*>\s*(.+?)\s+line\s+\d+:/);
      if (!match) return null;
      return {
        bookId: `c${match[1]}`,
        chapterHint: match[2].trim(),
        entryId: match[3].trim(),
      };
    }

    function allMatrixSourceTargets(notes) {
      const regex = /\bC([1-5])\s*\|\s*(.+?)\s*>\s*(.+?)\s+line\s+\d+:/;
      const results = [];
      const seen = new Set();
      for (const note of notes || []) {
        const m = note.match(regex);
        if (!m) continue;
        const key = `c${m[1]}|${m[2]}|${m[3]}`;
        if (seen.has(key)) continue;
        seen.add(key);
        results.push({
          bookId: `c${m[1]}`,
          chapterHint: m[2].trim(),
          entryId: m[3].trim(),
          label: `C${m[1]} ${m[2].trim()} #${m[3].trim()}`,
        });
      }
      return results;
    }

    function pickMatrixTarget(targets) {
      const msg = targets.map((t, i) => `${i + 1}. ${t.label}`).join("\n");
      const input = window.prompt(`此格有多个来源，输入序号跳转：\n${msg}`);
      const idx = parseInt(input, 10) - 1;
      if (idx >= 0 && idx < targets.length) return targets[idx];
      return null;
    }

    function showMatrixSummary(key, button, notes) {
      const existing = document.getElementById("matrix-summary");
      if (existing) existing.remove();
      const summary = matrixSummaries[key];
      if (!summary) return;

      const popup = document.createElement("div");
      popup.id = "matrix-summary";
      popup.className = "matrix-summary-popup";

      const title = document.createElement("span");
      title.className = "summary-title";
      title.textContent = key + " 剧情总结";
      popup.appendChild(title);

      const body = document.createElement("span");
      body.textContent = summary;
      popup.appendChild(body);

      if (notes.length) {
        const link = document.createElement("span");
        link.className = "summary-link";
        link.textContent = "点击跳转故事书来源 →";
        link.addEventListener("click", (e) => { e.stopPropagation(); popup.remove(); jumpToMatrixSource(notes); });
        popup.appendChild(link);
      }

      document.body.appendChild(popup);
      const rect = button.getBoundingClientRect();
      const popupRect = popup.getBoundingClientRect();
      let left = rect.left;
      let top = rect.bottom + 6;
      if (left + popupRect.width > window.innerWidth - 12) left = window.innerWidth - popupRect.width - 12;
      if (top + popupRect.height > window.innerHeight - 12) top = rect.top - popupRect.height - 6;
      if (left < 4) left = 4;
      popup.style.left = left + "px";
      popup.style.top = top + "px";

      const dismiss = (e) => { if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener("pointerdown", dismiss); } };
      setTimeout(() => document.addEventListener("pointerdown", dismiss), 0);
    }

    function jumpToMatrixSource(notes) {
      const targets = allMatrixSourceTargets(notes);
      if (!targets.length) return;
      const target = targets.length === 1
        ? targets[0]
        : pickMatrixTarget(targets);
      if (!target) return;
      const params = new URLSearchParams({ book: target.bookId, chapter: target.chapterHint, entry: target.entryId });
      const url = `../story/index.html?${params.toString()}`;

      if (window.parent && window.parent !== window) {
        try {
          if (typeof window.parent.atoStoryNavigate === "function" && window.parent.atoStoryNavigate(target)) return;
        } catch (error) {
          // Fall through to postMessage.
        }
        const targetOrigin = window.location.protocol === "file:" ? "*" : window.location.origin;
        window.parent.postMessage({ type: "ato-story-jump", target }, targetOrigin);
        return;
      }

      window.location.href = url;
    }

    // Cells that support special mark types beyond simple check
    const matrixCellModes = {};
    (function buildCellModes() {
      for (const [code, notesList] of Object.entries(choiceMatrixNotes)) {
        const modes = new Set();
        for (const note of notesList) {
          if (/标记为\s*T|标记为T/.test(note)) modes.add("T");
          if (/标记为\s*L|标记为L/.test(note)) modes.add("L");
          if (/圈出/.test(note)) modes.add("circle");
          if (/划掉/.test(note)) modes.add("cross");
        }
        if (modes.has("T") || modes.has("L")) { modes.add("T"); modes.add("L"); }
        if (modes.size) matrixCellModes[code] = [...modes];
      }
    })();

    function matrixDisplayLabel(value) {
      if (!value) return "";
      if (value === true) return "";
      switch (value) {
        case "T": return "T";
        case "L": return "L";
        case "circle": return "";
        case "circleT": return "T";
        case "circleL": return "L";
        case "cross": return "✕";
        default: return "";
      }
    }

    function matrixCellClass(value) {
      if (!value) return "";
      if (value === true) return "marked";
      if (value === "cross") return "marked crossed";
      if (typeof value === "string" && value.startsWith("circle")) return "marked circled";
      return "marked";
    }

    function showMatrixMenu(key, button) {
      const existing = document.getElementById("matrix-menu");
      if (existing) existing.remove();
      const modes = matrixCellModes[key] || [];
      const currentVal = state.matrix[key];

      const menu = document.createElement("div");
      menu.id = "matrix-menu";
      menu.className = "matrix-popup-menu";

      const options = [{ label: "✓ 标记", value: true }];
      if (modes.includes("T")) options.push({ label: "T 标记为T", value: "T" });
      if (modes.includes("L")) options.push({ label: "L 标记为L", value: "L" });
      if (modes.includes("circle")) {
        options.push({ label: "◯ 圈出", value: "circle" });
        if (modes.includes("T")) options.push({ label: "◯T 圈出+T", value: "circleT" });
        if (modes.includes("L")) options.push({ label: "◯L 圈出+L", value: "circleL" });
      }
      if (modes.includes("cross")) options.push({ label: "✕ 划掉", value: "cross" });
      options.push({ label: "⌀ 清除", value: false });

      for (const opt of options) {
        const item = document.createElement("button");
        item.type = "button";
        item.textContent = opt.label;
        if (currentVal === opt.value || (!currentVal && opt.value === false)) item.className = "active";
        item.addEventListener("click", () => {
          menu.remove();
          if (opt.value === false) { delete state.matrix[key]; }
          else { state.matrix[key] = opt.value; }
          renderMatrix();
          queueSave();
        });
        menu.appendChild(item);
      }

      document.body.appendChild(menu);
      const rect = button.getBoundingClientRect();
      menu.style.position = "fixed";
      menu.style.left = rect.left + "px";
      menu.style.top = (rect.bottom + 4) + "px";
      menu.style.zIndex = "9999";

      const dismiss = (e) => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener("pointerdown", dismiss); } };
      setTimeout(() => document.addEventListener("pointerdown", dismiss), 0);
    }

    function renderMatrix() {
      const rows = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").concat(["AA", "BB", "CC", "DD", "EE", "FF"]);
      elements.choiceMatrix.innerHTML = "";
      elements.choiceMatrix.className = `matrix ${matrixUnlocked ? "unlocked" : "locked"}`;
      elements.matrixHint.textContent = matrixUnlocked ? "已解锁：双击格子勾选或取消" : "锁定中：点击解锁后双击修改";
      elements.matrixLockButton.textContent = matrixUnlocked ? "锁定矩阵" : "解锁矩阵";
      rows.forEach((row) => {
        for (let col = 1; col <= 12; col += 1) {
          const key = `${row}${col}`;
          const value = state.matrix[key];
          const checked = Boolean(value);
          const notes = choiceMatrixNotes[key] || [];
          const modes = matrixCellModes[key];
          const button = document.createElement("button");
          button.type = "button";
          button.className = [matrixCellClass(value), notes.length ? "has-note" : ""].filter(Boolean).join(" ");
          button.textContent = `${row}${col}`;
          if (value) button.setAttribute("data-mark", matrixDisplayLabel(value));
          const noteText = notes.length ? notes.join("\n") : "未在 C1-C5 故事书中找到“标记/圈出/划掉此格”的来源。";
          button.title = `${key}\n${noteText}\n${value ? "单击查看总结；长按跳转来源；" : ""}${matrixUnlocked ? "双击修改" : "矩阵已锁定"}`;
          if (notes.length) button.setAttribute("aria-label", `${key}：${notes.join("；")}`);
          (function(btn, k, v, n) {
            let pressTimer = 0;
            let didLongPress = false;
            btn.addEventListener("pointerdown", () => {
              if (!v) return;
              didLongPress = false;
              pressTimer = window.setTimeout(() => {
                didLongPress = true;
                if (n.length) jumpToMatrixSource(n);
              }, 500);
            });
            btn.addEventListener("pointerup", () => { window.clearTimeout(pressTimer); });
            btn.addEventListener("pointerleave", () => { window.clearTimeout(pressTimer); });
            btn.addEventListener("click", () => {
              window.clearTimeout(matrixClickTimer);
              if (!v || didLongPress) return;
              matrixClickTimer = window.setTimeout(() => showMatrixSummary(k, btn, n), 180);
            });
          })(button, key, value, notes);
          button.addEventListener("dblclick", () => {
            window.clearTimeout(matrixClickTimer);
            if (!matrixUnlocked) return;
            if (modes && modes.length) {
              showMatrixMenu(key, button);
            } else {
              state.matrix[key] = state.matrix[key] ? false : true;
              renderMatrix();
              queueSave();
            }
          });
          elements.choiceMatrix.appendChild(button);
        }
      });
    }

    function exportState() {
      saveState();
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `${state.profileName || "argo-record"}.json`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function importState(file) {
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          state = normalizeState(JSON.parse(reader.result));
          renderAll();
          saveState();
        } catch (error) {
          alert("导入失败：不是有效的记录 JSON。");
        }
      });
      reader.readAsText(file);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    elements.matrixLockButton.addEventListener("click", () => {
      matrixUnlocked = !matrixUnlocked;
      renderMatrix();
    });
    elements.godformSelect.addEventListener("change", updateSummonActionButtons);

    elements.addGodformButton.addEventListener("click", () => toggleSummonCard("godforms", elements.godformSelect, summonCards.godforms));

    elements.titanLimitInput.addEventListener("input", () => {
      state.titanLimit = normalizeTitanLimit(elements.titanLimitInput.value);
      updateTitanListCount();
      queueSave();
    });
    elements.titanNameInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      addTitan();
    });
    elements.powerTideButton.addEventListener("click", restorePowerTide);
    document.querySelector("#exportButton").addEventListener("click", exportState);
    document.querySelector("#importButton").addEventListener("click", () => elements.importInput.click());
    document.querySelector("#printButton").addEventListener("click", () => window.print());
    elements.importInput.addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (file) importState(file);
      event.target.value = "";
    });
    recordSyncChannel?.addEventListener("message", () => void syncRecordFromExternalUpdate({ retry: true }));
    window.setInterval(() => void syncRecordFromExternalUpdate(), 4000);
    window.addEventListener("focus", () => void syncRecordFromExternalUpdate());
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) void syncRecordFromExternalUpdate();
    });

    applyRequestedCycleFromUrl();
    const importedDashboardSurveyNote = consumeDashboardSurveyNote();
    bindInputs();
    renderAll();
