<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ATO 战役主控台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f0;
      --panel: #fffefa;
      --ink: #1e2623;
      --muted: #68736d;
      --line: #d6ddd8;
      --accent: #16675b;
      --accent-strong: #0d4d44;
      --gold: #a66d1d;
      --danger: #9d332c;
      --done: #1f7a4f;
      --shadow: 0 18px 44px rgba(28, 38, 34, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #f8faf7;
      color: var(--ink);
    }

    button.secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
    }

    textarea {
      min-height: 106px;
      resize: vertical;
      line-height: 1.55;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px clamp(14px, 3vw, 34px) 34px;
    }

    .auth-gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-panel {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-tabs button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .auth-form {
      display: grid;
      gap: 12px;
    }

    .auth-form label,
    .session-card label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .auth-message {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }

    .session-card {
      display: grid;
      gap: 10px;
    }

    .session-account {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-weight: 800;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    .title-cycle-control {
      min-width: min(280px, 100%);
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .title-cycle-control select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font-weight: 900;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .record-card-link {
      align-self: stretch;
      min-height: 88px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(166, 109, 29, 0.38);
      border-radius: 6px;
      padding: 0 12px;
      background: #fff8ea;
      color: var(--gold);
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      white-space: nowrap;
    }

    .record-card-link:hover {
      border-color: var(--gold);
      background: #fff3d7;
      color: #7f5015;
    }

    .day-card {
      width: min(520px, 100%);
      min-width: min(420px, 100%);
      justify-self: end;
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: stretch;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .day-card label {
      grid-column: 1;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .day-card input {
      width: 116px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
    }

    .day-actions {
      grid-column: 3;
      align-self: stretch;
      display: grid;
      gap: 8px;
    }

    .profile-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
      width: 100%;
    }

    .profile-tools label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .profile-tools select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    .profile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.8fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f8faf7;
    }

    .panel-head h2 {
      font-size: 18px;
      line-height: 1.2;
    }

    .flow-head-tools {
      display: grid;
      grid-template-columns: auto;
      gap: 10px 14px;
      align-items: center;
      justify-content: end;
      min-width: min(260px, 100%);
    }

    .flow-head-tools .field-note {
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .date-track-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .date-track-list {
      max-height: 560px;
      overflow: auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
      align-items: start;
    }

    .date-track-item {
      min-height: 38px;
      display: grid;
      grid-template-columns: 46px minmax(88px, auto) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .date-track-item:hover {
      border-color: var(--accent);
      background: #f5fbf8;
    }

    .date-track-item.current {
      border-color: var(--accent);
      border-left: 8px solid var(--accent);
      padding-left: 12px;
      background: #dff1ec;
      box-shadow: inset 0 0 0 2px rgba(22, 103, 91, 0.28), 0 6px 16px rgba(22, 103, 91, 0.16);
    }

    .date-track-item.event {
      border-color: rgba(166, 109, 29, 0.55);
      background: #fff8ea;
    }

    .date-track-item.noted {
      border-color: rgba(31, 122, 79, 0.24);
      background: linear-gradient(90deg, rgba(31, 122, 79, 0.1), #fff 28px);
    }

    .date-track-item.current.noted {
      border-color: var(--accent);
      border-left-color: var(--accent);
      background: #dff1ec;
    }

    .date-track-item:disabled,
    .date-track-item.disabled {
      cursor: default;
      opacity: 0.72;
    }

    .date-track-day {
      font-size: 14px;
      font-weight: 900;
    }

    .date-track-event {
      grid-column: 3;
      color: var(--gold);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .date-track-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .date-track-action {
      min-height: 28px;
      border-radius: 5px;
      padding: 0 8px;
      font-size: 11px;
    }

    .date-track-action.applied {
      background: #ecf6f2;
      color: var(--accent);
      border: 1px solid rgba(31, 122, 79, 0.28);
    }

    .date-track-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .date-track-icon {
      display: inline-flex;
      align-items: center;
      min-height: 16px;
      border-radius: 4px;
      padding: 0 4px;
      background: #eef1ef;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      line-height: 1.1;
    }

    .date-track-icon.battle {
      background: #f4ece8;
      color: var(--danger);
    }

    .date-track-icon.structure-tech {
      background: #e8f4ef;
      color: var(--accent);
    }

    .date-track-icon.battle-tech {
      background: #eef1f7;
      color: #44536f;
    }

    .date-track-note {
      grid-column: 3;
      color: var(--done);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-note {
      min-height: 30px;
      border: 1px solid rgba(31, 122, 79, 0.28);
      border-radius: 6px;
      padding: 7px 9px;
      background: #eef8f1;
      color: var(--done);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .field-note[hidden] {
      display: none;
    }

    .panel-body {
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .flow-list {
      display: grid;
      gap: 10px;
    }

    .flow-step {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .flow-step.done {
      border-color: rgba(31, 122, 79, 0.35);
      background: #f1faf5;
    }

    .flow-check {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      accent-color: var(--done);
      cursor: pointer;
    }

    .step-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
      font-weight: 900;
    }

    .step-index {
      color: var(--gold);
      font-family: Consolas, monospace;
      font-size: 15px;
    }

    .step-kind {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .step-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .step-track-reminders {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .step-track-reminder {
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .step-track-reminder.important {
      border-color: rgba(157, 51, 44, 0.42);
      background: #fff7f4;
    }

    .step-track-reminder.tech {
      border-color: rgba(22, 103, 91, 0.35);
      background: #f2faf6;
    }

    .step-track-title {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      margin-bottom: 3px;
      font-size: 13px;
      font-weight: 900;
    }

    .step-track-tag {
      min-height: 20px;
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      padding: 0 6px;
      background: #eef1ef;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .step-track-tag.battle {
      background: #f4ece8;
      color: var(--danger);
    }

    .step-track-tag.structure-tech {
      background: #e8f4ef;
      color: var(--accent);
    }

    .step-track-tag.battle-tech {
      background: #eef1f7;
      color: #44536f;
    }

    .step-track-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .exploration-tools {
      display: grid;
      gap: 9px;
      margin-top: 11px;
      padding: 10px;
      border: 1px solid rgba(22, 103, 91, 0.28);
      border-radius: 8px;
      background: #f3faf7;
    }

    .exploration-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
      align-items: end;
    }

    .exploration-status {
      display: grid;
      gap: 5px;
    }

    .exploration-count {
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
    }

    .exploration-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: end;
    }

    .exploration-buttons button {
      min-height: 36px;
    }

    .exploration-summary {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .exploration-drawn {
      display: grid;
      gap: 8px;
    }

    .exploration-drawn-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .exploration-drawn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 8px;
      align-items: start;
    }

    .exploration-drawn-card {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .exploration-drawn-face {
      width: 100%;
      aspect-ratio: 470 / 740;
      overflow: hidden;
      border: 1px solid rgba(30, 38, 35, 0.2);
      border-radius: 6px;
      background-color: #e9eeeb;
      background-repeat: no-repeat;
      box-shadow: 0 6px 14px rgba(28, 38, 34, 0.12);
    }

    .exploration-drawn-meta {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .exploration-destruction {
      border: 1px solid rgba(157, 51, 44, 0.2);
      border-radius: 7px;
      background: #fff8f5;
    }

    .exploration-destruction summary {
      cursor: pointer;
      padding: 9px 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .exploration-destruction-body {
      display: grid;
      gap: 8px;
      padding: 0 9px 9px;
    }

    .exploration-destruction-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .exploration-destruction-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .exploration-destruction-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .exploration-destruction-card {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 3px 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .exploration-destruction-card button {
      min-height: 22px;
      padding: 0 7px;
      font-size: 11px;
    }

    .exploration-builder {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .exploration-builder summary {
      cursor: pointer;
      padding: 9px 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .exploration-builder-body {
      display: grid;
      gap: 9px;
      padding: 0 10px 10px;
    }

    .exploration-builder-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .exploration-library {
      max-height: 220px;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 6px;
    }

    .exploration-library label {
      min-height: 34px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      background: #fbfcfa;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .exploration-library input {
      width: 16px;
      height: 16px;
      padding: 0;
      accent-color: var(--accent);
    }

    .exploration-library button {
      min-height: 26px;
      padding: 0 8px;
      font-size: 11px;
      white-space: nowrap;
    }

    .survey-constants {
      margin-top: 10px;
      border: 1px solid rgba(166, 109, 29, 0.26);
      border-radius: 7px;
      background: #fffaf1;
    }

    .survey-constants summary {
      cursor: pointer;
      padding: 9px 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .simple-constant-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: start;
      margin-top: 10px;
    }

    .simple-constant-row .survey-constants {
      margin-top: 0;
      min-width: 0;
    }

    .survey-constants-body {
      display: grid;
      gap: 10px;
      padding: 0 10px 10px;
    }

    .survey-constant-group {
      display: grid;
      gap: 7px;
    }

    .survey-constant-heading {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .survey-hub-summary {
      overflow: auto;
      border: 1px solid rgba(30, 38, 35, 0.12);
      border-radius: 7px;
      background: #fff;
    }

    .survey-hub-summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(52px, 0.5fr)) minmax(160px, 1.25fr) minmax(150px, 1fr);
      gap: 8px;
      align-items: center;
      min-width: 660px;
      border-top: 1px solid rgba(30, 38, 35, 0.08);
      padding: 7px 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .survey-hub-summary-row:first-child {
      border-top: 0;
    }

    .survey-hub-summary-row.header {
      background: #f7efe2;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .survey-hub-summary-row.active {
      background: #f1f8f5;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .survey-hub-story {
      color: var(--gold);
      font-weight: 950;
      white-space: nowrap;
    }

    .survey-hub-title {
      font-weight: 950;
    }

    .survey-constant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 8px;
    }

    .survey-constant-card {
      display: grid;
      gap: 6px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: #fff;
    }

    .survey-constant-title {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: baseline;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
    }

    .survey-constant-title span {
      color: var(--muted);
      font-weight: 800;
    }

    .survey-constant-boxes {
      display: grid;
      gap: 5px;
    }

    .survey-constant-boxes label,
    .survey-constant-row-item {
      display: grid;
      grid-template-columns: auto minmax(34px, auto) minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .survey-constant-row-item.multi-slot {
      grid-template-columns: auto minmax(0, 1fr);
    }

    .simple-constant-slots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      min-width: max-content;
    }

    .survey-constant-boxes input {
      width: 15px;
      height: 15px;

      border-radius: 999px;
      padding: 0 9px;
      background: rgba(30, 38, 35, 0.78);
      color: #fff;
      font-size: 12px;
      font-weight: 900;

    .card-track-side-badge {

      left: 8px;
      top: 8px;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 6px;
      padding: 0 10px;
      background: rgba(255, 254, 250, 0.86);
      color: var(--ink);
      font-size: 13px;
      font-weight: 950;
    }

    .card-track-preview-badge {
      position: absolute;
      left: 8px;
      bottom: 8px;
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      padding: 0 9px;
      background: rgba(190, 102, 36, 0.84);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .card-track-empty {

      justify-self: center;
      aspect-ratio: 1.4;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(22, 103, 91, 0.34);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;

      background: #f3faf7;
      text-align: center;

      font-weight: 800;

      font-size: 11px;
      font-weight: 800;

      height: 9px;

      border-radius: 99px;
      background: #e2e8e4;

    .progress-fill {

      height: 100%;

      background: var(--done);

    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .event-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .event-item {

      gap: 9px;

      padding: 9px;

      border-radius: 8px;
      background: #fff;

      height: 18px;

    .event-item.done span {

    .event-remove {

      padding: 0 9px;

    .empty {

      border-radius: 8px;
      color: var(--muted);
      text-align: center;

    .danger-zone {
      display: grid;
      gap: 12px;
    }

    .archive-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover {
      background: #76241f;
    }

    @media (max-width: 1040px) {

      }

        max-height: 280px;
      }

      .flow-step {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .simple-constant-row {
        grid-template-columns: 1fr;
      }

      .flow-head-tools {

        min-width: 0;

      }

    @media (max-width: 780px) {

    @media (max-width: 620px) {

      .day-card {
        grid-template-columns: 1fr;
      }

      }

      .date-track-list {
        grid-template-columns: minmax(0, 1fr);
      }

      .date-track-item {

        max-height: calc(100vh - 14px);
      }

      .card-track-empty {
        width: min(100%, 520px);
      }
    }

    function isPlainObject(value) {
      return value && typeof value === "object" && !Array.isArray(value);

    function cloneJson(value) {
      return value === undefined ? undefined : JSON.parse(JSON.stringify(value));

    function jsonEqual(left, right) {
      if (left === right) return true;
      if (Array.isArray(left) || Array.isArray(right)) {
        return Array.isArray(left)
          && Array.isArray(right)
          && left.length === right.length
          && left.every((value, index) => jsonEqual(value, right[index]));
      }
      if (isPlainObject(left) || isPlainObject(right)) {
        if (!isPlainObject(left) || !isPlainObject(right)) return false;
        const leftKeys = Object.keys(left);
        const rightKeys = Object.keys(right);
        return leftKeys.length === rightKeys.length
          && leftKeys.every((key) => Object.prototype.hasOwnProperty.call(right, key) && jsonEqual(left[key], right[key]));
      }
      return false;
    }

    function mergeDashboardChanges(base, local, remote, path = "") {
      if (jsonEqual(local, remote)) return { value: cloneJson(local), conflicts: [] };
      if (jsonEqual(local, base)) return { value: cloneJson(remote), conflicts: [] };
      if (jsonEqual(remote, base)) return { value: cloneJson(local), conflicts: [] };

      if (isPlainObject(base) || isPlainObject(local) || isPlainObject(remote)) {
        const baseObject = isPlainObject(base) ? base : {};
        const localObject = isPlainObject(local) ? local : {};
        const remoteObject = isPlainObject(remote) ? remote : {};
        const value = {};
        const conflicts = [];
        const keys = new Set([
          ...Object.keys(baseObject),
          ...Object.keys(localObject),
          ...Object.keys(remoteObject),
        ]);

        keys.forEach((key) => {
          const childPath = path ? `${path}.${key}` : key;
          const result = mergeDashboardChanges(baseObject[key], localObject[key], remoteObject[key], childPath);
          if (result.value !== undefined) value[key] = result.value;
          conflicts.push(...result.conflicts);
        });
        return { value, conflicts };
      }

      return {
        value: cloneJson(local),
        conflicts: [path || "dashboard"],
      };
    }

      const response = await fetch(campaignStorageUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      if (!payload.ok) throw new Error(payload.error || "读取失败");
      return {
        archive: normalizeArchive(payload.state || defaultArchive),
        revision: Math.max(0, Number(payload.revision || 0)),
      };
    }

    async function syncDashboardFromExternalUpdate() {
      if (!campaignStorageAvailable || campaignExternalSyncInFlight || campaignConflictReloading || campaignSaveInFlight) return;
      campaignExternalSyncInFlight = true;
      try {
        const latest = await readLatestDashboardSection();
        if (latest.revision <= campaignSectionRevision) return;
        const localChanged = !jsonEqual(archive, campaignSectionBaseline || archive);
        if (!localChanged) {
          campaignSectionRevision = latest.revision;
          campaignSectionBaseline = cloneJson(latest.archive);
          renderDashboardArchive(latest.archive);
          return;
        }

        const merged = mergeDashboardChanges(campaignSectionBaseline || defaultArchive, archive, latest.archive);
        campaignSectionRevision = latest.revision;
        campaignSectionBaseline = cloneJson(latest.archive);
        if (merged.conflicts.length) {
          const shown = merged.conflicts.slice(0, 8).join("\n");
          const more = merged.conflicts.length > 8 ? `\n另有 ${merged.conflicts.length - 8} 项` : "";
          if (!window.confirm(`其他页面修改了相同字段：\n${shown}${more}\n\n确定：保留当前页面的值并合并\n取消：加载其他页面的最新修改`)) {
            renderDashboardArchive(latest.archive);
            return;
          }
        }
        renderDashboardArchive(merged.value);
        queueCampaignSave();
      } catch (error) {
        console.warn(error);

        campaignExternalSyncInFlight = false;
      }

      });
      const raw = await response.text();
      let payload = null;
      try {

        const detail = raw.trim().slice(0, 500);
        throw new Error(detail
          ? `注册接口返回的不是 JSON：${detail}`
          : `注册接口返回空内容（HTTP ${response.status}）`);
      }
      if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
      return payload.user;
    }

      return result;
    }

    function getExplorationLibrary() {
      const cards = (explorationDecks[currentCycleConfig().id] || []).flatMap((deck) => deck.cards);
      const seen = new Set();
      return cards.filter((card) => {
        if (seen.has(card.id)) return false;
        seen.add(card.id);
        return true;
      });
    }

    function getSelectedExplorationIds() {
      state.exploration = normalizeExploration(state.exploration);
      const cycleId = currentCycleConfig().id;
      const validIds = new Set(getExplorationLibrary().map((card) => card.id));
      const storedSelection = state.exploration.selectedByCycle[cycleId];
      const selected = Array.isArray(storedSelection)
        ? storedSelection.filter((id) => validIds.has(id))
        : (defaultExplorationSelections[cycleId] || []).filter((id) => validIds.has(id));
      state.exploration.selectedByCycle[cycleId] = selected;
      return selected;
    }

    function getExplorationCard(cardId) {
      return getExplorationLibrary().find((card) => card.id === cardId) || null;
    }

    function getExplorationCardByCornerNumber(cycleId, cornerNumber) {
      const id = Object.entries(explorationCornerNumbers[cycleId] || {})
        .find(([, number]) => String(number) === String(cornerNumber))?.[0];
      return id ? getExplorationLibrary().find((card) => card.id === id) || null : null;
    }

    function getExplorationCardLabel(cardId) {
      const card = getExplorationCard(cardId);
      const cornerNumber = getExplorationCornerNumber(cardId);
      return `${card?.name || "探索卡"} #${cardId}${cornerNumber ? ` · 黑底${cornerNumber}` : ""}`;
    }

    function getAcclimationRule(day = state.day, cycleId = currentCycleConfig().id) {
      return (acclimationReplacementRules[cycleId] || []).find((rule) => Number(rule.day) === Number(day)) || null;
    }

    function isAcclimationApplied(rule, cycleId = currentCycleConfig().id) {
      state.exploration = normalizeExploration(state.exploration);
      return Boolean(state.exploration.acclimationsByCycle?.[cycleId]?.[rule.id]);
    }

    function replaceExplorationId(value, replacements) {
      return replacements.get(value) || value;
    }

    function replaceExplorationEntry(entry, replacements) {
      if (!entry || !replacements.has(entry.id)) return entry;
      const nextId = replacements.get(entry.id);
      const nextCard = getExplorationCard(nextId);
      return {
        ...entry,
        id: nextId,
        name: nextCard?.name || entry.name,
        acclimatedFrom: entry.id,
      };
    }

    function applyAcclimationReplacement(rule) {
      const cycleId = currentCycleConfig().id;
      state.exploration = normalizeExploration(state.exploration);
      const replacements = new Map();
      rule.from.forEach((fromCorner, index) => {
        const fromCard = getExplorationCardByCornerNumber(cycleId, fromCorner);
        const toCard = getExplorationCardByCornerNumber(cycleId, rule.to[index]);
        if (fromCard && toCard) replacements.set(fromCard.id, toCard.id);
      });
      if (!replacements.size) return;

      const replaceIds = (ids) => [...new Set(ids.map((id) => replaceExplorationId(id, replacements)))];
      const selectedIds = getSelectedExplorationIds();
      const drawState = ensureExplorationDrawState();
      state.exploration.selectedByCycle[cycleId] = replaceIds(selectedIds);
      drawState.drawPile = replaceIds(drawState.drawPile);
      drawState.history = drawState.history.map((entry) => replaceExplorationEntry(entry, replacements));
      drawState.discardPile = drawState.discardPile.map((entry) => replaceExplorationEntry(entry, replacements));
      drawState.current = replaceExplorationEntry(drawState.current, replacements);

      const applied = isPlainObject(state.exploration.acclimationsByCycle[cycleId])
        ? state.exploration.acclimationsByCycle[cycleId]
        : {};
      applied[rule.id] = true;
      state.exploration.acclimationsByCycle[cycleId] = applied;

      const summary = rule.from.map((fromCorner, index) => `${fromCorner}->${rule.to[index]}`).join(", ");
      const noteKey = dateNoteKey(rule.day);
      const note = state.dateNotes?.[noteKey] || "";
      if (!note.includes(`${rule.label} 扎根`)) {
        state.dateNotes[noteKey] = [note, `${rule.label} 扎根：${summary}`].filter(Boolean).join("\n");
      }

      saveState();
      renderFlow();
      renderDateTrack();
    }

    function getExplorationSpecialRule() {
      return explorationSpecialRules[currentCycleConfig().id] || null;
    }

    function getDestructionCardIds() {
      state.exploration = normalizeExploration(state.exploration);
      const cycleId = currentCycleConfig().id;
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds) return [];

      const validIds = new Set(getExplorationLibrary().map((card) => card.id));
      const storedIds = state.exploration.destructionCardIdsByCycle[cycleId];
      const cardIds = Array.isArray(storedIds)
        ? storedIds.filter((id) => validIds.has(id))
        : rule.destructionIds.filter((id) => validIds.has(id));
      state.exploration.destructionCardIdsByCycle[cycleId] = [...new Set(cardIds)];
      return state.exploration.destructionCardIdsByCycle[cycleId];
    }

    function getDestructionPileIds() {
      state.exploration = normalizeExploration(state.exploration);
      const cycleId = currentCycleConfig().id;
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds) return [];

      const validIds = new Set(getDestructionCardIds());
      const selectedIds = new Set(getSelectedExplorationIds());
      const storedPile = state.exploration.destructionByCycle[cycleId];
      const pile = Array.isArray(storedPile)
        ? storedPile.filter((id) => validIds.has(id) && !selectedIds.has(id))
        : getDestructionCardIds().filter((id) => !selectedIds.has(id));
      state.exploration.destructionByCycle[cycleId] = pile;
      return pile;
    }

    function createExplorationDrawState(cardIds) {
      return {
        drawPile: shuffleList(cardIds),
        history: [],
        discardPile: [],
        current: null,
      };
    }

    function ensureExplorationDrawState() {
      state.exploration = normalizeExploration(state.exploration);
      const cycleId = currentCycleConfig().id;
      const selectedIds = getSelectedExplorationIds();
      const existing = state.exploration.drawStateByCycle[cycleId];
      if (!existing || !Array.isArray(existing.drawPile) || !Array.isArray(existing.history)) {
        state.exploration.drawStateByCycle[cycleId] = createExplorationDrawState(selectedIds);
        return state.exploration.drawStateByCycle[cycleId];
      }

      const validIds = new Set(selectedIds);
      if (!Array.isArray(existing.discardPile)) existing.discardPile = [];
      existing.drawPile = existing.drawPile.filter((id) => validIds.has(id));
      existing.history = existing.history
        .filter((entry) => entry && validIds.has(entry.id))
        .map((entry) => ({ ...entry, day: Math.max(0, Number(entry.day || 0)) }));
      existing.discardPile = existing.discardPile
        .filter((entry) => entry && validIds.has(entry.id))
        .map((entry) => ({ ...entry, day: Math.max(0, Number(entry.day || 0)) }));
      existing.current = existing.current && validIds.has(existing.current.id) ? existing.current : null;

      const knownIds = new Set([
        ...existing.drawPile,
        ...existing.history.map((entry) => entry.id),
        ...existing.discardPile.map((entry) => entry.id),
      ]);
      if (existing.current) knownIds.add(existing.current.id);
      const missingIds = selectedIds.filter((id) => !knownIds.has(id));
      existing.drawPile.push(...shuffleList(missingIds));
      return existing;
    }

    function applyExplorationSelection(cardIds) {
      state.exploration = normalizeExploration(state.exploration);
      const cycleId = currentCycleConfig().id;
      const validIds = new Set(getExplorationLibrary().map((card) => card.id));
      const selectedIds = [...new Set(cardIds)].filter((id) => validIds.has(id));
      const drawState = ensureExplorationDrawState();
      if ((drawState.history.length || drawState.discardPile.length || drawState.current) && !window.confirm("更新探索牌组会重洗并清空当前抽牌记录与弃牌堆。继续吗？")) return;
      state.exploration.selectedByCycle[cycleId] = selectedIds;
      const rule = getExplorationSpecialRule();
      if (rule?.destructionIds) {
        const destructionIds = new Set(getDestructionCardIds());
        const selectedSet = new Set(selectedIds);
        const storedPile = Array.isArray(state.exploration.destructionByCycle[cycleId])
          ? state.exploration.destructionByCycle[cycleId]
          : getDestructionCardIds();
        state.exploration.destructionByCycle[cycleId] = storedPile.filter((id) => destructionIds.has(id) && !selectedSet.has(id));
      }
      state.exploration.drawStateByCycle[cycleId] = createExplorationDrawState(selectedIds);
      saveState();
      renderFlow();
    }

    function restoreDefaultExplorationSelection() {
      const cycleId = currentCycleConfig().id;
      const defaultIds = defaultExplorationSelections[cycleId];
      if (!defaultIds?.length) return;

      const drawState = ensureExplorationDrawState();
      if ((drawState.history.length || drawState.discardPile.length || drawState.current) && !window.confirm("恢复初始探索牌组会重洗并清空当前抽牌记录与弃牌堆。继续吗？")) return;

      const validIds = new Set(getExplorationLibrary().map((card) => card.id));
      const selectedIds = defaultIds.filter((id) => validIds.has(id));
      state.exploration = normalizeExploration(state.exploration);
      state.exploration.selectedByCycle[cycleId] = selectedIds;
      const rule = getExplorationSpecialRule();
      if (rule?.destructionIds) {
        state.exploration.destructionCardIdsByCycle[cycleId] = [...rule.destructionIds];
        state.exploration.destructionByCycle[cycleId] = [...rule.destructionIds];
      }
      state.exploration.drawStateByCycle[cycleId] = createExplorationDrawState(selectedIds);
      saveState();
      renderFlow();
    }

    function drawExplorationCard() {
      const library = getExplorationLibrary();
      if (!library.length) {
        window.alert("当前 Cycle 暂无探索卡组数据。");
        return;
      }

      const selectedIds = getSelectedExplorationIds();
      if (!selectedIds.length) {
        window.alert("请先在探索卡库里选择本次探索牌组。");
        return;
      }

      const drawState = ensureExplorationDrawState();
      if (!drawState.drawPile.length) {
        if (drawState.history.length && !drawState.discardPile.length) {
          window.alert("探索牌堆已空。请先结束抽卡，将已抽卡放入弃牌堆后再重洗。");
          return;
        }
        if (!drawState.discardPile.length || !window.confirm("探索牌堆已空。是否重洗弃牌堆并继续抽牌？")) return;
        drawState.drawPile = shuffleList(drawState.discardPile.map((entry) => entry.id));
        drawState.discardPile = [];
        drawState.current = null;
      }

      const cardId = drawState.drawPile.shift();
      const card = getExplorationCard(cardId);
      if (!card) return;

      const record = {
        id: card.id,
        name: card.name,
        day: state.day,
        drawnAt: new Date().toISOString(),
      };
      drawState.current = record;
      drawState.history = [record, ...drawState.history].slice(0, 200);
      saveState();
      renderFlow();
    }

    function endExplorationDraw() {
      const drawState = ensureExplorationDrawState();
      if (!drawState.history.length) return;
      drawState.discardPile = [...drawState.history, ...drawState.discardPile].slice(0, 500);
      drawState.history = [];
      drawState.current = null;
      saveState();
      renderFlow();
    }

    function addRandomDestructionCard() {
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds) return;

      const pile = getDestructionPileIds();
      if (!pile.length) {
        window.alert("破坏卡组已空。");
        return;
      }

      const cardId = pile[Math.floor(Math.random() * pile.length)];
      const cycleId = currentCycleConfig().id;
      const selectedIds = [...getSelectedExplorationIds(), cardId];
      state.exploration.selectedByCycle[cycleId] = [...new Set(selectedIds)];
      state.exploration.destructionByCycle[cycleId] = pile.filter((id) => id !== cardId);
      ensureExplorationDrawState();
      saveState();
      renderFlow();
    }

    function addCardToDestructionPile(cardId) {
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds || !getExplorationCard(cardId)) return;

      const cycleId = currentCycleConfig().id;
      state.exploration = normalizeExploration(state.exploration);
      const destructionCardIds = getDestructionCardIds();
      if (!destructionCardIds.includes(cardId)) {
        state.exploration.destructionCardIdsByCycle[cycleId] = [...destructionCardIds, cardId];
      }

      const pile = getDestructionPileIds();
      if (!pile.includes(cardId)) {
        state.exploration.destructionByCycle[cycleId] = [...pile, cardId];
      }

      state.exploration.selectedByCycle[cycleId] = getSelectedExplorationIds().filter((id) => id !== cardId);
      state.exploration.destructionByCycle[cycleId] = getDestructionPileIds();
      ensureExplorationDrawState();
      saveState();
      renderFlow();
    }

    function returnDestructionCard(cardId) {
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds || !getDestructionCardIds().includes(cardId)) return;

      const cycleId = currentCycleConfig().id;
      state.exploration = normalizeExploration(state.exploration);
      state.exploration.selectedByCycle[cycleId] = getSelectedExplorationIds().filter((id) => id !== cardId);

      const pile = getDestructionPileIds();
      if (!pile.includes(cardId)) {
        state.exploration.destructionByCycle[cycleId] = [...pile, cardId];
      }

      ensureExplorationDrawState();
      saveState();
      renderFlow();
    }

    function resetExplorationDeck() {
      const selectedIds = getSelectedExplorationIds();
      if (!selectedIds.length) return;
      if (!window.confirm("重洗并清空当前探索牌组的抽牌记录与弃牌堆吗？")) return;
      state.exploration = normalizeExploration(state.exploration);
      state.exploration.drawStateByCycle[currentCycleConfig().id] = createExplorationDrawState(selectedIds);
      saveState();
      renderFlow();
    }

    function getExplorationCardImageStyle(cardId) {
      const cycleId = currentCycleConfig().id;
      return [
        `background-image: url("./assets/exploration-cards/${cycleId}/${cardId}.png")`,
        "background-size: contain",
        "background-position: center",
      ].join(";");
    }

    function getExplorationCornerNumber(cardId) {
      return explorationCornerNumbers[currentCycleConfig().id]?.[cardId] || "";
    }

    function createExplorationDestructionTools(selectedIds, destructionPileIds) {
      const rule = getExplorationSpecialRule();
      if (!rule?.destructionIds) return null;

      const destructionSet = new Set(getDestructionCardIds());
      const selectedDestructionIds = selectedIds.filter((id) => destructionSet.has(id));
      const section = document.createElement("details");
      section.className = "exploration-destruction";
      const summary = document.createElement("summary");
      summary.textContent = `破坏卡组（${destructionPileIds.length}） · 探索中 ${selectedDestructionIds.length}`;
      const body = document.createElement("div");
      body.className = "exploration-destruction-body";

      const head = document.createElement("div");
      head.className = "exploration-destruction-head";
      const title = document.createElement("div");
      title.className = "exploration-destruction-title";
      title.textContent = `破坏卡组（${destructionPileIds.length}）`;
      const addButton = document.createElement("button");
      addButton.type = "button";
      addButton.className = "danger";
      addButton.textContent = "随机加入破坏卡";
      addButton.disabled = destructionPileIds.length === 0;
      addButton.addEventListener("click", addRandomDestructionCard);
      head.append(title, addButton);

      const pileList = document.createElement("div");
      pileList.className = "exploration-destruction-list";
      if (destructionPileIds.length) {
        destructionPileIds.forEach((cardId) => {
          const item = document.createElement("span");
          item.className = "exploration-destruction-card";
          item.textContent = getExplorationCardLabel(cardId);
          pileList.appendChild(item);
        });
      } else {
        const item = document.createElement("span");
        item.className = "exploration-destruction-card";
        item.textContent = "破坏卡组为空";
        pileList.appendChild(item);
      }

      const selectedTitle = document.createElement("div");
      selectedTitle.className = "exploration-destruction-title";
      selectedTitle.textContent = `探索卡组中的破坏卡（${selectedDestructionIds.length}）`;

      const selectedList = document.createElement("div");
      selectedList.className = "exploration-destruction-list";
      if (selectedDestructionIds.length) {
        selectedDestructionIds.forEach((cardId) => {
          const item = document.createElement("span");
          item.className = "exploration-destruction-card";
          const label = document.createElement("span");
          label.textContent = getExplorationCardLabel(cardId);
          const returnButton = document.createElement("button");
          returnButton.type = "button";
          returnButton.className = "secondary";
          returnButton.textContent = "移回";
          returnButton.addEventListener("click", () => returnDestructionCard(cardId));
          item.append(label, returnButton);
          selectedList.appendChild(item);
        });
      } else {
        const item = document.createElement("span");
        item.className = "exploration-destruction-card";
        item.textContent = "暂无";
        selectedList.appendChild(item);
      }

      body.append(head, pileList, selectedTitle, selectedList);
      section.append(summary, body);
      return section;
    }

    function currentProfile() {
      return archive.profiles[archive.activeProfileId];
    }

    function currentCycle() {
      const profile = currentProfile();
      if (!profile.cycles?.[profile.activeCycleId]) {
        profile.activeCycleId = "c2";
        profile.cycles = createDefaultCycles("c2");
      }
      return profile.cycles[profile.activeCycleId];
    }

    function currentCycleConfig() {
      return cycleConfigs.find((cycle) => cycle.id === currentProfile().activeCycleId) || cycleConfigs[1];
    }

    function saveState() {
      currentCycle().state = state;
      queueCampaignSave();
    }

    async function loadCampaignSection() {
      try {
        const response = await fetch(campaignStorageUrl, { cache: "no-store" });
        if (response.status === 401) {
          showAuth("登录已过期，请重新登录。");
          return;
        }
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.error || "读取失败");
        campaignStorageAvailable = true;
        campaignSectionRevision = Math.max(0, Number(payload.revision || 0));
        const flushQueuedSave = campaignSaveQueuedBeforeReady;
        campaignSaveQueuedBeforeReady = false;
        if (payload.exists && payload.state) {
          renderDashboardArchive(payload.state);
          campaignSectionBaseline = cloneJson(archive);
        } else {
          campaignSectionBaseline = cloneJson(archive);
          queueCampaignSave();
        }
        if (flushQueuedSave) queueCampaignSave();
      } catch (error) {
        campaignStorageAvailable = false;
        console.warn(error);
      }
    }

    function queueCampaignSave() {
      if (!campaignStorageAvailable) {
        campaignSaveQueuedBeforeReady = true;
        return;
      }
      clearTimeout(campaignSaveTimer);
      campaignSaveTimer = setTimeout(saveCampaignSection, 260);
    }

    async function saveCampaignSection() {
      if (!campaignStorageAvailable) return;
      if (campaignSaveInFlight) {
        campaignSavePending = true;
        return;
      }
      campaignSaveInFlight = true;
      campaignSavePending = false;
      const archiveBeingSaved = cloneJson(archive);
      try {
        const response = await fetch(campaignStorageUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            section: campaignStorageSection,
            state: archiveBeingSaved,
            expectedRevision: campaignSectionRevision,
          }),
        });
        if (response.status === 401) {
          showAuth("登录已过期，请重新登录。");
          return;
        }
        const payload = await response.json().catch(() => null);
        if (response.status === 409 && payload?.code === "SAVE_CONFLICT") {
          campaignSavePending = false;
          if (!campaignConflictReloading) {
            campaignConflictReloading = true;
            const latest = await readLatestDashboardSection();
            const merged = mergeDashboardChanges(campaignSectionBaseline || defaultArchive, archive, latest.archive);
            campaignSectionRevision = latest.revision;
            campaignSectionBaseline = cloneJson(latest.archive);

            if (merged.conflicts.length) {
              const shown = merged.conflicts.slice(0, 8).join("\n");
              const more = merged.conflicts.length > 8 ? `\n另有 ${merged.conflicts.length - 8} 项` : "";
              const keepLocal = window.confirm(
                `另一个页面修改了相同字段：\n${shown}${more}\n\n确定：保留当前页面的值并合并保存\n取消：放弃当前页面修改并加载服务器最新数据`
              );
              if (!keepLocal) {
                renderDashboardArchive(latest.archive);
                campaignConflictReloading = false;
                return;
              }
            }

            renderDashboardArchive(merged.value);
            campaignSavePending = true;
            campaignConflictReloading = false;
          }
          return;
        }
        if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
        campaignSectionRevision = Math.max(0, Number(payload.revision || campaignSectionRevision));
        campaignSectionBaseline = archiveBeingSaved;
        campaignSyncChannel?.postMessage({ revision: campaignSectionRevision });
      } catch (error) {
        campaignConflictReloading = false;
        console.warn(error);
      } finally {
        campaignSaveInFlight = false;
        if (campaignSavePending) saveCampaignSection();
      }
    }

    function activeStoryDoomData() {
      return {
        storyCards: [],
        doomCards: [],
        storySteps: [],
        doomSteps: [],
        inwardOdyssey: null,
        ...(storyDoomData.cycles?.[currentCycleConfig().id] || {}),
      };
    }

    function ensureCardTracks() {
      state.cardTracks = normalizeCardTracks(state.cardTracks, state.cardCounters, state.cardTracks && state.cardTracksVersion !== 2, currentCycleConfig().id);
      state.cardTracksVersion = 2;
      const cycleData = activeStoryDoomData();
      cardTrackGroups.story.tracks.concat(cardTrackGroups.doom.tracks).forEach((def) => {
        if (def.fixed || !state.cardTracks[def.key]) return;
        const deck = Array.isArray(cycleData[def.source]) ? cycleData[def.source] : [];
        if (deck.length && state.cardTracks[def.key].position > deck.length) {
          state.cardTracks[def.key].position = deck.length;
          state.cardTracks[def.key].progress = 0;
        }
      });
      return state.cardTracks;
    }

    function cardTrackCard(def, track, cycleData) {
      if (def.fixed) return cycleData[def.source] || null;
      const deck = Array.isArray(cycleData[def.source]) ? cycleData[def.source] : [];
      return track.position > 0 ? deck[track.position - 1] || null : null;
    }

    function cardTrackPreviewCard(def, track, cycleData) {
      if (def.fixed) return cardTrackCard(def, track, cycleData);
      const deck = Array.isArray(cycleData[def.source]) ? cycleData[def.source] : [];
      return track.position > 0 ? deck[track.position - 1] || null : deck[0] || null;
    }

    function cardTrackStatus(def, track, cycleData) {
      if (def.fixed) return `阿尔戈号知识 ${track.position}`;
      const deck = Array.isArray(cycleData[def.source]) ? cycleData[def.source] : [];
      if (!track.position) return deck[0]?.label ? `未开始，下张 ${deck[0].label} / ${deck.length}` : `未开始 / ${deck.length}`;
      const step = deck[track.position - 1];
      return `${step?.label || `第 ${track.position} 步`} / ${deck.length || "?"}`;
    }

    function cardTrackMeta(def, track, cycleData, card) {
      if (def.fixed) {
        return `当前阿尔戈号知识 ${track.position}；已放进展 ${track.progress}`;
      }
      const deck = Array.isArray(cycleData[def.source]) ? cycleData[def.source] : [];
      if (!track.position) return deck[0]
        ? `未开始；当前预览 ${deck[0].label} ${deck[0].name}。点击推进后正式进入 ${deck[0].label}。`
        : `mod 中找到 ${deck.length} 个 A/B 步骤。点击推进进入 1A。`;
      if (!card) return `第 ${track.position} 步无对应卡面；已放进展 ${track.progress}`;
      return `${card.label} ${card.name}；已放进展 ${track.progress}`;
    }

    function setCardTrackProgress(key, value) {
      const tracks = ensureCardTracks();
      if (!tracks[key]) return;
      tracks[key].progress = normalizeCounterValue(value);
      saveState();
      renderCardTrackDialog();
    }

    function stepCardTrackProgress(key, delta) {
      const tracks = ensureCardTracks();
      if (!tracks[key]) return;

    async function readServerArgoRecord() {
      const response = await fetch(`${authUrl}?section=record`, { cache: "no-store" });
      if (response.status === 401) return { available: false, record: null, error: "auth required" };
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      if (!payload.ok) throw new Error(payload.error || "read failed");
      const savedRecord = payload.exists && isPlainObject(payload.state) ? payload.state : null;
      const profileRecord = isPlainObject(savedRecord?.users)
        ? savedRecord.users[archive.activeProfileId] || null
        : savedRecord;
      return {
        available: true,
        record: isPlainObject(profileRecord) ? profileRecord : null,
        revision: Math.max(0, Number(payload.revision || 0)),
      };
    }

    async function writeServerArgoRecord(record, expectedRevision) {
      const response = await fetch(`${authUrl}?section=record`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          section: "record",
          userId: archive.activeProfileId,
          state: record,
          expectedRevision,
        }),
      });
      const payload = await response.json().catch(() => null);
      if (response.status === 409 && payload?.code === "SAVE_CONFLICT") return { conflict: true };
      if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
      return { conflict: false, revision: Math.max(0, Number(payload.revision || 0)) };
    }

    function mergeArgoRecords(serverRecord, localRecord) {
      if (!isPlainObject(serverRecord)) return isPlainObject(localRecord) ? { ...localRecord } : {};
      if (!isPlainObject(localRecord)) return { ...serverRecord };

      const merged = { ...localRecord, ...serverRecord };
      [
        "crewBoxes",
        "enemies",
        "adventures",
        "diplomacy",
        "resources",
        "map",
        "matrix",
        "maxUnlocked",
        "pygmalion",
        "rooting",
      ].forEach((key) => {
        merged[key] = {
          ...(isPlainObject(localRecord[key]) ? localRecord[key] : {}),
          ...(isPlainObject(serverRecord[key]) ? serverRecord[key] : {}),
        };
      });

      ["godforms", "nymphCards", "godformUsedCards", "nymphUsedCards", "titans"].forEach((key) => {
        const serverList = Array.isArray(serverRecord[key]) ? serverRecord[key] : [];
        const localList = Array.isArray(localRecord[key]) ? localRecord[key] : [];
        merged[key] = serverList.length ? serverList : localList;
      });

      return merged;
    }

    async function syncSurveyAdventureToArgoRecord() {
      const action = latestSurveyAdventureRecordAction();
      if (!action) return;

      const localRecord = readLocalArgoRecord();
      let serverAvailable = false;
      let serverRecord = null;
      let serverRevision = 0;
      try {
        const server = await readServerArgoRecord();
        serverAvailable = server.available;
        serverRecord = server.record;
        serverRevision = server.revision || serverRevision;
      } catch (error) {
        console.warn(error);
      }

      const applyAction = (baseRecord) => {
        const record = mergeArgoRecords(baseRecord, localRecord);
        record.profileName ||= "阿尔戈号记录";
        record.cycle = action.cycle;
        record.day = action.day;
        const slot = markRecordAdventure(record, action);
        if (slot) appendRecordSyncLog(record, `Day ${action.day} 定数写入：${action.adventure} -> ${adventureSlotLabel(slot)}`);
        return record;
      };
      let record = applyAction(serverRecord);
      updateRecordLinks();

      if (serverAvailable) {
        try {
          for (let attempt = 0; attempt < 3; attempt += 1) {
            const writeResult = await writeServerArgoRecord(record, serverRevision);
            if (!writeResult.conflict) {
              recordSyncChannel?.postMessage({ revision: writeResult.revision });
              break;
            }
            const latest = await readServerArgoRecord();
            serverRevision = latest.revision || serverRevision;
            record = applyAction(latest.record);
          }
        } catch (error) {
          console.warn(error);
        }
      }
    }

    function normalizeAdventureTitle(value) {
      return String(value || "").toLowerCase().replace(/travelled/g, "traveled").replace(/[^a-z0-9]+/g, "");
    }

    function adventureSlotLabel(slot) {
      if (slot === "alpha") return "Alpha";
      if (slot === "omega") return "Omega";
      if (slot === "mid1") return "左侧空白格";
      if (slot === "mid2") return "右侧空白格";
      return slot || "";
    }

    function appendRecordSyncLog(record, message) {
      const stamp = new Date().toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
      const line = `${stamp} ${message}`;
      record.syncLog = [line, record.syncLog].filter(Boolean).join("\n").slice(0, 6000);
    }

    function markRecordAdventure(record, action) {
      const adventures = {
        c1: ["Fated Conundrum", "Plight of the People", "Hidden in Plain Sight", "Man of Purpose", "Uneasy Rests the Head", "Tears of a Minotaur", "Dreams Laid Bare", "Tutorial"],
        c2: ["Consider the Ant", "The Other Thermopylae", "From the Ashes", "Intended Purpose", "Misery Industry", "Parable of the Butterfly", "Truth to Weakness", "When the Land Meets the Sea"],
        c3: ["Road Less Traveled", "Children of the Sun", "What We Left Behind", "Of Wax And Promises", "Can't Go Back", "Sin of the Fathers", "Coming of Age"],
      };
      const index = (adventures[action.cycle] || []).findIndex((title) => normalizeAdventureTitle(title) === normalizeAdventureTitle(action.adventure));
      if (index < 0) return "";
      record.adventures ||= {};
      const prefix = `${action.cycle}-${index}`;
      let slot = "";
      if (action.box === "alpha" || action.box === "omega") {
        slot = action.box;
      } else if (!record.adventures[`${prefix}-mid1`]) {
        slot = "mid1";
      } else if (!record.adventures[`${prefix}-mid2`]) {
        slot = "mid2";
      }
      if (!slot) return "";
      delete record.adventures[prefix];
      record.adventures[`${prefix}-${slot}`] = true;
      return slot;
    }

    function setSurveyConstant(groupId, itemId, boxId, checked) {
      ensureTodaySurveyConstants();
      state.surveyConstantsTouchedDay = surveyConstantsDayKey();
      if (groupId === "rr") {
        if (checked) {
          state.surveyConstants.rr[itemId] = true;
          state.surveyConstants.activeRr = { itemId };
        } else {
          delete state.surveyConstants.rr[itemId];
          if (state.surveyConstants.activeRr?.itemId === itemId) {
            state.surveyConstants.activeRr = firstCheckedSurveyRrTarget(getCurrentSurveyConstantData());
          }
        }
      } else {
        state.surveyConstants.hubs[itemId] ||= {};
        if (checked) {
          state.surveyConstants.hubs[itemId][boxId] = true;
          state.surveyConstants.activeHub = { itemId, boxId };
          state.latestSurveyAdventureAction = {
            cycle: currentCycleConfig().id,
            day: Math.max(0, Number(state.day || 0)),
            itemId,
            boxId,
          };
          setNextBattleTerrainFromHub(itemId, boxId);
        } else {
          delete state.surveyConstants.hubs[itemId][boxId];
          if (state.surveyConstants.activeHub?.itemId === itemId && state.surveyConstants.activeHub?.boxId === boxId) {
            state.surveyConstants.activeHub = firstCheckedSurveyHubTarget(getCurrentSurveyConstantData());
          }
          clearNextBattleTerrainForHub(itemId, boxId);
        }
        if (!Object.keys(state.surveyConstants.hubs[itemId]).length) delete state.surveyConstants.hubs[itemId];
      }
      if (groupId !== "rr" && checked) {
        recordSyncChannel?.postMessage({ source: "dashboard-constant-pending" });
        void syncSurveyAdventureToArgoRecord();
      }
      saveState();
      renderFlow();

    function createSurveyConstantCard(item, groupId) {
      const card = document.createElement("article");
      card.className = "survey-constant-card";

      const title = document.createElement("div");
      title.className = "survey-constant-title";
      title.innerHTML = `${escapeHtml(item.title)}${item.passage ? ` <span>(${escapeHtml(item.passage)})</span>` : ""}`;

      const boxes = document.createElement("div");
      boxes.className = "survey-constant-boxes";
      item.boxes.forEach(([boxId, roll, label]) => {
        const row = document.createElement("label");
        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = surveyConstantChecked(groupId, item.id, boxId);
        input.addEventListener("change", () => setSurveyConstant(groupId, item.id, boxId, input.checked));
        const rollText = document.createElement("span");
        rollText.className = "survey-constant-roll";
        rollText.textContent = roll;
        const labelText = document.createElement("span");
        labelText.textContent = label;

        boxes.appendChild(row);

    function setSimpleConstant(valueKey, activeKey, ensureFn, boxId, checked) {
      ensureFn();
      if (checked) {
        state[valueKey][boxId] = true;
        state[activeKey] = boxId;
      } else {
        delete state[valueKey][boxId];
        if (state[activeKey] === boxId) {
          state[activeKey] = Object.keys(state[valueKey])[0] || null;
        }
      }
      saveState();
      renderFlow();
    }

    function setPharosDreamConstant(boxId, checked) {
      setSimpleConstant("pharosDreams", "pharosDreamsActive", ensureTodayPharosDreams, boxId, checked);
    }

    function setMainStoryConstant(boxId, checked) {
      setSimpleConstant("mainStoryConstants", "mainStoryConstantsActive", ensureTodayMainStoryConstants, boxId, checked);
    }

    function setSpecialEventConstant(boxId, checked) {
      setSimpleConstant("specialEventConstants", "specialEventConstantsActive", ensureTodaySpecialEventConstants, boxId, checked);
    }

    function rememberConstantDetailsOpen(details, key) {
      details.open = Boolean(constantToolsOpen[key]);
      details.addEventListener("toggle", () => {
        if (details.open) {
          constantToolsOpen[key] = true;
        } else {
          delete constantToolsOpen[key];
        }
      });
      return details;
    }

    function createSimpleConstantTools(data, options) {
      if (!data) return null;

      const values = options.ensure();
      const wrapper = document.createElement("details");
      wrapper.className = "survey-constants";
      rememberConstantDetailsOpen(wrapper, options.openKey);
      const summary = document.createElement("summary");
      summary.textContent = options.summary;
      const body = document.createElement("div");
      body.className = "survey-constants-body";

      const group = document.createElement("section");
      group.className = "survey-constant-group";
      group.innerHTML = `<div class="survey-constant-heading">${escapeHtml(data.title)}</div>`;
      const grid = document.createElement("div");
      grid.className = "survey-constant-grid";
      const card = document.createElement("article");
      card.className = "survey-constant-card";

      const title = document.createElement("div");
      title.className = "survey-constant-title";
      title.innerHTML = `${escapeHtml(data.title)}${options.subtitle ? ` <span>${escapeHtml(options.subtitle)}</span>` : ""}`;
      const boxes = document.createElement("div");
      boxes.className = "survey-constant-boxes";
      data.boxes.forEach((item) => {
        const [boxId, roll, label] = item;
        const slotIds = simpleConstantSlotIds(item);
        const row = document.createElement(slotIds.length === 1 ? "label" : "div");
        row.className = slotIds.length === 1 ? "" : "survey-constant-row-item multi-slot";
        const slotWrap = document.createElement("span");
        slotWrap.className = "simple-constant-slots";
        slotIds.forEach((slotId, index) => {
          const input = document.createElement("input");
          input.type = "checkbox";
          input.checked = Boolean(values[slotId] || (index === 0 && values[boxId]));
          input.setAttribute("aria-label", `${roll} ${label} ${index + 1}`);
          input.addEventListener("change", () => {
            if (values[boxId]) delete values[boxId];
            options.set(slotId, input.checked);
          });
          slotWrap.appendChild(input);
        });
        if (slotIds.length === 1) {
          const rollText = document.createElement("span");
          rollText.className = "survey-constant-roll";
          rollText.textContent = roll;
          const labelText = document.createElement("span");
          labelText.textContent = label;
          row.append(slotWrap.firstChild, rollText, labelText);
        } else {
          const text = document.createElement("span");
          text.innerHTML = `<span class="survey-constant-roll">${escapeHtml(roll)}</span> ${escapeHtml(label)}`;
          row.append(slotWrap, text);
        }
        boxes.appendChild(row);
      });

      card.append(title, boxes);
      grid.appendChild(card);
      group.appendChild(grid);
      body.appendChild(group);
      wrapper.append(summary, body);
      return wrapper;
    }

    function renderStepDesc(desc) {
      return escapeHtml(desc).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }

    function renderFlow() {
      elements.flowList.innerHTML = "";
      const fragment = document.createDocumentFragment();

      flowSteps.forEach((step, index) => {
        const item = document.createElement("article");
        const checked = Boolean(state.completed[step.id]);
        item.className = `flow-step${checked ? " done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "flow-check";
        checkbox.checked = checked;
        checkbox.setAttribute("aria-label", `完成${step.title}`);
        checkbox.addEventListener("change", () => {
          state.completed[step.id] = checkbox.checked;
          if (step.id === "encounter" && checkbox.checked) {
            state.nextBattleTerrain = null;
          }
          saveState();
          renderFlow();
        });

        const text = document.createElement("div");
        const trackReminders = getStepTrackReminders(step.id);
        const titleText = step.id === "story" || step.id === "doom"
          ? `<button type="button" class="flow-title-button" data-card-track-open="${step.id}">${escapeHtml(step.title)}</button>`
          : `<span>${escapeHtml(step.title)}</span>`;
        text.innerHTML = `
          <div class="step-title">
            <span class="step-index">${String(index + 1).padStart(2, "0")}</span>
            ${titleText}
            <span class="step-kind">${escapeHtml(step.kind)}</span>
          </div>
          <p class="step-desc">${renderStepDesc(step.desc)}</p>
          ${renderStepTrackReminders(trackReminders)}
        `;
        const actions = document.createElement("div");
        actions.className = "step-actions";
        getStepLinks(step).forEach((link) => {
          const anchor = document.createElement("a");
          anchor.href = link.href;
          anchor.textContent = link.label;
          if (link.title) anchor.title = link.title;
          actions.appendChild(anchor);
        });
        if (actions.children.length) text.querySelector(".step-title")?.appendChild(actions);
        if (step.id === "explore") {
          text.appendChild(createExplorationTools());
        }
        if (step.id === "survey") {
          const surveyTools = createSurveyConstantTools();
          if (surveyTools) text.appendChild(surveyTools);
        }
        if (step.id === "story") {
          const constantRow = document.createElement("div");
          constantRow.className = "simple-constant-row";
          [
            createPharosDreamConstantTools(),
            createMainStoryConstantTools(),
            createSpecialEventConstantTools(),
          ].filter(Boolean).forEach((tools) => constantRow.appendChild(tools));
          if (constantRow.children.length) text.appendChild(constantRow);
        }
        item.append(checkbox, text);
        fragment.appendChild(item);
      });

      elements.flowList.appendChild(fragment);
      renderProgress();
      updateRecordLinks();
    }

    function createExplorationTools() {
      const library = getExplorationLibrary();
      const selectedIds = getSelectedExplorationIds();
      const drawState = ensureExplorationDrawState();
      const specialRule = getExplorationSpecialRule();
      const destructionPileIds = specialRule ? getDestructionPileIds() : [];
      const wrapper = document.createElement("div");
      wrapper.className = "exploration-tools";

      if (!library.length) {
        wrapper.innerHTML = '<div class="exploration-summary">当前 Cycle 暂无探索卡组数据。</div>';
        return wrapper;
      }

      const toolbar = document.createElement("div");
      toolbar.className = "exploration-toolbar";

      const status = document.createElement("div");
      status.className = "exploration-status";
      status.innerHTML = `
        <div class="exploration-count">已选 ${selectedIds.length} / ${library.length} 张</div>
      `;

      const buttons = document.createElement("div");
      buttons.className = "exploration-buttons";
      const drawButton = document.createElement("button");
      drawButton.type = "button";
      drawButton.textContent = "抽探索卡";
      drawButton.disabled = selectedIds.length === 0;
      drawButton.addEventListener("click", drawExplorationCard);

      const resetButton = document.createElement("button");
      resetButton.type = "button";
      resetButton.className = "secondary";
      resetButton.textContent = "重洗牌堆";
      resetButton.disabled = selectedIds.length === 0;
      resetButton.addEventListener("click", resetExplorationDeck);

      const endButton = document.createElement("button");
      endButton.type = "button";
      endButton.className = "secondary";
      endButton.textContent = "结束抽卡";
      endButton.disabled = drawState.history.length === 0;
      endButton.addEventListener("click", endExplorationDraw);

      buttons.append(drawButton, endButton, resetButton);
      toolbar.append(status, buttons);

      const summary = document.createElement("div");
      summary.className = "exploration-summary";
      summary.innerHTML = `
        <div>剩余 ${drawState.drawPile.length} / ${selectedIds.length}，已抽 ${drawState.history.length}，弃牌 ${drawState.discardPile.length}${specialRule ? `，破坏卡组 ${destructionPileIds.length}` : ""}</div>
      `;

      const drawnCards = document.createElement("section");
      drawnCards.className = "exploration-drawn";
      if (drawState.history.length) {
        const drawnTitle = document.createElement("div");
        drawnTitle.className = "exploration-drawn-title";
        drawnTitle.textContent = `已抽卡面（${drawState.history.length}）`;
        const drawnGrid = document.createElement("div");
        drawnGrid.className = "exploration-drawn-grid";
        drawState.history.forEach((entry) => {
          const drawnCard = document.createElement("article");
          drawnCard.className = "exploration-drawn-card";

          const drawnFace = document.createElement("div");
          drawnFace.className = "exploration-drawn-face";
          drawnFace.setAttribute("aria-label", entry.name);
          drawnFace.setAttribute("role", "img");
          drawnFace.style.cssText = getExplorationCardImageStyle(entry.id);

          const meta = document.createElement("div");
          meta.className = "exploration-drawn-meta";
          const cornerNumber = getExplorationCornerNumber(entry.id);
          meta.textContent = `D${entry.day} · ${entry.name} #${entry.id}${cornerNumber ? ` · 黑底${cornerNumber}` : ""}`;

          drawnCard.append(drawnFace, meta);
          drawnGrid.appendChild(drawnCard);
        });
        drawnCards.append(drawnTitle, drawnGrid);
      }

      const builder = document.createElement("details");
      builder.className = "exploration-builder";
      const builderSummary = document.createElement("summary");
      builderSummary.textContent = "选择探索卡库";
      builder.appendChild(builderSummary);

      const builderBody = document.createElement("div");
      builderBody.className = "exploration-builder-body";
      const builderActions = document.createElement("div");
      builderActions.className = "exploration-builder-actions";

      const applyButton = document.createElement("button");
      applyButton.type = "button";
      applyButton.textContent = "应用选择";

      const selectAllButton = document.createElement("button");
      selectAllButton.type = "button";
      selectAllButton.className = "secondary";
      selectAllButton.textContent = "全选";

      const clearButton = document.createElement("button");
      clearButton.type = "button";
      clearButton.className = "secondary";
      clearButton.textContent = "清空";

      const restoreDefaultButton = document.createElement("button");
      restoreDefaultButton.type = "button";
      restoreDefaultButton.className = "secondary";
      restoreDefaultButton.textContent = "恢复初始";
      restoreDefaultButton.hidden = !defaultExplorationSelections[currentCycleConfig().id]?.length;
      restoreDefaultButton.addEventListener("click", restoreDefaultExplorationSelection);

      const libraryList = document.createElement("div");
      libraryList.className = "exploration-library";
      const selectedSet = new Set(selectedIds);
      const destructionSet = new Set(specialRule ? getDestructionCardIds() : []);
      library.forEach((card) => {
        const item = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = card.id;
        checkbox.checked = selectedSet.has(card.id);
        checkbox.disabled = destructionSet.has(card.id);
        const text = document.createElement("span");
        const cornerNumber = getExplorationCornerNumber(card.id);
        text.textContent = `${card.name} #${card.id}${cornerNumber ? ` · 黑底${cornerNumber}` : ""}${destructionSet.has(card.id) ? " · 破坏卡" : ""}`;
        item.append(checkbox, text);
        if (specialRule && !destructionSet.has(card.id)) {
          const destructionButton = document.createElement("button");
          destructionButton.type = "button";
          destructionButton.className = "secondary";
          destructionButton.textContent = "加入破坏";
          destructionButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            addCardToDestructionPile(card.id);
          });
          item.appendChild(destructionButton);
        }
        libraryList.appendChild(item);
      });

      const getCheckedIds = () => [...libraryList.querySelectorAll('input[type="checkbox"]:checked')].map((input) => input.value);
      applyButton.addEventListener("click", () => applyExplorationSelection(getCheckedIds()));
      selectAllButton.addEventListener("click", () => {
        libraryList.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach((input) => {
          input.checked = true;
        });
      });
      clearButton.addEventListener("click", () => {
        libraryList.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach((input) => {
          input.checked = false;
        });
      });

      builderActions.append(applyButton, selectAllButton, clearButton, restoreDefaultButton);
      builderBody.append(builderActions, libraryList);
      builder.appendChild(builderBody);

      wrapper.append(toolbar, summary);
      if (drawState.history.length) wrapper.appendChild(drawnCards);
      const destructionTools = createExplorationDestructionTools(selectedIds, destructionPileIds);
      if (destructionTools) wrapper.appendChild(destructionTools);
      wrapper.appendChild(builder);
      return wrapper;
    }

      if (step.id === "move" || step.id === "explore" || step.id === "end") {

      }
      if (step.id === "survey") {

          getSurveyHubStoryLink(),
          getSurveyRrStoryLink(),

        return currentCycleConfig().storyBook ? [{ label: "打开 Story", href: getStoryHref() }] : [];

          { label: "回忆突破", href: getStoryHref({ module: "mnemos-breakthrough" }) },
          getInwardOdysseyStoryLink(),
          getPharosDreamStoryLink(),
          getMainStoryLink(),

      }
      if (step.id === "doom") {

          getSpecialEventLink(),

    }
