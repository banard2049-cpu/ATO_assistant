      return state.dateNotes?.[dateNoteKey(state.day)] || "";
    }

    function renderCurrentDateNote() {
      const note = currentDateNoteText();
      elements.currentDateNote.hidden = !note;
      elements.currentDateNote.textContent = note ? `日期轨笔记：${note}` : "";
    }

    function keepCurrentDateVisible() {
      const list = elements.dateTrackList;
      if (currentCycleConfig().id === "c1" && Number(state.day) === 0) {
        list.scrollTop = 0;
        return;
      }
      const current = elements.dateTrackList.querySelector(".date-track-item.current");
      if (!current) return;

      const alignCurrent = () => {
        const listRect = list.getBoundingClientRect();
        const currentRect = current.getBoundingClientRect();
        const centeredOffset = currentRect.top - listRect.top - (list.clientHeight - currentRect.height) / 2;
        const maxScrollTop = Math.max(0, list.scrollHeight - list.clientHeight);
        list.scrollTop = Math.min(maxScrollTop, Math.max(0, list.scrollTop + centeredOffset));

        const updatedRect = current.getBoundingClientRect();
        const viewportTop = 12;
        const viewportBottom = window.innerHeight - 12;
        if (updatedRect.top < viewportTop || updatedRect.bottom > viewportBottom) {
          current.scrollIntoView({ block: "nearest", inline: "nearest" });
        }
      };

      window.requestAnimationFrame(() => {
        alignCurrent();
        window.requestAnimationFrame(alignCurrent);
      });
    }

    function dateTrackIcons(entry, track) {
      const iconIds = [...(entry.icons || [])];
      if (entry.day != null) {
        if (track.structureTechDays?.includes(entry.day)) iconIds.push("structureTech");
        if (track.battleTechDays?.includes(entry.day)) iconIds.push("battleTech");
        if (track.battleDays?.includes(entry.day)) iconIds.push("battle");
      }
      return [...new Set(iconIds)]
        .map((id) => dateIconTypes[id])
        .filter(Boolean);
    }

    function todayTrackIcons() {
      const track = dateTrackData[currentCycleConfig().id];
      if (!track) return [];

      const entry = track.entries.find((item) => item.day === state.day);
      return dateTrackIcons(entry || { day: state.day }, track);
    }

    function getSurveyMapReminders() {
      const tags = currentMapTagSet();
      if (!state.mapCurrentTileIsLatestRevealed) return [];

      const reminders = [];
      const location = currentMapTileLabel();

      if (tags.has("central_adventure")) {
        reminders.push({
          title: "当前最新揭示板块有中枢冒险",
          tag: { label: "中枢", className: "important" },
          desc: `${location} 是最新揭示的板块，并带有中枢冒险标签，请在本步骤结算冒险中枢。`,
          className: "important",
        });
      }

      if (tags.has("rr_adventure")) {
        reminders.push({
          title: "当前最新揭示板块有 R&R 冒险",
          tag: { label: "R&R", className: "battle-tech" },
          desc: `${location} 是最新揭示的板块，并带有 R&R 冒险标签，请在本步骤结算 R&R。`,
          className: "important",
        });
      }

      return reminders;
    }
    function getExploreMapReminders() {
      const tags = currentMapTagSet();
      if (!tags.has("city") || state.mapCurrentTileHasLastCityMarker) return [];

      return [{
        title: "当前城市可谈判",
        tag: { label: "谈判", className: "structure-tech" },
        desc: `${currentMapTileLabel()} 是城市，且不是最后到访城市。探索阶段可以进行谈判。`,
        className: "important",
      }];
    }

    function getStoryMapReminders() {
      const tags = currentMapTagSet();
      if (!tags.has("progress") || !state.mapCurrentTileIsLatestRevealed) return [];

      return [{
        title: "新探索板块放置进展",
        tag: { label: "进展", className: "structure-tech" },
        desc: `${currentMapTileLabel()} 是最新揭示的板块，且带有进展指示物标记。请在故事步骤放置 1 个进展。`,
        className: "tech",
      }];
    }

    function getDoomMapReminders() {
      const tags = currentMapTagSet();
      if (!tags.has("calamity")) return [];

      return [{
        title: "当前板块放置灾祸指示物",
        tag: { label: "灾祸", className: "battle" },
        desc: `${currentMapTileLabel()} 带有灾祸标记。请在灾祸步骤放置 1 个灾祸指示物。`,
        className: "important",
      }];
    }

    function getNextBattleTerrainReminder() {
      state.nextBattleTerrain = normalizeNextBattleTerrain(state.nextBattleTerrain);
      if (!state.nextBattleTerrain) return [];

      const terrain = state.nextBattleTerrain;
      const source = [terrain.hub, terrain.source].filter(Boolean).join(" · ");
      return [{
        title: "下次战斗特殊板块",
        tag: { label: "板块", className: "battle-tech" },
        desc: `${terrain.terrain}${source ? `，来源：${source}` : ""}。`,
        className: "tech",
      }];
    }

    function getStepTrackReminders(stepId) {
      const icons = todayTrackIcons();
      if (stepId === "explore") {
        return getExploreMapReminders();
      }

      if (stepId === "survey") {
        return getSurveyMapReminders();
      }

      if (stepId === "story") {
        return getStoryMapReminders();
      }

      if (stepId === "doom") {
        return getDoomMapReminders();
      }

      if (stepId === "encounter") {
        const reminders = getNextBattleTerrainReminder();
        if (icons.some((icon) => icon.className === "battle")) {
          reminders.push({
            title: "今日战斗",
            tag: { label: "战斗", className: "battle" },
            desc: "时间表标记了今日战斗，请进入故事书战斗模块处理。",
            className: "important",
          });
        }
        return reminders;
      }

      if (stepId === "development") {
        return icons
          .filter((icon) => icon.className === "structure-tech" || icon.className === "battle-tech")
          .map((icon) => ({
            title: icon.label,
            tag: icon,
            desc: `时间表标记了今日${icon.label}突破，在发展阶段处理。`,
            className: "tech",
          }));
      }

      return [];
    }

    function renderStepTrackReminders(reminders) {
      if (!reminders.length) return "";
      return `
        <div class="step-track-reminders">
          ${reminders.map((reminder) => `
            <div class="step-track-reminder ${reminder.className}">
              <div class="step-track-title">
                <span class="step-track-tag ${reminder.tag.className}">${escapeHtml(reminder.tag.label)}</span>
                <span>${escapeHtml(reminder.title)}</span>
              </div>
              <p class="step-track-desc">${escapeHtml(reminder.desc)}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    function editDateNote(day) {
      const key = dateNoteKey(day);
      const current = state.dateNotes?.[key] || "";
      const next = window.prompt(`记录 Day ${key}`, current);
      if (next === null) return;

      state.dateNotes ||= {};
      const trimmed = next.trim();
      if (trimmed) {
        state.dateNotes[key] = trimmed;
      } else {
        delete state.dateNotes[key];
      }
      saveState();
      renderCurrentDateNote();
      renderDateTrack();
    }

    function renderDateTrack() {
      const config = currentCycleConfig();
      const track = dateTrackData[config.id];
      elements.dateTrackList.innerHTML = "";
      if (!track) {
        elements.dateTrackMeta.textContent = "此循环暂无记录表日期轨。";
        elements.dateTrackList.innerHTML = '<div class="empty">暂无日期轨。</div>';
        renderCurrentDateNote();
        return;
      }

      elements.dateTrackMeta.textContent = `${track.label} · 当前 Day ${state.day}`;
      const fragment = document.createDocumentFragment();
      track.entries.forEach((entry) => {
        const eventText = entry.day == null ? "" : track.events[entry.day];
        const noteText = entry.day == null ? "" : state.dateNotes?.[dateNoteKey(entry.day)] || "";
        const icons = dateTrackIcons(entry, track);
        const isCurrentDay = entry.day != null && Number(entry.day) === Number(state.day);
        const item = document.createElement("div");
        item.className = `date-track-item${isCurrentDay ? " current" : ""}${eventText ? " event" : ""}${noteText ? " noted" : ""}${entry.day == null ? " disabled" : ""}`;
        item.title = noteText ? `Day ${formatTrackDay(entry)}：${noteText}` : `给 Day ${formatTrackDay(entry)} 写备注`;
        if (entry.day != null) {
          item.setAttribute("role", "button");
          item.tabIndex = 0;
          if (isCurrentDay) item.setAttribute("aria-current", "date");
        }
        item.innerHTML = `
          <span class="date-track-day">${escapeHtml(formatTrackDay(entry))}</span>
          ${icons.length ? `<span class="date-track-icons">${icons.map((icon) => `<span class="date-track-icon ${icon.className}">${escapeHtml(icon.label)}</span>`).join("")}</span>` : ""}
          ${eventText ? `<span class="date-track-event">${escapeHtml(eventText)}</span>` : ""}
          ${noteText ? `<span class="date-track-note">${escapeHtml(noteText)}</span>` : ""}
        `;
        if (entry.day != null) {
          item.addEventListener("click", (event) => {
            if (event.target.closest("button, a, input, select, textarea")) return;
            editDateNote(entry.day);
          });
          item.addEventListener("keydown", (event) => {
            if (event.key !== "Enter" && event.key !== " ") return;
            event.preventDefault();
            editDateNote(entry.day);
          });
          const acclimation = getAcclimationRule(entry.day, config.id);
          if (acclimation && isCurrentDay) {
            const actions = document.createElement("span");
            actions.className = "date-track-actions";
            const action = document.createElement("button");
            action.type = "button";
            action.className = `date-track-action${isAcclimationApplied(acclimation, config.id) ? " applied secondary" : ""}`;
            action.textContent = isAcclimationApplied(acclimation, config.id) ? "已扎根" : "扎根";
            action.title = `${acclimation.label}: ${acclimation.from.join(", ")} -> ${acclimation.to.join(", ")}`;
            action.addEventListener("click", (event) => {
              event.stopPropagation();
              applyAcclimationReplacement(acclimation);
            });
            actions.appendChild(action);
            item.appendChild(actions);
          }
        }
        fragment.appendChild(item);
      });
      elements.dateTrackList.appendChild(fragment);
      renderCurrentDateNote();
      keepCurrentDateVisible();
    }

    function resetToday() {
      state.completed = {};
      state.events = state.events.map((item) => ({ ...item, done: false }));
      saveState();
      renderFlow();
      renderDateTrack();
    }

    function nextDay() {
      state.day = Math.max(0, Number(state.day || 0) + 1);
      state.completed = {};
      state.events = state.events.filter((item) => !item.done);
      state.latestSurveyAdventureAction = null;
      syncInputs();
      saveState();
      renderFlow();
      renderDateTrack();
    }

    async function loadFullCampaign() {
      try {
        const response = await fetch(authUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.error || "读取失败");
        return payload.campaign || null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function saveImportedCampaignSection(section, sectionState) {
      if (sectionState == null) return;
      try {
        const response = await fetch(`${authUrl}?section=${encodeURIComponent(section)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ section, state: sectionState }),
        });
        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload?.ok) throw new Error(payload?.error || `HTTP ${response.status}`);
        return payload;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function downloadJsonPayload(payload) {
      const text = JSON.stringify(payload, null, 2);
      const blob = new Blob([text], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      anchor.href = url;
      anchor.download = `ato-full-save-${stamp}.json`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    async function exportState() {
      saveState();
      const previousText = elements.exportButton.textContent;
      elements.exportButton.textContent = "正在导出...";
      elements.exportButton.disabled = true;
      try {
        const serverCampaign = await loadFullCampaign();
        const serverSections = serverCampaign?.sections || {};
        const sections = {
          dashboard: serverSections.dashboard || archive || null,
          map: serverSections.map || null,
          record: serverSections.record || null,
          technology: serverSections.technology || null,
        };
        const payload = {
          app: "ATO Campaign Save Package",
          version: 2,
          exportedAt: new Date().toISOString(),
          activeProfileId: archive.activeProfileId,
          profiles: archive.profiles,
          sections,
          source: {
            serverIncluded: Boolean(serverCampaign),
            serverUpdatedAt: serverCampaign?.updatedAt || null,
          },
          legacyDashboard: {
            activeProfileId: archive.activeProfileId,
            profiles: archive.profiles,
          },
        };
        downloadJsonPayload(payload);
        elements.exportButton.textContent = "已下载";
        window.setTimeout(() => {
          elements.exportButton.textContent = previousText;
        }, 1200);
      } finally {
        elements.exportButton.disabled = false;
      }
    }

    function importStateFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const imported = JSON.parse(String(reader.result || "{}"));
          const sections = imported.sections || imported.campaign?.sections || null;
          const dashboardImport = sections?.dashboard || imported.legacyDashboard || imported;
          const nextArchive = dashboardImport.profiles
            ? normalizeArchive(dashboardImport)
            : normalizeArchive({
                activeProfileId: "imported",
                profiles: {
                  imported: {
                    id: "imported",
                    name: dashboardImport.name || "导入用户",
                    state: dashboardImport.state || dashboardImport,
                  },
                },
              });

          archive = nextArchive;
          state = currentCycle().state;
          const [dashboardSave] = await Promise.all([
            saveImportedCampaignSection("dashboard", archive),
            sections?.map ? saveImportedCampaignSection("map", sections.map) : Promise.resolve(),
            sections?.record ? saveImportedCampaignSection("record", sections.record) : Promise.resolve(),
            sections?.technology ? saveImportedCampaignSection("technology", sections.technology) : Promise.resolve(),
          ]);
          campaignSectionRevision = Math.max(0, Number(dashboardSave?.revision || campaignSectionRevision));
          campaignSectionBaseline = cloneJson(archive);
          campaignSyncChannel?.postMessage({ revision: campaignSectionRevision });
          syncInputs();
          renderProfiles();
          renderCycles();
          renderFlow();
          renderDateTrack();
          window.alert("导入完成。");
        } catch (error) {
          window.alert(`导入失败：${String(error.message || error)}`);
        } finally {
          elements.importInput.value = "";
        }
      };
      reader.readAsText(file);
    }

    function clearState() {
      if (!window.confirm(`确定清空当前账号在 ${currentCycleConfig().label} 的 Day、流程、事件和笔记吗？`)) return;
      state = { ...defaultState, completed: {}, dateNotes: {}, cardTracks: normalizeCardTracks({}, {}, false, currentCycleConfig().id), cardTracksVersion: 2, unlockedTech: null, events: [] };
      currentCycle().state = state;
      queueCampaignSave();
      syncInputs();
      renderFlow();
      renderDateTrack();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    elements.dayInput.addEventListener("input", () => {
      state.day = Math.max(0, Number(elements.dayInput.value || 0));
      state.latestSurveyAdventureAction = null;
      saveState();
      renderFlow();
      renderDateTrack();
    });
    elements.flowList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-card-track-open]");
      if (!button) return;
      openCardTrackDialog(button.dataset.cardTrackOpen);
    });
    elements.notesInput.addEventListener("input", () => {
      state.notes = elements.notesInput.value;
      saveState();
    });
    elements.resetTodayButton.addEventListener("click", resetToday);
    elements.nextDayButton.addEventListener("click", nextDay);
    elements.loginModeButton.addEventListener("click", () => setAuthMode("login"));
    elements.registerModeButton.addEventListener("click", () => setAuthMode("register"));
    elements.authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      elements.authMessage.textContent = "";
      elements.authSubmitButton.disabled = true;
      try {
        const user = await requestAuth(authMode, elements.authUsername.value, elements.authPassword.value);
        elements.authPassword.value = "";
        startAuthenticatedApp(user);
      } catch (error) {
        elements.authMessage.textContent = String(error.message || error);
      } finally {
        elements.authSubmitButton.disabled = false;
      }
    });
    elements.logoutButton.addEventListener("click", async () => {
      await fetch(`${authUrl}?action=logout`, { method: "POST" }).catch(() => null);
      sessionUser = null;
      showAuth();
    });
    elements.cycleSelect.addEventListener("change", () => switchCycle(elements.cycleSelect.value));
    elements.exportButton.addEventListener("click", exportState);
    elements.importButton.addEventListener("click", () => elements.importInput.click());
    elements.importInput.addEventListener("change", () => importStateFile(elements.importInput.files[0]));
    elements.cardTrackClose.addEventListener("click", () => elements.cardTrackDialog.close());
    elements.cardTrackDialog.addEventListener("click", (event) => {
      if (event.target === elements.cardTrackDialog) elements.cardTrackDialog.close();
    });
    elements.cardTrackBody.addEventListener("click", (event) => {
      const retreatButton = event.target.closest("[data-card-retreat]");
      if (retreatButton) {
        retreatCardTrack(retreatButton.dataset.cardRetreat);
        return;
      }
      const advanceButton = event.target.closest("[data-card-advance]");
      if (advanceButton) {
        advanceCardTrack(advanceButton.dataset.cardAdvance);
        return;
      }
      const progressButton = event.target.closest("[data-card-progress]");
      if (!progressButton) return;
      stepCardTrackProgress(progressButton.dataset.cardProgress, Number(progressButton.dataset.delta || 0));
    });
    elements.cardTrackBody.addEventListener("change", (event) => {
      const input = event.target.closest("[data-card-progress-input]");
      if (!input) return;
      setCardTrackProgress(input.dataset.cardProgressInput, input.value);
    });
    campaignSyncChannel?.addEventListener("message", () => void syncDashboardFromExternalUpdate());
    window.setInterval(() => void syncDashboardFromExternalUpdate(), 4000);
    window.addEventListener("focus", () => void syncDashboardFromExternalUpdate());
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) void syncDashboardFromExternalUpdate();
    });

    setAuthMode("login");
    initAuth();
  </script>
</body>
</html>
