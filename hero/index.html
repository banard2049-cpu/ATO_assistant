<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英雄记录表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f3f2;
      --paper: #fffdf8;
      --panel: #ffffff;
      --ink: #1c2422;
      --muted: #66726d;
      --line: #d9dfdc;
      --line-strong: #aab6b0;
      --accent: #176c62;
      --accent-2: #8a5b17;
      --red: #a03832;
      --blue: #285f9f;
      --green: #27724c;
      --shadow: 0 16px 36px rgba(34, 44, 40, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { filter: brightness(0.92); }
    button.secondary {
      border: 1px solid var(--line);
      background: #f8faf8;
      color: var(--ink);
    }
    button.danger { background: var(--red); }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }
    textarea { min-height: 88px; line-height: 1.55; resize: vertical; }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .app {
      width: min(1920px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 3vw, 34px) 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(28px, 4vw, 42px); line-height: 1.08; }
    .subtitle { margin-top: 8px; color: var(--muted); font-size: 15px; }

    .topbar-tools { display: grid; gap: 10px; justify-items: end; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .toolbar a {
      display: inline-grid;
      place-items: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 13px;
      background: #f8faf8;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
    }
    .icon-button img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .save-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: right;
    }

    .hero-tabs {
      display: none;
    }
    .hero-tab {
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8faf8;
      color: var(--ink);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .hero-tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .hero-tab:hover:not(.active) { border-color: var(--accent); }

    .heroes-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }
    .hero-column {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .hero-column .panel { font-size: 13px; }
    .hero-column .panel-heading h2 { font-size: 14px; }
    .hero-column .panel:first-child .panel-heading h2 { cursor: pointer; padding-left: 72px; }
    .hero-column .panel-body { padding: 12px; }
    .hero-column .identity-grid {
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 10px;
    }
    .hero-column .portrait-box {
      width: 64px;
      height: 84px;
      cursor: pointer;
      margin-top: -38px;
      position: relative;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background: #f5f3ee;
      overflow: hidden;
      border: none;
      border-radius: 4px;
    }
    .hero-column .portrait-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .hero-column .identity-fields {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .hero-column .skill-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .hero-column .skill-card { padding: 6px 8px; }
    .hero-column .skill-icon { width: 18px; height: 18px; }
    .hero-column .skill-value { font-size: 16px; min-width: 22px; }
    .hero-column .skill-number button { width: 22px; min-width: 22px; min-height: 22px; font-size: 11px; }
    .hero-column .skill-number { grid-template-columns: 22px 30px 22px; gap: 2px; }
    .hero-column .skill-number input { width: 30px; min-height: 22px; font-size: 12px; }

    .likelihood-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 900;
    }
    .likelihood-badge img { width: 18px; height: 18px; }
    .likelihood-badge.most { background: rgba(39, 114, 76, 0.12); color: var(--green); }
    .likelihood-badge.least { background: rgba(160, 56, 50, 0.12); color: var(--red); }

    .triskelion-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) 32px;
      gap: 6px;
      align-items: start;
      margin-top: 0;
    }
    .triskelion-item {
      display: grid;
      gap: 2px;
      justify-items: center;
      text-align: center;
    }
    .triskelion-item img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      padding: 4px;
      border-radius: 50%;
      background: #2f3135;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }
    .triskelion-reset-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 38px;
    }
    .triskelion-reset {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      border-color: #2f3135;
      background: #2f3135;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }
    .triskelion-reset:hover {
      background: #202225;
      border-color: #202225;
    }
    .triskelion-reset img {
      width: 18px;
      height: 18px;
    }

    .hero-empty-slot {
      min-height: 200px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      padding: 16px;
    }

    @media (max-width: 1200px) {
      .heroes-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .heroes-grid { grid-template-columns: 1fr; }
    }

    .add-hero-btn {
      min-height: 36px;
      margin-bottom: 18px;
      font-size: 13px;
    }

    .hidden { display: none; }

    .empty-state {
      min-height: 200px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.7fr);
      gap: 16px;
      align-items: start;
    }

    .stack { display: grid; gap: 16px; min-width: 0; }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 15px;
      border-bottom: 1px solid var(--line);
      background: #f8faf8;
    }
    .panel-heading h2 { font-size: 16px; }
    .panel-body { padding: 15px; }

    .identity-grid {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .portrait-box {
      width: 80px;
      height: 100px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(23,108,98,0.12), rgba(138,91,23,0.14)), #f5f3ee;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .portrait-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .portrait-placeholder {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }
    .identity-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .skill-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 12px;
      background: #fff;
    }
    .skill-card.basic-active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .skill-name { min-width: 0; display: flex; align-items: center; gap: 6px; }
    .skill-name-text { min-width: 0; display: grid; gap: 1px; line-height: 1.05; }
    .skill-name-zh {
      min-width: 0;
      font-size: 11px;
      font-weight: 900;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .skill-name-en {
      min-width: 0;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .skill-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .skill-number {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .skill-number button {
      width: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      font-size: 14px;
      font-weight: 900;
    }
    .skill-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--ink);
      min-width: 28px;
      text-align: center;
    }
    .skill-preview {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
      margin-left: auto;
    }
    .skill-preview-item {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-height: 22px;
      padding: 1px 4px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8faf8;
      font-size: 10px;
      font-weight: 900;
    }
    .skill-preview-abbr {
      font-size: 9px;
      font-weight: 900;
    }
    .skill-preview-item img {
      width: 14px;
      height: 14px;
      object-fit: contain;
    }
    .hero-column .skill-preview {
      gap: 3px;
    }
    .hero-column .skill-preview-item {
      min-height: 20px;
      padding: 1px 3px;
      font-size: 9px;
    }
    .hero-column .skill-preview-item img {
      width: 12px;
      height: 12px;
    }
    .skill-expand-toggle {
      min-height: 24px;
      padding: 0 8px;
      font-size: 11px;
    }
    .mnemos-skill-badge.skill2 {
      background: transparent;
    }
    .mnemos-skill-badge.fated-skill {
      background: transparent;
    }

    .mnemos-tags-display {
      display: none;
    }
    .mnemos-tag-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(23, 108, 98, 0.08);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      vertical-align: middle;
      margin-left: 2px;
    }

    .mnemos-tags-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .tag-select {
      width: auto;
      min-width: 56px;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8faf8;
      font-size: 11px;
      font-weight: 800;
      color: var(--ink);
    }

    .track-bar {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      margin-top: 8px;
    }
    .track-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 20px;
      padding: 5px 1px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
    }
    .track-cell.filled {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .track-cell.milestone {
      border-width: 2px;
      border-color: var(--accent-2);
    }
    .track-cell.milestone.filled {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    .track-cell.final-cell {
      border-color: var(--accent-2);
      background: rgba(138, 91, 23, 0.06);
    }
    .track-cell.final-cell.filled {
      background: var(--accent-2);
      color: #fff;
    }
    .track-num { font-weight: 900; font-size: 11px; }
    .track-cell.milestone .track-num {
      line-height: 1;
    }
    .track-node-cell {
      align-self: center;
      min-width: 28px;
      padding: 4px 2px;
      border: 1px solid var(--accent-2);
      border-radius: 4px;
      background: rgba(138, 91, 23, 0.08);
      color: var(--accent-2);
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .track-node-cell.filled {
      background: var(--accent-2);
      color: #fff;
    }
    .track-final-label {
      align-self: center;
      margin-left: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .fated-track .track-cell {
      min-width: 42px;
      padding: 7px 6px;
    }
    .fated-track .track-cell.milestone {
      border-color: var(--red);
    }
    .fated-track .track-cell.filled {
      background: var(--red);
      border-color: var(--red);
    }

    .fated-keyword {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      margin-right: 6px;
      letter-spacing: 0.3px;
    }
    .fated-card-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8faf8;
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
    }
    .fated-item.active .fated-keyword {
      background: var(--red);
      opacity: 1;
    }
    .fated-item:not(.active) .fated-keyword {
      opacity: 0.5;
    }

    .picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: grid;
      place-items: center;
      z-index: 1000;
      padding: 24px;
    }
    .picker-dialog {
      width: min(680px, 100%);
      max-height: 80vh;
      display: grid;
      grid-template-rows: auto 1fr;
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .picker-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #f8faf8;
    }
    .picker-head h2 { font-size: 16px; }
    .picker-body {
      overflow-y: auto;
      padding: 16px 18px;
    }
    .argonaut-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    .argonaut-picker-card {
      display: grid;
      gap: 4px;
      justify-items: center;
      text-align: center;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px 4px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .argonaut-picker-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(23, 108, 98, 0.18);
    }
    .argonaut-picker-card img {
      width: 64px;
      height: 84px;
      object-fit: cover;
      border-radius: 4px;
      background: linear-gradient(135deg, rgba(23,108,98,0.12), rgba(138,91,23,0.14)), #f5f3ee;
    }
    .argonaut-picker-card span {
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }
    .graveyard-card {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      margin-bottom: 8px;
    }
    .graveyard-entry {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .graveyard-summary {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
    }
    .graveyard-summary::-webkit-details-marker { display: none; }
    .graveyard-body {
      padding: 0 12px 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    .graveyard-section {
      margin-bottom: 6px;
    }
    .graveyard-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .graveyard-portrait {
      width: 40px;
      height: 52px;
      border-radius: 4px;
      overflow: hidden;
      background: #f5f3ee;
    }
    .graveyard-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .graveyard-portrait span {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
    }
    .graveyard-name {
      font-size: 14px;
      font-weight: 900;
    }
    .graveyard-detail {
      font-size: 12px;
      line-height: 1.4;
    }
    .skill-number {
      display: grid;
      grid-template-columns: 26px 38px 26px;
      gap: 3px;
      align-items: center;
    }
    .skill-number button {
      width: 100%;
      min-width: 0;
      min-height: 28px;
      padding: 0;
      font-size: 12px;
      font-weight: 900;
    }
    .skill-number input {
      width: 38px;
      min-width: 0;
      min-height: 28px;
      padding: 4px 2px;
      text-align: center;
      font-weight: 900;
      font-size: 13px;
    }
    .skill-number input::-webkit-outer-spin-button,
    .skill-number input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .skill-number input[type="number"] { appearance: textfield; -moz-appearance: textfield; }

    .mnemos-list { display: grid; gap: 8px; }
    .mnemos-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      font-size: 13px;
    }
    .mnemos-item.active { border-color: var(--accent); background: rgba(23, 108, 98, 0.04); }
    .mnemos-card {
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      background: #fff;
    }
    .panel-heading-actions {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .mnemos-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
    }
    .mnemos-title {
      min-width: 0;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
    }
    .mnemos-title-en,
    .mnemos-cycle {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }
    .mnemos-badges {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 3px;

    const CYCLES = ["c1", "c2", "c3", "c4", "c5"];

    function defaultHero() {
      return {
        id: "hero-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8),

        notes: "",
      };

    let state = { heroes: [], activeHeroId: "", graveyard: [] };
    let saveTimer = null;
    let serverStorageAvailable = false;
    let serverSectionRevision = 0;

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed.heroes)) {
            parsed.graveyard = Array.isArray(parsed.graveyard) ? parsed.graveyard : [];
            return parsed;
          }
        }
      } catch {}
      return { heroes: [], activeHeroId: "", graveyard: [] };
    }

    function normalizeState() {
      state.heroes = Array.isArray(state.heroes) ? state.heroes : [];
      state.heroes.forEach(h => {
        if (!h.id) h.id = "hero-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8);
        if (h.skills && !h.baseSkills) {
          h.baseSkills = h.skills;
          delete h.skills;
        }
        if (!h.baseSkills) h.baseSkills = { courage: 0, wisdom: 0, will: 0, endurance: 0, cunning: 0, fury: 0 };
        SKILLS.forEach(s => { h.baseSkills[s.id] = Math.max(0, parseInt(h.baseSkills[s.id], 10) || 0); });
        if (h.skillsExpanded !== true) h.skillsExpanded = false;
        if (!h.mnemos || typeof h.mnemos !== "object" || Array.isArray(h.mnemos)) h.mnemos = {};
        if (!h.fatedMnemos || typeof h.fatedMnemos !== "object" || Array.isArray(h.fatedMnemos)) h.fatedMnemos = {};
        h.mnemosNodeProgress = h.mnemosNodeProgress || {};
        CYCLES.forEach(c => {
          if (!Array.isArray(h.mnemos[c])) h.mnemos[c] = [];
          if (!Array.isArray(h.fatedMnemos[c])) h.fatedMnemos[c] = [];
        });
      });
      if (state.heroes.length && !state.activeHeroId) state.activeHeroId = state.heroes[0].id;
    }

    function persistLocal() {
      try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch {}
    }

    function queueSave() {
      persistLocal();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveToServer();
      }, 200);
    }

    async function saveToServer() {
      try {
        const response = await fetch(serverStorageUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            section: serverStorageSection,
            state: state,
            expectedRevision: serverSectionRevision,
          }),
        });
        const payload = await response.json().catch(() => null);
        if (response.ok && payload?.ok) {
          serverStorageAvailable = true;
          serverSectionRevision = payload.revision || serverSectionRevision;
          setSaveStatus("已同步 " + new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }));
        } else if (response.status === 409 && payload?.revision) {
          // Conflict — retry with correct revision (force overwrite with local)
          serverSectionRevision = payload.revision;
          const retry = await fetch(serverStorageUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              section: serverStorageSection,
              state: state,
              expectedRevision: serverSectionRevision,
            }),
          });
          const retryPayload = await retry.json().catch(() => null);
          if (retry.ok && retryPayload?.ok) {
            serverStorageAvailable = true;
            serverSectionRevision = retryPayload.revision || serverSectionRevision;
            setSaveStatus("已同步 " + new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }));
          } else {
            setSaveStatus("同步失败，已保存到本机");
          }
        } else {
          setSaveStatus("同步失败，已保存到本机");
        }
      } catch {
        setSaveStatus("同步失败，已保存到本机");
      }
    }

    async function loadFromServer() {
      try {
        const response = await fetch(serverStorageUrl + "?section=" + serverStorageSection, { cache: "no-store" });
        if (!response.ok) throw new Error();
        const payload = await response.json();
        if (!payload.ok) throw new Error();
        serverStorageAvailable = true;
        const serverState = payload.state;
        const serverRevision = payload.revision || 0;
        serverSectionRevision = serverRevision;
        const serverUser = payload.user?.id || "";
        const localUser = state._userId || "";
        const localHasData = state.heroes && state.heroes.length > 0;
        const serverHasData = serverState && Array.isArray(serverState.heroes) && serverState.heroes.length > 0;
        // Detect account switch — clear leftover data from previous account
        if (serverUser && localUser && serverUser !== localUser) {
          if (serverHasData) {
            state = serverState;
          } else {
            state = { heroes: [], activeHeroId: "", graveyard: [] };
          }
          state._userId = serverUser;
          normalizeState();
          persistLocal();
          renderAll();
          setSaveStatus(serverHasData ? "已从 NAS 读取" : "NAS 已连接");
        } else if (!localHasData && serverHasData) {
          // Local is empty, pull from server
          state = serverState;
          state._userId = serverUser;
          normalizeState();
          persistLocal();
          renderAll();
          setSaveStatus("已从 NAS 读取");
        } else if (localHasData) {
          // Local has data, push to server to keep it in sync
          state._userId = serverUser;
          setSaveStatus("NAS 已连接");
          saveToServer();
        } else {
          state._userId = serverUser;
          persistLocal();
          setSaveStatus("NAS 已连接");
        }
      } catch {
        serverStorageAvailable = false;
        setSaveStatus("NAS 不可用，使用本机存档");
      }
    }

    function activeHero() {

    function heroMnemosNodeCount(hero) {
      let count = 0;
      hero.mnemosProgress = hero.mnemosProgress || {};
      CYCLES.forEach(cycleId => {
        (hero.mnemos[cycleId] || []).forEach(mId => {
          const m = (MNEMOS[cycleId] || []).find(x => x.id === mId);
          if (m) {
            const progress = hero.mnemosProgress[m.id] || 0;
            const thresholds = m.thresholds || [];
            // Count progress steps excluding M-prefixed special nodes
            for (let i = 1; i <= progress; i++) {
              const nodeIndex = thresholds.indexOf(i);
              if (nodeIndex >= 0 && (m.nodes[nodeIndex] || "").startsWith("M")) continue;
              count++;
            }
          }
        });
      });
      return count;
    }

    function computeLikelihood() {
      if (state.heroes.length < 2) return {};
      const counts = state.heroes.map(h => ({ id: h.id, count: heroMnemosNodeCount(h) }));
      const max = Math.max(...counts.map(c => c.count));
      const min = Math.min(...counts.map(c => c.count));
      if (max === min) return {};
      const result = {};
      counts.forEach(c => {
        if (c.count === max) result[c.id] = "most";
        else if (c.count === min) result[c.id] = "least";
      });
      return result;
    }

    function setupHeroColumnEvents(hero) {
      const col = document.querySelector(`.hero-column[data-hero-id="${hero.id}"]`);
      if (!col) return;
      // Double-click hero name to rename
      const heading = col.querySelector(".panel-heading h2");
      if (heading) heading.ondblclick = () => {
        const current = heroDisplayName(hero);
        const newName = prompt("修改英雄名称：", current);
        if (newName === null) return;
        hero.customName = newName.trim() || "";
        queueSave();
        renderAll();
      };
      // Double-click portrait to change hero
      const portrait = col.querySelector(`[data-portrait="${hero.id}"]`);
      if (portrait) portrait.ondblclick = () => {
        openArgonautPicker((argId) => {
          hero.argonaut = argId;
          queueSave();
          renderAll();
        });
      };
      // Triskelion buttons
      col.querySelectorAll(`[data-tri][data-hero="${hero.id}"]`).forEach(btn => {
        btn.onclick = () => {
          hero.triskelion = hero.triskelion || { fury: 0, fate: 0, danger: 0 };
          const key = btn.dataset.tri;
          const delta = Number(btn.dataset.delta);
          hero.triskelion[key] = Math.max(0, (hero.triskelion[key] || 0) + delta);
          queueSave();
          renderAll();
        };
      });
      const resetTriBtn = col.querySelector(`[data-reset-triskelion="${hero.id}"]`);
      if (resetTriBtn) resetTriBtn.onclick = () => resetHeroTriskelion(hero.id);
      const skillToggleBtn = col.querySelector(`[data-toggle-skills="${hero.id}"]`);
      if (skillToggleBtn) skillToggleBtn.onclick = () => {
        hero.skillsExpanded = !hero.skillsExpanded;
        queueSave();
        renderAll();
      };
      col.querySelectorAll(`[data-skill-adj][data-hero="${hero.id}"]`).forEach(btn => {
        btn.onclick = () => {
          const skillId = btn.dataset.skillAdj;
          const delta = Number(btn.dataset.delta);
          hero.baseSkills[skillId] = Math.max(0, (hero.baseSkills[skillId] || 0) + delta);
          queueSave();
          renderAll();
        };
      });
      // Notes
      const notesTA = col.querySelector(`[data-field="notes"][data-hero="${hero.id}"]`);
      if (notesTA) notesTA.oninput = () => { hero.notes = notesTA.value; queueSave(); };
      // Mnemos buttons
      const mBtn = col.querySelector(`[data-open-mnemos="${hero.id}"]`);
      if (mBtn) mBtn.onclick = () => { state.activeHeroId = hero.id; openMnemosPicker(); };
      const rmMnemosBtn = col.querySelector(`[data-remove-mnemos="${hero.id}"]`);
      if (rmMnemosBtn) rmMnemosBtn.onclick = () => { state.activeHeroId = hero.id; openMnemosRemovePicker(); };
      const fBtn = col.querySelector(`[data-open-fated="${hero.id}"]`);
      if (fBtn) fBtn.onclick = () => { state.activeHeroId = hero.id; openFatedPicker(); };
      const rmFatedBtn = col.querySelector(`[data-remove-fated="${hero.id}"]`);
      if (rmFatedBtn) rmFatedBtn.onclick = () => { state.activeHeroId = hero.id; openFatedRemovePicker(); };
      // Remove
      const rmBtn = col.querySelector(`[data-remove-hero="${hero.id}"]`);
      if (rmBtn) rmBtn.onclick = () => { state.activeHeroId = hero.id; removeHero(); };
      // Retire / Death
      const retireBtn = col.querySelector(`[data-retire-hero="${hero.id}"]`);
      if (retireBtn) retireBtn.onclick = () => { state.activeHeroId = hero.id; retireHero(); };
    }

    function renderColumnMnemos(hero) {
      hero.mnemosProgress = hero.mnemosProgress || {};
      const skillZhMap = {};
      SKILLS.forEach(s => { skillZhMap[s.id] = s.zh; });
      const allSelected = [];
      CYCLES.forEach(cycleId => {
        (hero.mnemos[cycleId] || []).forEach(mId => {
          const m = (MNEMOS[cycleId] || []).find(x => x.id === mId);
          if (m) allSelected.push({ ...m, cycleId });
        });
      });
      if (!allSelected.length) return '<div style="color:var(--muted);font-size:12px;text-align:center">暂无回忆</div>';
      return allSelected.map(m => {
        const progress = hero.mnemosProgress[m.id] || 0;
        const tagsHtml = (m.tags || []).map(t => `<span class="mnemos-tag-badge">${t}</span>`).join("");

    function computeMnemosBonus(hero) {
      const bonus = { courage: 0, wisdom: 0, will: 0, endurance: 0, cunning: 0, fury: 0 };
      // Regular mnemos: +1 to each of two skills
      CYCLES.forEach(cycleId => {
        const selected = hero.mnemos[cycleId] || [];
        const items = MNEMOS[cycleId] || [];
        selected.forEach(mId => {
          const m = items.find(x => x.id === mId);
          if (m) {
            if (m.skill1 && bonus[m.skill1] !== undefined) bonus[m.skill1]++;
            if (m.skill2 && bonus[m.skill2] !== undefined) bonus[m.skill2]++;
          }
        });
      });
      // Fated mnemos: -1 to skill
      const fated = hero.fatedMnemos || {};
      CYCLES.forEach(cycleId => {
        const selected = fated[cycleId] || [];
        const items = FATED_MNEMOS[cycleId] || [];
        selected.forEach(fId => {
          const m = items.find(x => x.id === fId);
          if (m && m.skill && bonus[m.skill] !== undefined) bonus[m.skill]--;
        });
      });
      return bonus;
    }

    function getHeroSkills(hero) {
      const bonus = computeMnemosBonus(hero);
      const total = {};
      SKILLS.forEach(s => {
        total[s.id] = (hero.baseSkills[s.id] || 0) + (bonus[s.id] || 0);
      });
      return { bonus, total };
    }

        return `

    function closePicker() {
      document.getElementById("pickerOverlay")?.remove();
      renderAll();

    function renderTrack10(m, progress, heroId, hero) {
      const storyAt = {};
      const nodeProgress = hero?.mnemosNodeProgress?.[m.id] || {};
      m.thresholds.forEach((t, i) => { storyAt[t] = m.nodes[i]; });
      let html = '<div class="track-bar">';
      for (let i = 1; i <= 10; i++) {
        const filled = progress >= i;
        const story = storyAt[i] || "";
        if (story) {
          const nodeFilled = !!nodeProgress[story];
          html += `<div class="track-cell milestone${filled ? " filled" : ""}" onclick="setMnemosProgress('${m.id}', ${i}, '${heroId || ""}')">
            <span class="track-num">${i}</span>
          </div>
          <div class="track-node-cell${nodeFilled ? " filled" : ""}" onclick="toggleMnemosNode('${m.id}', '${escHtml(story)}', '${heroId || ""}')">${escHtml(story)}</div>`;
        } else {
          html += `<div class="track-cell${filled ? " filled" : ""}" onclick="setMnemosProgress('${m.id}', ${i}, '${heroId || ""}')">
            <span class="track-num">${i}</span>
          </div>`;
        }
      }
      html += '</div>';
      return html;
    }

    function setMnemosProgress(mnemosId, level, heroId) {
      const hero = heroId
        ? state.heroes.find(h => h.id === heroId)
        : state.heroes.find(h => h.id === state.activeHeroId && CYCLES.some(cycleId => (h.mnemos?.[cycleId] || []).includes(mnemosId)))
          || state.heroes.find(h => CYCLES.some(cycleId => (h.mnemos?.[cycleId] || []).includes(mnemosId)));
      if (!hero) return;
      hero.mnemosProgress = hero.mnemosProgress || {};
      hero.mnemosProgress[mnemosId] = hero.mnemosProgress[mnemosId] === level ? level - 1 : level;
      queueSave();
      renderAll();
    }

    function toggleMnemosNode(mnemosId, nodeId, heroId) {
      const hero = heroId
        ? state.heroes.find(h => h.id === heroId)
        : state.heroes.find(h => h.id === state.activeHeroId && CYCLES.some(cycleId => (h.mnemos?.[cycleId] || []).includes(mnemosId)))
          || state.heroes.find(h => CYCLES.some(cycleId => (h.mnemos?.[cycleId] || []).includes(mnemosId)));
      if (!hero) return;
      hero.mnemosNodeProgress = hero.mnemosNodeProgress || {};
      hero.mnemosNodeProgress[mnemosId] = hero.mnemosNodeProgress[mnemosId] || {};
      hero.mnemosNodeProgress[mnemosId][nodeId] = !hero.mnemosNodeProgress[mnemosId][nodeId];
      queueSave();
      renderAll();
    }

    function setMnemosTag(mnemosId, index, value) {
      const hero = activeHero();
      if (!hero) return;
      hero.mnemosTags = hero.mnemosTags || {};
      hero.mnemosTags[mnemosId] = hero.mnemosTags[mnemosId] || ["", "", ""];
      hero.mnemosTags[mnemosId][index] = value;
      queueSave();
    }

    function countHeroMnemos(hero) {
      let count = 0;
      CYCLES.forEach(cycleId => { count += (hero.mnemos[cycleId] || []).length; });
      return count;
    }

    function countHeroFated(hero) {
      let count = 0;
      hero.fatedMnemos = hero.fatedMnemos || {};
      CYCLES.forEach(cycleId => { count += (hero.fatedMnemos[cycleId] || []).length; });
      return count;
    }

      if (!confirm("确定移除这张回忆卡？")) return;
      toggleMnemos(cycleId, mnemosId);
    }

    function confirmRemoveFated(cycleId, fatedId) {
      if (!confirm("确定移除这张宿命回忆？")) return;
      toggleFated(cycleId, fatedId);
    }

    function removeMnemosFromPicker(cycleId, mnemosId) {
      if (!confirm("确定移除这张回忆卡？")) return;
      toggleMnemos(cycleId, mnemosId);
      openMnemosRemovePicker();
    }

    function removeFatedFromPicker(cycleId, fatedId) {
      if (!confirm("确定移除这张宿命回忆？")) return;
      toggleFated(cycleId, fatedId);
      openFatedRemovePicker();
    }

    function toggleMnemos(cycleId, mnemosId) {
      const hero = activeHero();
      if (!hero) return;
      hero.mnemos[cycleId] = hero.mnemos[cycleId] || [];
      const idx = hero.mnemos[cycleId].indexOf(mnemosId);
      if (idx >= 0) {
        hero.mnemos[cycleId].splice(idx, 1);
      } else {
        if (countHeroMnemos(hero) >= 2) { alert("每位英雄最多持有 2 张回忆卡"); return; }
        hero.mnemos[cycleId].push(mnemosId);
      }
      queueSave();
      renderActiveMnemos(hero);
      renderSkillGrid(hero);
    }

    function renderTrack3(m, progress, heroId) {
      let html = '<div class="track-bar fated-track">';
      for (let i = 1; i <= 3; i++) {
        const filled = progress >= i;
        html += `<div class="track-cell${filled ? " filled" : ""}" onclick="setFatedProgress('${m.id}', ${i}, '${heroId || ""}')">
          <span class="track-num">${i}</span>
        </div>`;
      }
      html += '</div>';
      return html;
    }

    function setFatedProgress(fatedId, level, heroId) {
      const hero = heroId
        ? state.heroes.find(h => h.id === heroId)
        : state.heroes.find(h => h.id === state.activeHeroId && CYCLES.some(cycleId => (h.fatedMnemos?.[cycleId] || []).includes(fatedId)))
          || state.heroes.find(h => CYCLES.some(cycleId => (h.fatedMnemos?.[cycleId] || []).includes(fatedId)));
      if (!hero) return;
      hero.fatedProgress = hero.fatedProgress || {};
      hero.fatedProgress[fatedId] = hero.fatedProgress[fatedId] === level ? level - 1 : level;
      queueSave();
      renderAll();
    }

    function toggleFated(cycleId, fatedId) {
      const hero = activeHero();
      if (!hero) return;
      hero.fatedMnemos = hero.fatedMnemos || {};
      hero.fatedMnemos[cycleId] = hero.fatedMnemos[cycleId] || [];
      const idx = hero.fatedMnemos[cycleId].indexOf(fatedId);
      if (idx >= 0) {
        hero.fatedMnemos[cycleId].splice(idx, 1);
      } else {
        if (countHeroFated(hero) >= 2) { alert("每位英雄最多持有 2 张宿命回忆"); return; }
        hero.fatedMnemos[cycleId].push(fatedId);
      }
      queueSave();
      renderActiveFated(hero);
      renderSkillGrid(hero);
    }

    function setupTextareas(hero) {
      const abilitiesEl = document.getElementById("abilitiesInput");
      const notesEl = document.getElementById("notesInput");
      const playerEl = document.getElementById("playerNameInput");
      if (abilitiesEl) abilitiesEl.oninput = () => { hero.abilities = abilitiesEl.value; queueSave(); };
      if (notesEl) notesEl.oninput = () => { hero.notes = notesEl.value; queueSave(); };
      if (playerEl) playerEl.oninput = () => { hero.playerName = playerEl.value; queueSave(); renderTabs(); };
    }

    function addHero() {
      if (state.heroes.length >= 4) { alert("最多添加 4 个英雄。"); return; }
      openArgonautPicker((argId) => {
        const hero = defaultHero();
        hero.argonaut = argId;
        state.heroes.push(hero);
        state.activeHeroId = hero.id;
        queueSave();
        renderAll();
      });
    }

    function openArgonautPicker(onSelect) {
      let html = '<div class="picker-overlay" id="pickerOverlay" onclick="if(event.target===this)closePicker()">';
      html += '<div class="picker-dialog">';
      html += '<div class="picker-head"><h2>选择英雄</h2><button onclick="closePicker()">关闭</button></div>';
      html += '<div class="picker-body"><div class="argonaut-picker-grid">';
      ARGONAUTS.forEach(a => {
        const src = argonautPortraitSrc(a.id);
        const imgHtml = src
          ? `<img src="${escHtml(src)}" alt="${escHtml(a.zh)}" onerror="this.outerHTML='<span style=font-size:14px;font-weight:900;padding:20px>${escHtml(a.zh)}</span>'">`
          : `<span style="font-size:14px;font-weight:900;padding:20px">${escHtml(a.zh)}</span>`;
        html += `<div class="argonaut-picker-card" data-pick-argonaut="${escHtml(a.id)}">${imgHtml}<span>${escHtml(a.zh)}</span></div>`;
      });
      html += '</div></div></div></div>';
      document.getElementById("pickerOverlay")?.remove();
      document.body.insertAdjacentHTML("beforeend", html);
      document.querySelectorAll("[data-pick-argonaut]").forEach(card => {
        card.onclick = () => {
          const argId = card.dataset.pickArgonaut;
          closePicker();
          onSelect(argId);
        };
      });
    }

    function removeHero() {
      const hero = activeHero();
      if (!hero) return;
      const arg = ARGONAUTS.find(a => a.id === hero.argonaut);
      const name = arg ? arg.zh : "此英雄";
      if (!confirm(`确定要删除「${name}」的记录吗？此操作不可撤回。`)) return;
      state.heroes = state.heroes.filter(h => h.id !== hero.id);
      state.activeHeroId = state.heroes.length ? state.heroes[0].id : "";
      queueSave();
      renderAll();
    }

    function retireHero() {
      const hero = activeHero();
      if (!hero) return;
      const name = heroDisplayName(hero);
      const reason = prompt(`「${name}」死亡或退休的原因：`);
      if (reason === null) return;
      const katharsisCode = prompt("疏泄代码（Katharsis Code）：") || "";
      state.graveyard = state.graveyard || [];
      state.graveyard.push({
        ...JSON.parse(JSON.stringify(hero)),
        retiredAt: new Date().toISOString(),
        retireReason: reason.trim(),
        katharsisCode: katharsisCode.trim(),
      });
      state.heroes = state.heroes.filter(h => h.id !== hero.id);
      state.activeHeroId = state.heroes.length ? state.heroes[0].id : "";
      queueSave();
      renderAll();
    }

    function openGraveyard() {
      const graveyard = state.graveyard || [];
      let html = '<div class="picker-overlay" id="pickerOverlay" onclick="if(event.target===this)closePicker()">';
      html += '<div class="picker-dialog" style="width:min(900px,100%);max-height:90vh">';
      html += '<div class="picker-head"><h2>墓园</h2><button onclick="closePicker()">关闭</button></div>';
      html += '<div class="picker-body">';
      if (!graveyard.length) {
        html += '<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px">暂无死亡或退休的英雄</div>';
      } else {
        const skillZhMap = {};
        SKILLS.forEach(s => { skillZhMap[s.id] = s.zh; });
        graveyard.forEach((hero, idx) => {
          const arg = ARGONAUTS.find(a => a.id === hero.argonaut);
          const displayName = hero.customName || (arg ? arg.zh : "未知英雄");
          const portraitSrc = arg ? argonautPortraitSrc(arg.id) : "";
          const date = hero.retiredAt ? new Date(hero.retiredAt).toLocaleDateString("zh-CN") : "";
          const { total } = getHeroSkills(hero);
          const skillText = SKILLS.map(s => `${s.abbr}${total[s.id]}`).join(" ");
          hero.mnemosProgress = hero.mnemosProgress || {};
          hero.fatedMnemos = hero.fatedMnemos || {};
          hero.fatedProgress = hero.fatedProgress || {};
          hero.triskelion = hero.triskelion || { fury: 0, fate: 0, danger: 0 };

          // Mnemos list (read-only)
          const mnemosHtml = (() => {
            const allSelected = [];
            CYCLES.forEach(cycleId => {
              (hero.mnemos[cycleId] || []).forEach(mId => {
                const m = (MNEMOS[cycleId] || []).find(x => x.id === mId);
                if (m) allSelected.push({ ...m, cycleId });
              });
            });
            if (!allSelected.length) return '<span style="color:var(--muted);font-size:12px">无</span>';
            return allSelected.map(m => {
              const progress = hero.mnemosProgress[m.id] || 0;
              return `<div class="mnemos-card">${escHtml(m.zh)} <span style="color:var(--muted);font-size:11px">${escHtml(m.en)}</span> <span style="font-size:11px;font-weight:900">[${progress}/10]</span></div>`;
            }).join("");
          })();

          // Fated list (read-only)
          const fatedHtml = (() => {
            const allSelected = [];
            CYCLES.forEach(cycleId => {
              (hero.fatedMnemos[cycleId] || []).forEach(fmId => {
                const fm = (FATED_MNEMOS[cycleId] || []).find(x => x.id === fmId);
                if (fm) allSelected.push({ ...fm, cycleId });
              });
            });
            if (!allSelected.length) return '<span style="color:var(--muted);font-size:12px">无</span>';
            return allSelected.map(fm => {
              const progress = hero.fatedProgress[fm.id] || 0;
              return `<div class="mnemos-card"><span class="fated-keyword">${escHtml(fm.keyword)}</span> ${escHtml(fm.zh)} <span style="font-size:11px;font-weight:900">[${progress}/3]</span></div>`;
            }).join("");
          })();

          html += `<details class="graveyard-entry" ${idx === 0 ? "open" : ""}>
            <summary class="graveyard-summary">
              <div class="graveyard-portrait">${portraitSrc ? `<img src="${escHtml(portraitSrc)}" alt="${escHtml(displayName)}">` : `<span>${escHtml(displayName)}</span>`}</div>
              <div class="graveyard-name">${escHtml(displayName)}</div>
              <div class="graveyard-meta">${escHtml(hero.retireReason || "")} · ${escHtml(date)}</div>
            </summary>
            <div class="graveyard-body">
              <div class="graveyard-section"><strong>技能：</strong>${escHtml(skillText)}</div>
              <div class="graveyard-section"><strong>三幅节：</strong>怒${hero.triskelion.fury} / 命${hero.triskelion.fate} / 危${hero.triskelion.danger}</div>
              <div class="graveyard-section"><strong>原因：</strong>${escHtml(hero.retireReason || "未记录")}</div>
              ${hero.katharsisCode ? `<div class="graveyard-section"><strong>疏泄代码：</strong>${escHtml(hero.katharsisCode)}</div>` : ""}
              <div class="graveyard-section"><strong>回忆：</strong>${mnemosHtml}</div>
              <div class="graveyard-section"><strong>宿命：</strong>${fatedHtml}</div>
              ${hero.notes ? `<div class="graveyard-section"><strong>笔记：</strong><span style="white-space:pre-wrap">${escHtml(hero.notes)}</span></div>` : ""}
              <div style="margin-top:10px"><button class="secondary" style="min-height:30px;font-size:12px" data-revive-idx="${idx}">复活</button></div>
            </div>
          </details>`;
        });
      }
      html += '</div></div></div>';
      document.getElementById("pickerOverlay")?.remove();
      document.body.insertAdjacentHTML("beforeend", html);
      // Bind revive buttons
      document.querySelectorAll("[data-revive-idx]").forEach(btn => {
        btn.onclick = () => {
          const idx = parseInt(btn.dataset.reviveIdx, 10);
          reviveHero(idx);
        };
      });
    }

    function reviveHero(idx) {
      const graveyard = state.graveyard || [];
      if (idx < 0 || idx >= graveyard.length) return;
      if (state.heroes.length >= 4) { alert("队伍已满（最多4人），请先移除一位英雄。"); return; }
      const hero = graveyard[idx];
      const name = hero.customName || (ARGONAUTS.find(a => a.id === hero.argonaut)?.zh || "英雄");
      if (!confirm(`确定要复活「${name}」吗？`)) return;
      // Remove retirement metadata, restore to active
      delete hero.retiredAt;
      delete hero.retireReason;
      delete hero.katharsisCode;
      state.heroes.push(hero);
      state.graveyard.splice(idx, 1);
      state.activeHeroId = hero.id;
      queueSave();
      closePicker();
    }

    function resetHeroTriskelion(heroId) {
      const hero = state.heroes.find(h => h.id === heroId);
      if (!hero) return;
      const name = heroDisplayName(hero);
      if (!confirm(`确定要重置「${name}」的三幅节吗？`)) return;
      hero.triskelion = { fury: 0, fate: 0, danger: 0 };
      queueSave();
      renderAll();
    }

    function resetAllTriskelion() {
      if (!state.heroes.length) return;
      if (!confirm("确定要重置所有英雄的三幅节吗？")) return;
      state.heroes.forEach(hero => {
        hero.triskelion = { fury: 0, fate: 0, danger: 0 };
      });
      queueSave();
      renderAll();
    }

    // Export / Import
    document.getElementById("exportButton").onclick = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "ato-hero-record.json";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    document.getElementById("importButton").onclick = () => {
      document.getElementById("importInput").click();
    };

    document.getElementById("importInput").onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (data && Array.isArray(data.heroes)) {
            state = data;
            normalizeState();
            state.activeHeroId = state.heroes.length ? state.heroes[0].id : "";
            persistLocal();
            renderAll();
            setSaveStatus("已导入");
          } else {
            alert("文件格式不正确");
          }
        } catch { alert("导入失败：无法解析 JSON"); }
      };
      reader.readAsText(file);
      e.target.value = "";
    };

    document.getElementById("addHeroButton").onclick = addHero;
    document.getElementById("resetAllTriskelionButton").onclick = resetAllTriskelion;
    document.getElementById("graveyardButton").onclick = openGraveyard;
    document.querySelectorAll("[data-reset-triskelion-icon]").forEach(img => {
      img.src = assetSrc("reset_triskelion_F4F4F4.png");
    });

    // Mnemos tag sync — reload hero state when dashboard modifies it
    const heroMnemosSyncChannel = typeof BroadcastChannel === "function" ? new BroadcastChannel("ato-hero-mnemos-sync-v1") : null;
    if (heroMnemosSyncChannel) heroMnemosSyncChannel.addEventListener("message", (event) => {
      const msg = event.data;
      if (msg.type === "hero-state-updated") {
        // Dashboard has updated our localStorage, reload
        const reloaded = loadState();
        if (reloaded && Array.isArray(reloaded.heroes)) {
          state = reloaded;
          normalizeState();
          renderAll();
        }
      }
    });

    // Init
    state = loadState();
    normalizeState();
    renderAll();
    loadFromServer();
  </script>
  <script src="../page-focus-router.js?v=20260607a"></script>

</body>
</html>
