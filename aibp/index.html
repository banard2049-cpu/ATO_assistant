<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIBP Apostle Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10100f;
      --panel: #181816;
      --panel-2: #22211e;
      --line: #3a3832;
      --text: #f0ede4;
      --muted: #aaa396;
      --accent: #b4342c;
      --gold: #c7ad72;
      --gap: 16px;
      --header-height: 42px;
      --pad: 10px;
      --side-card-image-height: 255px;
      --panel-image-height: calc(var(--side-card-image-height) * 2.2);
      --card-min: 126px;
      --card-max-width: calc(var(--side-card-image-height) * 63 / 89);
      --aibp-column-width: 424px;
      --draw-card-height: var(--side-card-image-height);
      --draw-card-width: calc(var(--draw-card-height) * 63 / 89);
      --radius: 14px;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(180, 52, 44, 0.18), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(199, 173, 114, 0.12), transparent 28%),
        linear-gradient(180deg, #12110f 0%, var(--bg) 52%, #080808 100%);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid rgba(199, 173, 114, 0.18);
      background:
        linear-gradient(180deg, rgba(34, 33, 30, 0.94), rgba(13, 13, 12, 0.98));
      padding: 18px 14px;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.03);
    }

    .sidebar-toggle {
      position: fixed;
      z-index: 30;
      top: 14px;
      left: 14px;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      border: 1px solid rgba(199, 173, 114, 0.42);
      background: rgba(24, 24, 22, 0.94);
      color: var(--gold);
      font-size: 22px;
      line-height: 1;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
    }

    .sidebar-toggle:hover {
      border-color: var(--gold);
      background: #261a18;
    }

    body:not(.sidebar-collapsed) .sidebar-toggle {
      left: 274px;
    }

    body.sidebar-collapsed .app {
      grid-template-columns: minmax(0, 1fr);
    }

    body.sidebar-collapsed aside {
      display: none;
    }

    body.sidebar-collapsed main {
      padding-left: 62px;
    }

    body.sidebar-collapsed .viewer {
      width: calc(100% + 40px);
      margin-left: -40px;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 20px;
      line-height: 1.2;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .nav button {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 10px;
      text-align: left;
    }

    .nav button:hover,
    .nav button.active,
    .segmented button.active {
      border-color: rgba(199, 173, 114, 0.55);
      background: linear-gradient(180deg, #2a1c19, #201716);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    main {
      min-width: 0;
      padding: 22px;
      overflow: auto;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .title-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .apostle-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .apostle-level-select {
      min-height: 36px;
      padding: 6px 10px;
      border: 1px solid rgba(199, 173, 114, 0.42);
      border-radius: 7px;
      background: #151411;
      color: var(--gold);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .title-actions button {
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 6px;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .path {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .viewer {
      display: flex;
      justify-content: safe center;
      align-items: flex-start;
      gap: var(--gap);
      margin-bottom: 18px;
      overflow: auto;
    }

    .section {
      flex: 0 0 auto;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .section.extra-section {
      flex: 0 1 min(34vw, calc(var(--side-card-image-height) * 2.4));
      min-width: min(320px, 34vw);
      max-width: min(34vw, calc(var(--side-card-image-height) * 2.4));
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      height: var(--header-height);
      padding: 8px 11px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(42, 40, 36, 0.98), rgba(28, 27, 24, 0.98));
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header button {
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 6px;
      border-color: rgba(199, 173, 114, 0.35);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
    }

    .section-header button:hover {
      border-color: rgba(199, 173, 114, 0.7);
      background: #261a18;
    }

    .image-wrap {
      display: grid;
      place-items: center;
      padding: 0;
      background: transparent;
    }

    img {
      display: block;
      width: auto;
      max-width: none;
      border-radius: 4px;
    }

    .panel-image {
      height: var(--panel-image-height);
    }

    .panel-frame {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .panel-state-marker {
      position: absolute;
      left: var(--marker-left, 50%);
      top: var(--marker-top, 50%);
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      display: none;
      place-items: center;
      padding: 0;
      border: 3px solid rgba(255, 88, 82, 0.88);
      border-radius: 999px;
      background: rgba(255, 88, 82, 0.04);
      color: transparent;
      font-size: 0;
      font-weight: 0;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: none;
      box-shadow:
        0 0 0 1px rgba(20, 8, 6, 0.62),
        0 0 10px rgba(255, 72, 66, 0.22),
        inset 0 0 8px rgba(255, 72, 66, 0.12);
      cursor: pointer;
      user-select: none;
      z-index: 3;
    }

    .panel-state-marker.show {
      display: grid;
    }

    .panel-state-marker.chimera-state-marker {
      width: var(--marker-width, 14%);
      height: var(--marker-height, 5%);
      border-width: 3px;
      border-radius: 8px !important;
      box-shadow:
        0 0 0 1px rgba(20, 8, 6, 0.62),
        0 0 12px rgba(255, 72, 66, 0.2),
        inset 0 0 8px rgba(255, 72, 66, 0.1);
    }

    .state-button.hidden {
      display: none;
    }

    .state-button {
      border-color: rgba(199, 173, 114, 0.46);
      color: var(--gold);
      font-weight: 800;
    }

    .side-card-image {
      height: var(--side-card-image-height);
    }

    .side-stack {
      display: grid;
      grid-template-rows: repeat(2, max-content);
      gap: 10px;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .extra-grid {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(2, max-content);
      grid-auto-columns: max-content;
      grid-auto-rows: max-content;
      gap: 10px;
      align-content: start;
      justify-content: start;
      width: 100%;
      max-width: 100%;
      max-height: calc(var(--side-card-image-height) * 2 + 10px);
      overflow: auto;
    }

    .extra-grid img {
      width: auto;
      height: var(--side-card-image-height);
      max-width: none;
      border: 1px solid var(--line);
      background: transparent;
    }

    .extra-grid img.panel-image {
      grid-row: span 2;
      height: calc(var(--side-card-image-height) * 2 + 10px);
    }

    .trait-dialog {
      width: min(980px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      padding: 0;
      border: 1px solid rgba(199, 173, 114, 0.28);
      border-radius: var(--radius);
      background: #141311;
      color: var(--text);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.55);
    }

    .trait-dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
    }

    .trait-dialog form {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      max-height: inherit;
    }

    .trait-dialog-head,
    .trait-dialog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(42, 40, 36, 0.98), rgba(28, 27, 24, 0.98));
    }

    .trait-dialog-actions {
      justify-content: flex-end;
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .trait-dialog-title {
      color: var(--gold);
      font-size: 15px;
      font-weight: 800;
    }

    .trait-dialog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
      gap: 12px;
      padding: 14px;
      overflow: auto;
      background: #0b0b0a;
    }

    .trait-option {
      position: relative;
      display: grid;
      gap: 7px;
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
    }

    .trait-option:hover,
    .trait-option:has(input:checked) {
      border-color: rgba(199, 173, 114, 0.72);
      background: #211916;
    }

    .trait-option input {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .trait-option img {
      width: 100%;
      height: auto;
      max-height: 214px;
      object-fit: contain;
      border: 1px solid rgba(199, 173, 114, 0.18);
      background: #0b0b0a;
    }

    .trait-option span {
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .trait-dialog-actions button {
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 7px;
    }

    .cards-panel {
      width: 85%;
      max-width: 85%;
      margin: 0 auto;
      border: 1px solid rgba(199, 173, 114, 0.18);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(31, 30, 27, 0.96), rgba(18, 18, 16, 0.98));
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .cards-toolbar {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .cards-toolbar h3 {
      margin: 0;
      color: var(--gold);
      font-size: 14px;
      line-height: 1.1;
    }

    .deck-info {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      color: var(--muted);
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .deck-info span {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .card-title-with-back {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: max-content;
    }

    .draw-panel {
      display: contents;
    }

    .draw-box {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: start;
      justify-content: stretch;
      margin-bottom: 8px;
      padding: 6px;
      width: 100%;
      max-width: 100%;
      border: 1px solid rgba(199, 173, 114, 0.18);
      border-radius: 12px;
      background:
        radial-gradient(circle at 100% 0%, rgba(199, 173, 114, 0.08), transparent 34%),
        #141412;
    }

    .draw-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: start;
      align-items: center;
      width: 100%;
    }

    .draw-actions button,
    .draw-panel button {
      flex: 0 0 auto;
      min-width: 58px;
      min-height: 24px;
      padding: 3px 6px;
      border-radius: 7px;
      font-size: 11px;
      line-height: 1.05;
      white-space: nowrap;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }



    .draw-actions .damage-target {
      flex: 1 1 100%;
      min-height: 24px;
      padding: 3px 5px;
      border-radius: 7px;
      font-size: 12px;
    }

    .draw-actions .damage-target select {
      min-height: 24px;
      padding: 1px 5px;
      font-size: 12px;
    }

    .draw-actions button:not(:disabled):hover,
    .draw-panel button:not(:disabled):hover,
    .title-actions button:hover {
      transform: translateY(-1px);
      border-color: rgba(199, 173, 114, 0.58);
      background: #241916;
    }

    #drawAiButton,
    #drawBpButton {
      min-width: 104px;
      min-height: 54px;
      padding: 12px 16px;
      border-color: rgba(199, 173, 114, 0.58);
      border-radius: 8px;
      background: linear-gradient(180deg, #2a1c19, #1a1513);
      color: var(--gold);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.1;
      box-shadow: inset 3px 0 0 var(--accent), 0 8px 18px rgba(0, 0, 0, 0.24);
    }

    .draw-preview {
      width: calc(var(--draw-card-width) + 8px);
      height: calc(var(--draw-card-height) + 8px);
      max-width: 100%;
      display: grid;
      place-items: center;
      justify-self: center;
      align-self: start;
      padding: 4px;
      border: 1px solid rgba(199, 173, 114, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 36%),
        #0b0b0a;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      aspect-ratio: 63 / 89;
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .draw-preview.has-card {
      cursor: zoom-in;
    }

    .draw-preview:not(.has-card):hover {
      border-color: rgba(199, 173, 114, 0.58);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 36%),
        #181511;
    }

    .draw-preview img {
      width: auto;
      max-width: var(--draw-card-width);
      height: auto;
      max-height: var(--draw-card-height);
      object-fit: contain;
      border-radius: 7px;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .segmented button {
      min-width: 48px;
      min-height: 26px;
      padding: 3px 6px;
      border-radius: 6px;
    }

    .aibp-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0;
      padding: 0;
      width: 100%;
    }

    .card-column {
      min-width: 0;
      padding: 10px;
      width: 100%;
    }

    .card-column + .card-column {
      border-left: 1px solid rgba(199, 173, 114, 0.14);
    }

    .card-column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .card-column-title {
      margin: 0;
      color: var(--gold);
      font-size: 15px;
      font-weight: 700;
      text-align: left;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min), var(--card-max-width)));
      justify-content: start;
      gap: 14px;
    }

    .card-grid img {
      width: 100%;
      height: auto;
      max-width: var(--card-max-width);
      max-height: var(--side-card-image-height);
      justify-self: center;
      object-fit: contain;
      background: #0b0b0a;
      border: 1px solid rgba(199, 173, 114, 0.18);
      border-radius: 10px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
    }

    .damage-target {
      display: none;
      gap: 5px;
      align-items: start;
      color: var(--muted);
      font-size: 12px;
    }

    .damage-target.show {
      display: grid;
    }

    .chimera-only-action {
      display: none;
    }

    .chimera-only-action.show {
      display: inline-grid;
      align-items: center;
    }

    .labyrinthauros-only-action {
      display: none;
    }

    .labyrinthauros-only-action.show {
      display: inline-grid;
      align-items: center;
    }

    .hermesian-only-action {
      display: none;
    }

    .hermesian-only-action.show {
      display: inline-grid;
      align-items: center;
    }

    .damage-target select {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151411;
      color: var(--text);
      padding: 5px 8px;
      font: inherit;
    }

    .card-tile {
      position: relative;
      min-width: 0;
    }

    .damage-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      min-width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(180, 52, 44, 0.92);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.38);
    }

    .bp-damage-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 4px 10px;
      border: 1px solid rgba(180, 52, 44, 0.45);
      border-radius: 999px;
      background: rgba(180, 52, 44, 0.16);
      color: #ffd6d2;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .missing {
      display: grid;
      place-items: center;
      min-height: 120px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1180px) {
      .draw-box {
        grid-template-columns: 128px auto;
      }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .viewer {
        justify-content: flex-start;
      }

      .cards-panel {
        width: 100%;
        max-width: 100%;
      }

      .cards-toolbar,
      .aibp-layout {
        grid-template-columns: 1fr;
      }

      .draw-box {
        grid-template-columns: 128px auto;
      }

      .card-column + .card-column {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 1180px) {
      .draw-box {
        grid-template-columns: 128px auto;
      }
    }

    @media (max-width: 980px) {
      .extra-grid {
        width: 100%;
        min-width: 0;
      }

      .extra-card-grid {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      }
    }
  

    /* 本次调整：操作按钮在左，当前抽牌在右；两块共同铺满各自 AI/BP 区域 */
    .draw-box {
      display: grid !important;
      grid-template-columns: minmax(0, 1fr) calc(var(--draw-card-width) + 8px) !important;
      gap: 10px !important;
      align-items: stretch !important;
      justify-content: stretch !important;
      width: 100% !important;
      max-width: 100% !important;
      margin-bottom: 10px !important;
      padding: 8px !important;
    }

    .draw-actions {
      display: grid !important;
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      gap: 8px !important;
      align-content: start !important;
      align-items: stretch !important;
      width: 100% !important;
      min-width: 0 !important;
    }

    .draw-actions button,
    .draw-panel button {
      width: 100% !important;
      min-width: 0 !important;
      min-height: 32px !important;
      padding: 5px 8px !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      line-height: 1.15 !important;
      text-align: center !important;
      white-space: nowrap !important;
    }

    #drawAiButton,
    #drawBpButton {

    .trait-option.token-option {

    }

      transform: translateY(-1px);
      border-color: rgba(199, 173, 114, 0.72);
    }

    .token-option-count {
      display: grid;
      grid-template-columns: 28px minmax(44px, 1fr) 28px;
      align-items: center;
      gap: 6px;
      width: 100%;
      color: var(--muted);
      font-size: 12px;
    }

    .token-option-count-label {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .token-option-count input {
      position: static !important;
      top: auto !important;
      right: auto !important;
      width: 100% !important;
      height: auto !important;
      min-height: 30px;
      margin: 0 !important;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #151411;
      color: var(--text);
      padding: 3px 6px;
      font: inherit;
      text-align: center;
      accent-color: auto;
    }

    .token-count-step {
      width: 28px;
      min-width: 28px;
      height: 30px;
      min-height: 30px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 7px;
      border-color: rgba(199, 173, 114, 0.35);
      color: var(--gold);
      font-weight: 900;
      line-height: 1;
    }

    .token-count-step:hover {
      border-color: rgba(199, 173, 114, 0.72);
      background: #261a18;
    }



    .token-folder-tools {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #0b0b0a;
    }

    .token-folder-tools button {
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 7px;
      border-color: rgba(199, 173, 114, 0.46);
      color: var(--gold);
      font-weight: 800;
      justify-self: start;
    }

    .token-folder-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .panel-token-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .panel-token-item {
      position: absolute;
      left: var(--token-left, 6%);
      top: var(--token-top, 6%);
      transform: translate(-50%, -50%);
      width: clamp(34px, 7.2%, 68px);
      min-width: 34px;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
      filter: drop-shadow(0 8px 13px rgba(0, 0, 0, 0.62));
    }

    .panel-token-item:active {
      cursor: grabbing;
    }

    .panel-token-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 999px;
    }

    .panel-token-count {
      position: absolute;
      right: -8px;
      bottom: -7px;
      min-width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      padding: 0 5px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      background: rgba(180, 52, 44, 0.94);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    .critical-mass-slot {
      position: absolute;
      left: 50.7%;
      top: 51.2%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: none;
      width: clamp(42px, 7.2%, 72px);
      aspect-ratio: 1 / 1;
      place-items: center;
      padding: 0;
      border: 2px dashed rgba(51, 150, 225, 0.78);
      border-radius: 999px;
      background: rgba(18, 80, 126, 0.2);
      color: #9bd7ff;
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(41, 147, 226, 0.36);
    }

    .critical-mass-slot.show {
      display: grid;
    }

    .panel-token-item.critical-mass-token {
      width: clamp(44px, 7.6%, 76px);
      cursor: pointer;
    }

    .panel-token-item.critical-mass-token.must-resolve {
      filter:
        drop-shadow(0 0 8px rgba(255, 42, 42, 1))
        drop-shadow(0 0 18px rgba(255, 42, 42, 0.9));
      animation: chimera-critical-mass-pulse 780ms ease-in-out infinite alternate;
    }

    .panel-token-item.critical-mass-token.must-resolve::after {
      content: "立即处理";
      position: absolute;
      left: 50%;
      top: calc(100% + 7px);
      transform: translateX(-50%);
      min-width: max-content;
      padding: 5px 9px;
      border: 2px solid #ff5252;
      border-radius: 7px;
      background: rgba(92, 4, 4, 0.96);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 0 18px rgba(255, 42, 42, 0.78);
      pointer-events: auto;
      cursor: pointer;
    }

    @keyframes chimera-critical-mass-pulse {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.12); }
    }

    .panel-token-item.auto-level-danger-per-hit::after {
      content: "每命中";
      position: absolute;
      left: 50%;
      top: calc(100% + 5px);
      transform: translateX(-50%);
      min-width: max-content;
      padding: 3px 6px;
      border: 1px solid rgba(199, 173, 114, 0.68);
      border-radius: 5px;
      background: rgba(18, 18, 16, 0.94);
      color: #f4d98f;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }


    .image-zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      padding: 26px;
      background: rgba(0, 0, 0, 0.82);
      cursor: zoom-out;
    }

    .image-zoom-overlay.show {
      display: grid;
    }

    .image-zoom-content {
      position: relative;
      width: min(96vw, 1180px);
      max-width: min(96vw, 1180px);
      max-height: 94vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-rows: 1fr auto 1fr;
      gap: 14px;
      place-items: center;
    }

    .image-zoom-content.has-notice {
      grid-template-columns: minmax(0, 1fr) minmax(360px, 600px);
    }

    .image-zoom-content.has-side-notices {
      width: fit-content;
      max-width: min(96vw, 1880px);
      grid-template-columns: minmax(260px, 400px) minmax(0, calc(90vh * 63 / 89)) minmax(260px, 400px);
      gap: 6px;
    }

    .image-zoom-content.has-side-notices > .image-zoom-card-stage {
      grid-column: 2;
    }

    .image-zoom-card-stage {
      position: relative;
      grid-column: 1;
      grid-row: 1 / -1;
      width: fit-content;
      max-width: 100%;
      max-height: 90vh;
      display: grid;
      place-items: center;
    }

    .image-zoom-card-stage > img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 10px;
      background: #0b0b0a;
      box-shadow: 0 24px 86px rgba(0, 0, 0, 0.72);
      cursor: default;
    }

    .image-zoom-card-tokens {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      pointer-events: none;
    }

    .image-zoom-card-tokens.show {
      display: block;
    }

    .image-zoom-card-token-group {
      position: absolute;
      display: flex;
      gap: 8px;
    }

    .image-zoom-card-token-group.token-at {
      right: 3%;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: column;
    }

    .image-zoom-card-token-group.token-accuracy-evasion {
      top: 2.5%;
      right: 3%;
      flex-wrap: wrap;
      justify-content: end;
      max-width: 55%;
    }

    .image-zoom-card-token-group.token-danger {
      right: 3%;
      bottom: 2.5%;
      flex-wrap: wrap;
      justify-content: end;
      max-width: 40%;
    }

    .image-zoom-card-token {
      position: relative;
      width: clamp(58px, 7.5vw, 94px);
      aspect-ratio: 1 / 1;
      filter: drop-shadow(0 7px 10px rgba(0, 0, 0, 0.68));
    }

    .image-zoom-card-token img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 999px;
      opacity: 0.62;
    }

    .image-zoom-card-token .panel-token-count {
      right: -5px;
      bottom: -5px;
      opacity: 0.95;
    }

    .image-zoom-card-token.auto-level-danger-per-hit::after {
      content: "每命中";
      position: absolute;
      left: 50%;
      top: calc(100% + 5px);
      transform: translateX(-50%);
      min-width: max-content;
      padding: 3px 6px;
      border: 1px solid rgba(199, 173, 114, 0.68);
      border-radius: 5px;
      background: rgba(18, 18, 16, 0.94);
      color: #f4d98f;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    .image-zoom-notice {
      display: none;
      grid-column: 2;
      grid-row: 1;
      align-self: start;
      width: min(42vw, 600px);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      cursor: default;
    }

    .image-zoom-notice.show {
      display: grid;
    }

    .image-zoom-content.has-side-notices .image-zoom-notice {
      display: contents;
    }

    .image-zoom-content.has-side-notices .image-zoom-notice img {
      align-self: center;
      max-height: 86vh;
    }

    .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(1) {
      grid-column: 1;
      grid-row: 1 / -1;
      justify-self: end;
    }

    .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(2) {
      grid-column: 3;
      grid-row: 1 / -1;
      justify-self: start;
    }

    .image-zoom-notice img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 86vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.48);
    }

    .image-zoom-notice img:only-child {
      grid-column: 1 / -1;
    }

    .image-zoom-actions {
      display: none;
      grid-column: 2;
      grid-row: 2;
      width: 128px;
      gap: 8px;
      align-self: center;
      justify-self: start;
      cursor: default;
    }

    .image-zoom-actions.show {
      display: grid;
    }

    .image-zoom-actions button {
      min-height: 42px;
      padding: 8px 10px;
      border-radius: 8px;
      border-color: rgba(199, 173, 114, 0.42);
      background: rgba(24, 24, 22, 0.96);
      color: var(--gold);
      font-weight: 700;
      text-align: center;
    }

    .image-zoom-actions button:not(:disabled):hover {
      border-color: var(--gold);
      background: #261a18;
    }

    .image-zoom-actions button:disabled {
      opacity: 0.42;
    }

    .image-zoom-action-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 760px) {
      .image-zoom-content {
        width: auto;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto;
      }

      .image-zoom-content.has-notice {
        grid-template-columns: minmax(0, 1fr);
      }

      .image-zoom-content.has-side-notices {
        width: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .image-zoom-content.has-side-notices > .image-zoom-card-stage {
        grid-column: 1 / -1;
      }

      .image-zoom-content.has-side-notices .image-zoom-notice {
        display: contents;
      }

      .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(1),
      .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(2) {
        grid-row: auto;
        max-height: 52vh;
      }

      .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(1) {
        grid-column: 1;
      }

      .image-zoom-content.has-side-notices .image-zoom-notice img:nth-child(2) {
        grid-column: 2;
      }

      .image-zoom-card-stage {
        grid-column: 1;
        grid-row: auto;
        max-width: 96vw;
        max-height: 72vh;
      }

      .image-zoom-card-stage > img {
        max-width: 96vw;
        max-height: 72vh;
      }

      .image-zoom-card-tokens {
        inset: 0;
      }

      .image-zoom-card-token-group {
        gap: 5px;
      }

      .image-zoom-card-token {
        width: clamp(48px, 15vw, 72px);
      }

      .image-zoom-actions {
        grid-column: 1;
        grid-row: auto;
        width: min(96vw, 360px);
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        justify-self: center;
      }

      .image-zoom-notice {
        grid-column: 1;
        grid-row: auto;
        align-self: center;
        width: min(92vw, 520px);
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .image-zoom-notice img {
        max-height: 62vh;
      }

      .image-zoom-action-title {
        grid-column: 1 / -1;
      }
    }

    .image-zoom-close {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 1001;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(199, 173, 114, 0.52);
      background: rgba(24, 24, 22, 0.96);
      color: var(--gold);
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }

    .image-zoom-close:hover {
      border-color: var(--gold);
      background: #261a18;
    }

    .card-grid img,
    .extra-grid img,
    .draw-preview img,
    .side-card-image,
    .panel-image,
    .panel-token-item img {
      cursor: zoom-in;
    }


  </style>
</head>

    function clonePileState(state) {
      if (typeof structuredClone === "function") {
        return structuredClone(state);
      }
      return JSON.parse(JSON.stringify(state));
    }

    function rememberUndo(name, scope = "AIBP") {
      ensurePiles(name);
      undoStacks[name] ||= [];
      undoStacks[name].push({
        scope,
        state: clonePileState(piles[name]),
        aiView: currentAiView,
        bpView: currentBpView
      });
      if (undoStacks[name].length > maxUndoSteps) {
        undoStacks[name].shift();
      }
      updateUndoButtons();
    }

    function canUndo(name, type = "") {
      const stack = undoStacks[name] || [];
      const entry = stack[stack.length - 1];
      if (!entry) return false;
      if (!type) return true;
      return entry.scope === type || entry.scope === "AIBP";
    }

    function undoLastAibp(type = "") {
      ensurePiles(currentApostle);
      const stack = undoStacks[currentApostle] || [];
      const entry = stack[stack.length - 1];
      if (!entry || (type && entry.scope !== type && entry.scope !== "AIBP")) return;
      stack.pop();
      piles[currentApostle] = clonePileState(entry.state);
      currentAiView = entry.aiView;
      currentBpView = entry.bpView;
      savePiles();
      updateAiViewTabs();
      updateBpViewTabs();
      updateNietzscheStateUi(panelWrap.querySelector(".panel-state-marker"));

    function numberedName(name, type, level, index) {
      return `${name}_${type}_${level}_${String(index).padStart(3, "0")}.jpg`;
    }

    function cardFileName(card, name = currentApostle) {

      return numberedName(name, card.type, card.level, card.index);
    }

    function sameCard(left, right) {
      if (!left || !right) return false;
      if (left.fileName || right.fileName) return left.fileName === right.fileName;
      return left.type === right.type && left.level === right.level && left.index === right.index;

    function pileCardCount(type, level) {

      return shuffleCards(Array.from({ length: pileCardCount(type, level) }, (_, index) => ({

        level,
        index: index + 1

    function ensurePiles(name) {
      if (!piles[name]) {
        piles[name] = initialState();
        savePiles();
      } else {
        piles[name].AI ||= initialState().AI;
        piles[name].BP ||= initialState().BP;
        piles[name].AI.deck ||= [];
        piles[name].AI.discard ||= [];
        piles[name].AI.pending ||= null;
        piles[name].AI.supply ||= { I: [], II: supplyPile("AI", "II"), III: supplyPile("AI", "III") };
        piles[name].AI.supply.I ||= [];
        piles[name].AI.supply.II ||= [];
        piles[name].AI.supply.III ||= [];
        piles[name].AI.removed ||= [];
        piles[name].BP.deck ||= [];
        piles[name].BP.discard ||= [];
        piles[name].BP.damage ||= [];
        piles[name].BP.damage1 ||= [];
        piles[name].BP.damage2 ||= [];
        if (name === chimeraName && piles[name].BP.damage.length > 0 && !piles[name].BP.chimeraDamageMigrated) {
          piles[name].BP.damage1 = piles[name].BP.damage1.concat(piles[name].BP.damage);
          piles[name].BP.damage = [];
          piles[name].BP.chimeraDamageMigrated = true;
        }
        piles[name].BP.pending ||= null;
        piles[name].BP.supply ||= { I: [], II: supplyPile("BP", "II"), III: supplyPile("BP", "III") };
        piles[name].BP.supply.I ||= [];
        piles[name].BP.supply.II ||= [];
        piles[name].BP.supply.III ||= [];
        piles[name].BP.removed ||= [];
        piles[name].flare ||= initialFlarePile();
        piles[name].flare.deck ||= [];
        piles[name].flare.discard ||= [];
        if (typeof piles[name].chimeraPhase !== "string") {
          piles[name].chimeraPhase = "";
        }
        if (!Array.isArray(piles[name].traits)) {
          piles[name].traits = [];
        }
        piles[name].traits = piles[name].traits.map((card) => {
          if (name === "HYPERTIME_ORACLE" && card?.type === "TR" && !card.scope && card.level === "O" && card.index === 1) {
            return { ...card, level: "IV" };
          }
          if (card?.type === "TR" && !card.scope && card.level === "V" && card.index === 1) {
            return { ...card, level: "COMMON", scope: "common" };
          }
          return card;
        });
        if (name === nietzscheName) {
          const migratedTraits = [];
          const migratedKeys = new Set();
          piles[name].traits.forEach((card) => {
            const migrated = card?.type === "TR" && (card.level === "I" || card.level === "X") && (card.index === 1 || card.index === 2)
              ? { ...card, level: "II" }
              : card;
            const key = `${migrated?.type || "TR"}-${migrated?.level}-${migrated?.index}-${migrated?.ext || "jpg"}`;
            if (!migratedKeys.has(key)) {
              migratedKeys.add(key);
              migratedTraits.push(migrated);
            }
          });
          if (JSON.stringify(migratedTraits) !== JSON.stringify(piles[name].traits)) {
            piles[name].traits = migratedTraits;
            savePiles();
          }
        }
        if (!Array.isArray(piles[name].tokens)) {
          piles[name].tokens = [];
        }
        piles[name].tokens = piles[name].tokens.map((item) => ({
          ...item,
          id: item.id || createTokenStackId(),
          count: Math.max(1, clampTokenCount(item.count) || 1)
        }));
        if (!piles[name].levelBonusState || typeof piles[name].levelBonusState !== "object") {
          piles[name].levelBonusState = { promotions: 0 };
        }
        piles[name].levelBonusState.promotions = Math.max(
          0,
          Math.floor(Number(piles[name].levelBonusState.promotions) || 0)
        );
        if (!Number.isInteger(piles[name].aiExhaustedBonusIndex)) {
          piles[name].aiExhaustedBonusIndex = 0;
        }
      }
    }

      return currentApostle === chimeraName;

    function loadApostleLevelOverrides() {
      try {
        const value = JSON.parse(localStorage.getItem(apostleLevelOverrideKey) || "{}");
        return value && typeof value === "object" ? value : {};
      } catch {
        return {};

    }

    function saveApostleLevelOverrides() {
      localStorage.setItem(apostleLevelOverrideKey, JSON.stringify(apostleLevelOverrides));
    }

    function parseApostleLevel(value) {
      const text = String(value || "").toUpperCase();
      const arabic = text.match(/(?:^|[^0-9])([1-5])(?:[^0-9]|$)/);
      if (arabic) return Number(arabic[1]);
      const roman = text.match(/(?:^|[^IV])(III|II|IV|V|I)(?:[^IV]|$)/);
      return roman ? ({ I: 1, II: 2, III: 3, IV: 4, V: 5 }[roman[1]] || 0) : 0;
    }

    function recordLevelForTrack(recordState, track) {
      if (Array.isArray(track)) {
        return track.reduce((max, item) => Math.max(max, recordLevelForTrack(recordState, item)), 0);
      }
      if (!recordState?.enemies || !track) return 0;
      let level = parseApostleLevel(recordState.enemies[track.key]);
      Object.entries(recordState.enemies).forEach(([key, active]) => {
        if (!active || !key.startsWith(`${track.cycle}:`)) return;
        const parts = key.split(":");
        const isDirect = parts[1] === track.key;
        const isShared = parts[1] === "shared" && (parts[2] || "").split("+").includes(track.key);
        if (!isDirect && !isShared) return;
        level = Math.max(level, parseApostleLevel(parts.at(-1)));
      });
      return level;
    }

    function recordStateFromCampaign(campaign) {
      const dashboard = campaign?.sections?.dashboard;
      const activeProfileId = dashboard?.activeProfileId || "default";
      const recordSection = campaign?.sections?.record;
      if (!recordSection) return null;
      return recordSection?.users?.[activeProfileId]
        || (recordSection?.users ? null : recordSection);
    }

    async function refreshRecordApostleLevels() {
      try {
        const response = await fetch(recordStorageUrl, { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        const recordState = recordStateFromCampaign(payload?.campaign);
        if (!recordState) return;
        recordApostleLevels = Object.fromEntries(
          Object.entries(apostleRecordTracks).map(([apostle, track]) => [
            apostle,
            recordLevelForTrack(recordState, track)
          ])
        );
        renderApostleTitle();
        applyCurrentApostleLevelBonuses();
        renderCriticalMassSlot();
        renderExtraCards();
        renderAibpCards();
        renderPanelTokens();
      } catch {
        // 离线或 file:// 打开时继续使用手动等级。
      }
    }

    function apostleLevelFor(name) {
      if (fixedLevelOneApostles.has(name)) return 1;
      const override = Number(apostleLevelOverrides[name]);
      if (override >= 1 && override <= 5) return override;
      const recordLevel = Number(recordApostleLevels[name]);
      if (recordLevel >= 1 && recordLevel <= 5) return recordLevel;
      return 1;
    }

    function currentApostleLevel() {
      return apostleLevelFor(currentApostle);
    }

    function renderApostleTitle() {
      const level = currentApostleLevel();
      title.textContent = `${currentApostle.replaceAll("_", " ")} · ${levelRoman[level] || level}`;
      const fixedAtOne = fixedLevelOneApostles.has(currentApostle);
      apostleLevelSelect.disabled = fixedAtOne;
      apostleLevelSelect.value = !fixedAtOne && apostleLevelOverrides[currentApostle]
        ? String(apostleLevelOverrides[currentApostle])
        : "";
      const recordLevel = Number(recordApostleLevels[currentApostle]) || 0;
      apostleLevelSelect.options[0].textContent = fixedAtOne
        ? "固定等级 I"
        : recordLevel
          ? `跟随记录表（${levelRoman[recordLevel] || recordLevel}）`
          : "跟随记录表（未读取）";
      document.querySelectorAll("#nav button[data-name]").forEach((button) => {
        const name = button.dataset.name;
        const navLevel = apostleLevelFor(name);
        button.textContent = `${name.replaceAll("_", " ")} · ${levelRoman[navLevel] || navLevel}`;
      });
    }

    function bpViewsForCurrentApostle() {
      return isChimera() ? chimeraBpViews : normalBpViews;
    }

    function currentBpDamageKey() {
      if (!isChimera()) return "damage";
      return bpDamageTargetSelect.value === "damage2" ? "damage2" : "damage1";
    }

    function currentBpDamageView() {
      if (!isChimera()) return "损伤";
      return currentBpDamageKey() === "damage2" ? "第二损伤堆" : "常规损伤堆";
    }

    function bpDamageValue(card) {
      if (!card) return 0;
      if (card.special === "DW" || card.level === "III") return 2;
      return Math.max(1, Math.floor(Number(card.damageValue) || 1));
    }

    function bpDamageTotalForKey(key) {
      ensurePiles(currentApostle);
      const cards = piles[currentApostle].BP[key] || [];
      return cards.reduce((sum, card) => sum + bpDamageValue(card), 0);
    }

    function currentBpDamageSummary() {
      if (!isChimera()) {
        return { total: bpDamageTotalForKey("damage") };
      }
      const damage1 = bpDamageTotalForKey("damage1");
      const damage2 = bpDamageTotalForKey("damage2");
      return { total: damage1 + damage2, damage1, damage2 };
    }

    function pushBpDamage(card) {
      ensurePiles(currentApostle);
      const damageKey = currentBpDamageKey();
      if (isChimera() && damageKey === "damage2") {
        addChimeraSecondDamage(card);
        return;
      }
      piles[currentApostle].BP[damageKey].push(card);
      if (isCyclonus()) {
        addCriticalMass(bpDamageValue(card));
      }
    }

    function hasCriticalMassFeature() {
      return criticalMassApostles.has(currentApostle);
    }

    function criticalMassToken() {
      if (!hasCriticalMassFeature()) return null;
      return piles[currentApostle].tokens.find((item) =>
        item.criticalMass === true || item.chimeraCriticalMass === true
      ) || null;
    }

    function criticalMassThreshold() {
      return isCyclonus() ? 4 : 3;
    }

    function addCriticalMass(amount = 1) {
      if (!hasCriticalMassFeature() || currentApostleLevel() < 2) return false;
      const increment = Math.max(0, Math.floor(Number(amount) || 0));
      if (increment <= 0) return false;

      const existing = criticalMassToken();
      if (existing) {
        existing.criticalMass = true;
        delete existing.chimeraCriticalMass;
        existing.count = clampTokenCount((Number(existing.count) || 0) + increment);
      } else {
        piles[currentApostle].tokens.push({
          id: createTokenStackId(),
          file: criticalMassTokenFile,
          count: clampTokenCount(increment),
          x: criticalMassPosition.x,
          y: criticalMassPosition.y,
          criticalMass: true
        });
      }
      renderPanelTokens();
      return true;
    }

    function addChimeraSecondDamage(card) {
      ensurePiles(currentApostle);
      piles[currentApostle].BP.damage2.push(card);
      addCriticalMass(1);
    }

    function addCriticalMassFromSlot() {
      if (!hasCriticalMassFeature() || currentApostleLevel() < 2 || criticalMassToken()) return;
      rememberUndo(currentApostle, "BP");
      addCriticalMass(1);
      savePiles();
      renderAibpCards();
    }

    function resolveCriticalMass() {
      if (!hasCriticalMassFeature()) return;
      const token = criticalMassToken();
      if (!token || (Number(token.count) || 0) < criticalMassThreshold()) return;
      const ai = piles[currentApostle]?.AI;
      if (!ai || ai.pending || (ai.deck.length === 0 && ai.discard.length === 0)) return;

      rememberUndo(currentApostle, "AIBP");
      piles[currentApostle].tokens = piles[currentApostle].tokens.filter((item) => item.id !== token.id);
      savePiles();
      renderPanelTokens();
      drawAi(false);
    }

    function handleCriticalMassTokenClick() {
      if (!hasCriticalMassFeature()) return;
      const token = criticalMassToken();
      if (!token) return;
      if ((Number(token.count) || 0) >= criticalMassThreshold()) {
        resolveCriticalMass();
        return;
      }

      rememberUndo(currentApostle, "BP");
      addCriticalMass(1);
      savePiles();
      renderAibpCards();
      renderPanelTokens();
    }

    function chimeraPhaseForCard(card) {
      const fileName = cardFileName(card, chimeraName);
      const map = window.CHIMERA_BP_STATUS_MAP || {};
      const phase = String(map[fileName] || "").toUpperCase();
      return chimeraPhaseStates[phase] ? phase : "";
    }

    function setChimeraPhaseFromCard(card) {
      if (!isChimera()) return;
      const phase = chimeraPhaseForCard(card);
      if (!phase) return;
      piles[currentApostle].chimeraPhase = phase;
      const marker = panelWrap.querySelector(".panel-state-marker");
      updateNietzscheStateUi(marker);
    }

    function cardSrc(card) {
      if (card.special) {
        return `ps/other/${card.special}.jpg`;
      }
      return `ps/${currentApostle}/${cardFileName(card)}`;
    }

    function cardAlt(card) {
      if (card.special) {
        return `${card.special} 特殊损伤`;
      }
      if (card.damageValue && card.damageValue > 1) {
        return `${card.type} ${card.level} ${card.index}，视作 ${card.damageValue} 个损伤`;
      }
      return `${card.type} ${card.level} ${card.index}`;
    }

    function renderCardsIntoGrid(grid, cards, emptyText, type = "", view = "") {
      grid.replaceChildren();

      if (cards.length === 0) {
        const empty = document.createElement("div");
        empty.className = "missing";
        empty.textContent = emptyText;
        grid.appendChild(empty);
        return;
      }

      cards.forEach((card, index) => {
        const tile = document.createElement("div");
        tile.className = "card-tile";
        if (type && view) {
          tile.dataset.cardType = type;
          tile.dataset.cardView = view;
          tile.dataset.cardIndex = String(index);
        }
        tile.appendChild(imageOrMessage(cardSrc(card), cardAlt(card)));
        if (card.damageValue && card.damageValue > 1) {
          const badge = document.createElement("div");
          badge.className = "damage-badge";
          badge.textContent = `×${card.damageValue}`;
          tile.appendChild(badge);
        }
        grid.appendChild(tile);
      });
    }

    function cardsForView(type, view) {
      ensurePiles(currentApostle);
      if (type === "AI" && view === "闪粉牌组") {
        return piles[currentApostle].flare.deck;
      }
      if (type === "AI" && view === "闪粉弃牌") {
        return piles[currentApostle].flare.discard;
      }
      if (view === "当前") {
        return piles[currentApostle][type].deck;
      }
      if (view === "弃牌") {
        return piles[currentApostle][type].discard;
      }
      if (type === "AI" && view === "移除") {
        return piles[currentApostle].AI.removed;
      }
      if (type === "BP" && view === "损伤") {
        return piles[currentApostle].BP.damage;
      }
      if (type === "BP" && (view === "损伤1" || view === "常规损伤堆")) {
        return piles[currentApostle].BP.damage1;
      }
      if (type === "BP" && (view === "损伤2" || view === "第二损伤堆")) {
        return piles[currentApostle].BP.damage2;
      }
      if (type === "BP" && view === "移除") {
        return piles[currentApostle].BP.removed;
      }
      if (["I", "II", "III"].includes(view)) {
        return piles[currentApostle][type].supply[view] || [];
      }
      return [];
    }

    function pileLocationForView(type, view) {
      if (type === "AI" && view === "闪粉牌组") {
        return { type, owner: "flare", key: "deck", view, label: "闪粉牌组" };
      }
      if (type === "AI" && view === "闪粉弃牌") {
        return { type, owner: "flare", key: "discard", view, label: "闪粉弃牌" };
      }
      if (view === "当前") {
        return { type, owner: type, key: "deck", view, label: "抽牌堆" };
      }
      if (view === "弃牌") {
        return { type, owner: type, key: "discard", view, label: "弃牌堆" };
      }
      if (type === "AI" && view === "移除") {
        return { type, owner: "AI", key: "removed", view, label: "移出游戏" };
      }
      if (type === "BP" && view === "损伤") {
        return { type, owner: "BP", key: "damage", view, label: "损伤堆" };
      }
      if (type === "BP" && (view === "损伤1" || view === "常规损伤堆")) {
        return { type, owner: "BP", key: "damage1", view, label: "常规损伤堆" };
      }
      if (type === "BP" && (view === "损伤2" || view === "第二损伤堆")) {
        return { type, owner: "BP", key: "damage2", view, label: "第二损伤堆" };
      }
      if (type === "BP" && view === "移除") {
        return { type, owner: "BP", key: "removed", view, label: "移出游戏" };
      }
      if (["I", "II", "III"].includes(view)) {
        return { type, owner: type, key: "supply", level: view, view, label: `${view} 备用牌堆` };
      }
      return null;
    }

    function pileArrayForLocation(location, create = false) {
      if (!location) return null;
      ensurePiles(currentApostle);
      if (location.owner === "flare") {
        piles[currentApostle].flare[location.key] ||= [];
        return piles[currentApostle].flare[location.key];
      }

      const pile = piles[currentApostle][location.owner];
      if (!pile) return null;
      if (location.key === "supply") {
        if (create) pile.supply[location.level] ||= [];
        return pile.supply[location.level] || null;
      }
      if (create) pile[location.key] ||= [];
      return pile[location.key] || null;
    }

    function samePileLocation(left, right) {
      return Boolean(left && right)
        && left.owner === right.owner
        && left.key === right.key
        && (left.level || "") === (right.level || "");
    }

    function sameMoveCard(left, right) {
      if (!left || !right) return false;
      if (left.special || right.special) {
        return left.special === right.special && (left.damageValue || 1) === (right.damageValue || 1);
      }
      return sameCard(left, right)
        && (left.damageValue || 1) === (right.damageValue || 1)
        && Boolean(left.specialBp) === Boolean(right.specialBp);
    }

    function addMoveTarget(targets, context, location, label, placement = "end") {
      if (!location) return;
      if (samePileLocation(context.source, location)) {
        if (placement !== "top" || location.key !== "deck" || context.index <= 0) return;
      }
      targets.push({ location, label, placement });
    }

    function moveTargetsForContext(context) {
      const targets = [];
      if (!context) return targets;

      if (context.source.owner === "flare") {
        addMoveTarget(targets, context, pileLocationForView("AI", "闪粉牌组"), "到闪粉牌组");
        addMoveTarget(targets, context, pileLocationForView("AI", "闪粉弃牌"), "到闪粉弃牌");
        return targets;
      }

      addMoveTarget(targets, context, pileLocationForView(context.type, "当前"), "到抽牌堆", "random");
      addMoveTarget(targets, context, pileLocationForView(context.type, "当前"), "到抽牌堆顶", "top");
      addMoveTarget(targets, context, pileLocationForView(context.type, "弃牌"), "到弃牌堆");

      if (context.type === "BP") {
        if (isChimera()) {
          addMoveTarget(targets, context, pileLocationForView("BP", "常规损伤堆"), "到常规损伤堆");
          addMoveTarget(targets, context, pileLocationForView("BP", "第二损伤堆"), "到第二损伤堆");
        } else {
          addMoveTarget(targets, context, pileLocationForView("BP", "损伤"), "到损伤堆");
        }
      }

      addMoveTarget(targets, context, pileLocationForView(context.type, "移除"), "移出游戏");
      addMoveTarget(targets, context, pileLocationForView(context.type, "II"), "到 II 备用");
      addMoveTarget(targets, context, pileLocationForView(context.type, "III"), "到 III 备用");
      return targets;
    }

    function moveContextFromImage(img) {
      const tile = img?.closest(".card-tile");
      if (!tile || (!tile.closest("#aiGrid") && !tile.closest("#bpGrid"))) return null;
      const type = tile.dataset.cardType;
      const view = tile.dataset.cardView;
      const index = Number(tile.dataset.cardIndex);
      if (!["AI", "BP"].includes(type) || !Number.isInteger(index)) return null;

      const source = pileLocationForView(type, view);
      const sourceCards = pileArrayForLocation(source);
      const card = sourceCards?.[index];
      if (!card) return null;

      return {
        type,
        view,
        index,
        source,
        card: clonePileState(card)
      };
    }

    function flipContextFromImage(img) {
      if (!img?.dataset?.frontSrc || !img?.dataset?.backSrc) return null;
      return {
        frontSrc: img.dataset.frontSrc,
        backSrc: img.dataset.backSrc,
        sourceId: img.id || "",
        face: img.dataset.face || "front"
      };
    }

    function tokenContextFromImage(img) {
      const tokenItem = img?.closest(".panel-token-item");
      if (!tokenItem?.dataset?.tokenId) return null;
      return {
        apostle: currentApostle,
        tokenId: tokenItem.dataset.tokenId,
        file: tokenItem.dataset.file
      };
    }

    function placeCardInTarget(target, card) {
      const targetCards = pileArrayForLocation(target.location, true);
      if (!targetCards) return false;
      if (target.placement === "top") {
        targetCards.unshift(card);
      } else if (target.placement === "random") {
        insertRandom(targetCards, card);
      } else {
        targetCards.push(card);
      }
      return true;
    }

    function moveVisibleCard(context, target) {
      const sourceCards = pileArrayForLocation(context?.source);
      if (!sourceCards || !target?.location) return;

      let sourceIndex = context.index;
      if (!sameMoveCard(sourceCards[sourceIndex], context.card)) {
        sourceIndex = sourceCards.findIndex((card) => sameMoveCard(card, context.card));
      }
      if (sourceIndex < 0) return;

      rememberUndo(currentApostle, context.type);
      const [card] = sourceCards.splice(sourceIndex, 1);
      placeCardInTarget(target, card);
      if (isChimera() && target.location.owner === "BP" && target.location.key === "damage2") {
        addCriticalMass(1);
      } else if (isCyclonus() && target.location.owner === "BP" && target.location.key === "damage") {
        addCriticalMass(bpDamageValue(card));
      }
      savePiles();
      renderAibpCards();
    }

    function deckBackText(cards) {
      if (cards.length === 0) return "空";
      return cards.map((card) => levelBack[card.level] || card.level).join("-");
    }

    function shuffleCards(cards) {
      const shuffled = cards.slice();
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function insertRandom(deck, card) {
      if (!card) return;
      const position = Math.floor(Math.random() * (deck.length + 1));
      deck.splice(position, 0, card);
    }

    function drawFromSupply(type, level) {
      const pile = piles[currentApostle][type].supply[level];
      if (!pile || pile.length === 0) return null;
      return pile.pop();
    }

    function insertPromotedCard(type, level) {
      const pile = piles[currentApostle][type];
      const card = drawFromSupply(type, level);
      if (!card) return false;

      insertRandom(pile.deck, card);
      if (pile.deck.length === 1 && pile.discard.length > 0) {
        pile.deck = shuffleCards(pile.deck.concat(pile.discard));
        pile.discard = [];
      }
      return true;
    }

    function hasSupply(type, level) {
      const pile = piles[currentApostle][type].supply[level];
      return Array.isArray(pile) && pile.length > 0;
    }

    function reshuffleDiscardIfDeckEmpty(type) {
      const pile = piles[currentApostle][type];
      if (pile.deck.length === 0 && pile.discard.length > 0) {
        pile.deck = shuffleCards(pile.discard);
        pile.discard = [];
      }
    }

    function removeFirstMatching(type, predicate) {
      const pile = piles[currentApostle][type];
      reshuffleDiscardIfDeckEmpty(type);
      let index = pile.deck.findIndex(predicate);
      if (index >= 0) {
        const card = pile.deck.splice(index, 1)[0];
        pile.removed.push(card);
        reshuffleDiscardIfDeckEmpty(type);
        return { card, from: "deck" };
      }

      index = pile.discard.findIndex(predicate);
      if (index >= 0) {
        const card = pile.discard.splice(index, 1)[0];
        pile.removed.push(card);
        pile.deck = shuffleCards(pile.deck.concat(pile.discard));
        pile.discard = [];
        return { card, from: "discard" };
      }

      return null;
    }

    function putIntoRemovedPile(type, card) {
      if (!card || card.special) return;
      piles[currentApostle][type].removed.push(card);
    }

    function removeFirstMatchingToRemoved(type, predicate) {
      const pile = piles[currentApostle][type];
      reshuffleDiscardIfDeckEmpty(type);
      let index = pile.deck.findIndex(predicate);
      if (index >= 0) {
        const card = pile.deck.splice(index, 1)[0];
        putIntoRemovedPile(type, card);
        reshuffleDiscardIfDeckEmpty(type);
        return { card, from: "deck" };
      }

      index = pile.discard.findIndex(predicate);
      if (index >= 0) {
        const card = pile.discard.splice(index, 1)[0];
        putIntoRemovedPile(type, card);
        pile.deck = shuffleCards(pile.deck.concat(pile.discard));
        pile.discard = [];
        return { card, from: "discard" };
      }

      return null;
    }

    function lowestLevelCard(type) {
      const order = ["I", "II", "III"];
      const pile = piles[currentApostle][type];
      for (const level of order) {
        const deckCard = pile.deck.find((card) => card.level === level);
        if (deckCard) return deckCard;
        const discardCard = pile.discard.find((card) => card.level === level);
        if (discardCard) return discardCard;
      }
      return null;
    }

    function removeLowestCard(type) {
      const lowest = lowestLevelCard(type);
      if (!lowest) return null;
      return removeFirstMatching(type, (card) => card.level === lowest.level && card.index === lowest.index);
    }

    function removeLowestCardToRemoved(type) {
      const lowest = lowestLevelCard(type);
      if (!lowest) return null;
      return removeFirstMatchingToRemoved(type, (card) => card.level === lowest.level && card.index === lowest.index);
    }

    function removeLowestCardFromDeckOnly(type) {
      const order = ["I", "II", "III"];
      const pile = piles[currentApostle][type];
      for (const level of order) {
        const index = pile.deck.findIndex((card) => card.level === level);
        if (index >= 0) {
          const card = pile.deck.splice(index, 1)[0];
          pile.removed.push(card);
          return card;
        }
      }
      return null;
    }

    function addPanelToken(file, amount = 1) {
      ensurePiles(currentApostle);
      const count = Math.max(0, Math.floor(Number(amount) || 0));
      if (!file || count <= 0) return;

      const tokens = piles[currentApostle].tokens;
      tokens.push({
        id: createTokenStackId(),
        file,
        count: clampTokenCount(count),
        x: 8 + (tokens.length % 5) * 8,
        y: 8 + Math.floor(tokens.length / 5) * 8
      });
    }

    function addAiExhaustedBonusTokens(damageCount = 1) {
      ensurePiles(currentApostle);
      const count = Math.max(0, Math.floor(Number(damageCount) || 0));
      if (count <= 0) return;

      let index = piles[currentApostle].aiExhaustedBonusIndex % aiExhaustedBonusTokens.length;
      if (index < 0) index = 0;

      for (let i = 0; i < count; i++) {
        addPanelToken(aiExhaustedBonusTokens[index], 1);
        index = (index + 1) % aiExhaustedBonusTokens.length;
      }

      piles[currentApostle].aiExhaustedBonusIndex = index;
      renderPanelTokens();
    }

    function promoteAiFromLevel(fromLevel, toLevel, damageCount = 1) {
      reshuffleDiscardIfDeckEmpty("AI");
      if (toLevel === "III" && !hasSupply("AI", "III")) {
        addAiExhaustedBonusTokens(damageCount);
        return;
      }
      removeFirstMatchingToRemoved("AI", (card) => card.level === fromLevel);
      insertPromotedCard("AI", toLevel);
    }

    function promoteAiForBpIII(damageCount = 2) {
      reshuffleDiscardIfDeckEmpty("AI");
      if (!hasSupply("AI", "III")) {
        addAiExhaustedBonusTokens(damageCount);
        return;
      }
      removeLowestCardToRemoved("AI");
      insertPromotedCard("AI", "III");
    }

    function resolveBpDefeat(card) {
      const bp = piles[currentApostle].BP;

      if (card.level === "I") {
        pushBpDamage(card);
        insertPromotedCard("BP", "II");
        promoteAiFromLevel("I", "II");
        return;
      }

      if (card.level === "II") {
        pushBpDamage(card);
        insertPromotedCard("BP", "III");
        promoteAiFromLevel("II", "III");
        return;
      }

      // BP III：按规则不把这张 BP3 当作普通损伤显示；它被放在一旁，损伤堆加入通用双重损伤 DW。
      bp.removed.push(card);
      pushBpDamage({ special: "DW" });

      if (hasSupply("BP", "III")) {
        removeLowestCard("BP");
        insertPromotedCard("BP", "III");
        bp.deck.push(card);
      } else {
        bp.deck = shuffleCards(bp.deck.concat(bp.discard));
        bp.discard = [];
        bp.deck.push(card);
      }

      promoteAiForBpIII();
    }

    function resolveBpCritical(card) {
      const bp = piles[currentApostle].BP;

      if (card.level !== "III") {
        // 规则图中“关键一击”只列在 BP III；非 BP III 时按普通击败处理。
        resolveBpDefeat(card);
        return;
      }

      // BP III 关键一击：击伤的 BP3 本体进入损伤堆，视作 2 个损伤。
      pushBpDamage({ ...card, damageValue: 2 });

      if (hasSupply("BP", "III")) {
        removeLowestCard("BP");
        insertPromotedCard("BP", "III");
        insertPromotedCard("BP", "III");
      } else {
        bp.deck = shuffleCards(bp.deck.concat(bp.discard));
        bp.discard = [];
      }
    }

    function addBpSpecialDamage(special) {
      ensurePiles(currentApostle);
      rememberUndo(currentApostle, "BP");
      pushBpDamage({ special });
      currentBpView = currentBpDamageView();
      savePiles();
      renderAibpCards();
    }

    function isLabyrinthauros() {
      return currentApostle === labyrinthaurosName;
    }

    function isHermesian() {
      return currentApostle === hermesianName;
    }

    function renderFlareButton() {
      if (!drawFlareButton) return;
      drawFlareButton.classList.toggle("show", isHermesian());
      if (!isHermesian()) return;
      const flare = piles[currentApostle].flare;
      drawFlareButton.textContent = `抽取闪粉（${flare.deck.length}/${flare.discard.length}）`;
    }

    function drawFlare() {
      if (!isHermesian()) return;
      ensurePiles(currentApostle);
      const flare = piles[currentApostle].flare;
      if (flare.deck.length === 0 && flare.discard.length > 0) {
        flare.deck = shuffleCards(flare.discard);
        flare.discard = [];
      }
      if (flare.deck.length === 0) return;

      rememberUndo(currentApostle, "AI");
      const card = flare.deck.shift();
      flare.discard.push(card);
      savePiles();
      renderAibpCards();
      openImageZoom(cardSrc(card), "抽取的闪粉卡");
    }

    function addLabyrinthaurosSpecialBp() {
      if (!isLabyrinthauros()) return;
      ensurePiles(currentApostle);
      const bp = piles[currentApostle].BP;
      const locations = ["deck", "discard", "damage", "damage1", "damage2"];
      const alreadyInPlay = locations.some((key) =>
        (bp[key] || []).some((card) => sameCard(card, labyrinthaurosSpecialBp))
      ) || sameCard(bp.pending, labyrinthaurosSpecialBp);
      if (alreadyInPlay) return;

      rememberUndo(currentApostle, "BP");
      bp.removed = (bp.removed || []).filter((card) => !sameCard(card, labyrinthaurosSpecialBp));
      insertRandom(bp.deck, { ...labyrinthaurosSpecialBp });
      savePiles();
      renderAibpCards();
    }

    function removeLabyrinthaurosSpecialBp() {
      if (!isLabyrinthauros()) return;
      ensurePiles(currentApostle);
      const bp = piles[currentApostle].BP;
      const locations = ["deck", "discard", "damage", "damage1", "damage2"];
      const exists = locations.some((key) =>
        (bp[key] || []).some((card) => sameCard(card, labyrinthaurosSpecialBp))
      ) || sameCard(bp.pending, labyrinthaurosSpecialBp);
      if (!exists) return;

      rememberUndo(currentApostle, "BP");
      locations.forEach((key) => {
        bp[key] = (bp[key] || []).filter((card) => !sameCard(card, labyrinthaurosSpecialBp));
      });
      if (sameCard(bp.pending, labyrinthaurosSpecialBp)) bp.pending = null;
      if (!(bp.removed || []).some((card) => sameCard(card, labyrinthaurosSpecialBp))) {
        bp.removed.push({ ...labyrinthaurosSpecialBp });
      }
      currentBpView = "移除";
      savePiles();
      renderAibpCards();
    }

    function addChimeraDamage2Sw() {
      ensurePiles(currentApostle);
      if (!isChimera()) return;
      rememberUndo(currentApostle, "BP");
      addChimeraSecondDamage({ special: "SW" });
      currentBpView = "第二损伤堆";
      savePiles();
      renderAibpCards();
    }

    function removeChimeraDamage2Sw() {
      ensurePiles(currentApostle);
      if (!isChimera()) return;
      const damage2 = piles[currentApostle].BP.damage2;
      const index = damage2.findLastIndex
        ? damage2.findLastIndex((card) => card && card.special === "SW")
        : (() => {
            for (let i = damage2.length - 1; i >= 0; i--) {
              if (damage2[i] && damage2[i].special === "SW") return i;
            }
            return -1;
          })();
      if (index < 0) return;
      rememberUndo(currentApostle, "BP");
      damage2.splice(index, 1);
      currentBpView = "第二损伤堆";
      savePiles();
      renderAibpCards();
    }

    function promoteBpDeckForDefeatedLevel(level) {
      const bp = piles[currentApostle].BP;
      reshuffleDiscardIfDeckEmpty("BP");

      if (level === "I") {
        insertPromotedCard("BP", "II");
        return;
      }

      if (level === "II") {
        insertPromotedCard("BP", "III");
        return;
      }

      if (level === "III") {
        if (hasSupply("BP", "III")) {
          removeLowestCardToRemoved("BP");
          insertPromotedCard("BP", "III");
        } else {
          bp.deck = shuffleCards(bp.deck.concat(bp.discard));
          bp.discard = [];
        }
      }
    }


    function lowestDeckCardWithIndex(type) {
      const order = ["I", "II", "III"];
      const deck = piles[currentApostle][type].deck;
      for (const level of order) {
        const index = deck.findIndex((card) => card.level === level);
        if (index >= 0) {
          return { card: deck[index], index };
        }
      }
      return null;
    }

    function higherLevel(level) {
      if (level === "I") return "II";
      if (level === "II") return "III";
      return null;
    }

    function promoteSinglePile(type) {
      ensurePiles(currentApostle);
      const target = lowestLevelCard(type);
      if (!target) return;

      const toLevel = higherLevel(target.level);
      if (!toLevel) {
        window.alert(`${type} 当前牌堆中最低等级已经是 III，没有更高等级可晋升。`);
        return;
      }

      rememberUndo(currentApostle, type);
      removeFirstMatchingToRemoved(type, (card) => card.level === target.level && card.index === target.index);
      insertPromotedCard(type, toLevel);

      // 不再自动跳转到“当前”；保留用户当前正在查看的牌堆。
      savePiles();
      renderAibpCards();
    }

    function promoteBpByRemovingLowest() {
      ensurePiles(currentApostle);
      if (!lowestLevelCard("BP")) return;
      rememberUndo(currentApostle, "AIBP");
      const removed = removeLowestCardToRemoved("BP");
      const removedCard = removed?.card;
      if (!removedCard) return;

      // 这张 BP 不进入损伤牌堆，而是进入 BP 的移除牌堆；
      // 但仍按“这张 BP 被击败/造成损伤”完整结算 BP 卡组补新卡和 AI 卡组升级。
      promoteBpDeckForDefeatedLevel(removedCard.level);

      if (removedCard.level === "I") {
        promoteAiFromLevel("I", "II");
      } else if (removedCard.level === "II") {
        promoteAiFromLevel("II", "III");
      } else if (removedCard.level === "III") {
        promoteAiForBpIII();
      }

      currentBpView = "移除";
      savePiles();
      renderAibpCards();
    }

    function performLinkedPromotion() {
      ensurePiles(currentApostle);
      const removed = removeLowestCardToRemoved("BP");
      const removedCard = removed?.card;
      if (!removedCard) return false;

      promoteBpDeckForDefeatedLevel(removedCard.level);
      if (removedCard.level === "I") {
        promoteAiFromLevel("I", "II");
      } else if (removedCard.level === "II") {
        promoteAiFromLevel("II", "III");
      } else if (removedCard.level === "III") {
        promoteAiForBpIII();
      }
      return true;
    }

    function levelBonusFor(apostle, level) {
      const config = apostleLevelBonusConfig[apostle];
      if (!config) return { promotions: 0, danger: 0, at: 0 };
      let result = { promotions: 0, danger: 0, at: 0 };
      Object.entries(config).forEach(([minimumLevel, bonus]) => {
        if (level >= Number(minimumLevel)) result = { ...result, ...bonus };
      });
      return result;
    }

    function syncAutomaticLevelBonusToken(kind, file, count) {
      const tokens = piles[currentApostle].tokens;
      const existing = tokens.find((item) => item.autoLevelBonus === kind);
      const position = kind === "danger"
        ? { x: 8, y: 8 }
        : { x: 16, y: 8 };
      if (count <= 0) {
        piles[currentApostle].tokens = tokens.filter((item) => item.autoLevelBonus !== kind);
        return;
      }
      if (existing) {
        existing.file = file;
        existing.count = count;
        existing.x = position.x;
        existing.y = position.y;
        return;
      }
      tokens.push({
        id: createTokenStackId(),
        file,
        count,
        x: position.x,
        y: position.y,
        autoLevelBonus: kind
      });
    }

    function applyCurrentApostleLevelBonuses() {
      ensurePiles(currentApostle);
      const target = levelBonusFor(currentApostle, currentApostleLevel());
      const state = piles[currentApostle].levelBonusState;
      let changed = false;

      while (state.promotions < target.promotions) {
        if (!performLinkedPromotion()) break;
        state.promotions += 1;
        changed = true;
      }

      const beforeTokens = JSON.stringify(
        piles[currentApostle].tokens.filter((item) => item.autoLevelBonus)
      );
      syncAutomaticLevelBonusToken("danger", "DA+.png", target.danger);
      syncAutomaticLevelBonusToken("at", "AT+.png", target.at);
      const afterTokens = JSON.stringify(
        piles[currentApostle].tokens.filter((item) => item.autoLevelBonus)
      );
      if (beforeTokens !== afterTokens) changed = true;

      if (changed) savePiles();
      return changed;
    }

    function renderAibpCards() {
