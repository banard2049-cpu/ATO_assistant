    function traitFileName(name, level, index, ext = "jpg") {
      const safeExt = String(ext || "jpg").replace(/^\./, "").toLowerCase();
      return `${name}_TR_${level}_${String(index).padStart(3, "0")}.${safeExt}`;
    }

    function traitSrc(name, level, index, ext = "jpg") {
      return `ps/${name}/${traitFileName(name, level, index, ext)}`;
    }

    function commonTraitFileName(index, ext = "jpg") {
      const safeExt = String(ext || "jpg").replace(/^\./, "").toLowerCase();
      return `COMMON_TR_${String(index).padStart(3, "0")}.${safeExt}`;
    }

    function commonTraitSrc(index, ext = "jpg") {
      return `ps/other/trait/${commonTraitFileName(index, ext)}`;
    }

    function traitCardSrc(name, card) {
      return card.scope === "common"
        ? commonTraitSrc(card.index, card.ext)
        : traitSrc(name, card.level, card.index, card.ext);
    }

    function traitKey(level, index, ext = "jpg", scope = "") {
      return `${scope || "apostle"}-${level}-${index}-${String(ext || "jpg").replace(/^\./, "").toLowerCase()}`;
    }

    function isLargeTraitCard(apostle, card) {
      return card.level === "O"
        || (apostle === "HYPERTIME_ORACLE" && card.level === "IV")
        || (apostle === "ICARIAN_HARPY" && card.level === "X" && card.index === 2);
    }

    function automaticTraitLevels() {
      const levels = ["I", "II", "III", "IV", "V"];
      return [...levels.slice(0, currentApostleLevel()), "X"];
    }

    function selectedTraitKeySet() {
      ensurePiles(currentApostle);
      return new Set(piles[currentApostle].traits.map((card) => traitKey(card.level, card.index, card.ext, card.scope)));
    }

    function renderTraitCandidates() {
      ensurePiles(currentApostle);
      const name = currentApostle;
      const selected = selectedTraitKeySet();
      const token = ++traitLoadToken;
      let loaded = 0;

      traitDialogTitle.textContent = `${name.replaceAll("_", " ")} - Trait 选择`;
      traitDialogGrid.replaceChildren();
      const loading = document.createElement("div");
      loading.className = "missing";
      loading.textContent = "正在试探加载 TR 图片……";
      traitDialogGrid.appendChild(loading);

      traitLevels.forEach((level) => {
        for (let index = 1; index <= traitProbeMaxIndex; index++) {
          traitProbeExtensions.forEach((ext) => {
            const src = traitSrc(name, level, index, ext);
            const img = new Image();
            img.onload = () => {
              if (token !== traitLoadToken) return;
              if (loading.isConnected) loading.remove();
              loaded += 1;

              const option = document.createElement("label");
              option.className = "trait-option";

              const checkbox = document.createElement("input");
              checkbox.type = "checkbox";
              checkbox.dataset.level = level;
              checkbox.dataset.index = String(index);
              checkbox.dataset.ext = ext;
              checkbox.dataset.scope = "";
              checkbox.checked = selected.has(traitKey(level, index, ext, ""));

              img.alt = `TR ${level} ${String(index).padStart(3, "0")}`;

              const caption = document.createElement("span");
              caption.textContent = `TR ${level} ${String(index).padStart(3, "0")}`;

              option.append(checkbox, img, caption);
              traitDialogGrid.appendChild(option);
            };
            img.onerror = () => {};
            img.src = src;
          });
        }
      });

      for (let index = 1; index <= traitProbeMaxIndex; index++) {
        traitProbeExtensions.forEach((ext) => {
          const src = commonTraitSrc(index, ext);
          const img = new Image();
          img.onload = () => {
            if (token !== traitLoadToken) return;
            if (loading.isConnected) loading.remove();
            loaded += 1;

            const option = document.createElement("label");
            option.className = "trait-option";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.dataset.level = "COMMON";
            checkbox.dataset.index = String(index);
            checkbox.dataset.ext = ext;
            checkbox.dataset.scope = "common";
            checkbox.checked = selected.has(traitKey("COMMON", index, ext, "common"));

            img.alt = `通用特质 ${String(index).padStart(3, "0")}`;

            const caption = document.createElement("span");
            caption.textContent = `通用特质 ${String(index).padStart(3, "0")}`;

            option.append(checkbox, img, caption);
            traitDialogGrid.appendChild(option);
          };
          img.onerror = () => {};
          img.src = src;
        });
      }

      window.setTimeout(() => {
        if (token !== traitLoadToken) return;
        if (loaded === 0 && traitDialogGrid.children.length === 1 && loading.isConnected) {
          loading.textContent = `未找到 ${name}_TR_<O/I/II/III/IV/V/VI/VII/VIII/IX/X>_<编号>.(jpg/png/jpeg)`;
        }
      }, 700);
    }

    function openTraitDialog() {
      renderTraitCandidates();
      if (typeof traitDialog.showModal === "function") {
        traitDialog.showModal();
      } else {
        window.alert("当前浏览器不支持 dialog 弹窗。请使用新版 Chrome / Edge。 ");
      }
    }

    function saveTraitSelection() {
      ensurePiles(currentApostle);
      piles[currentApostle].traits = Array.from(traitDialogGrid.querySelectorAll("input[type='checkbox']:checked"))
        .map((input) => ({
          type: "TR",
          level: input.dataset.level,
          index: Number(input.dataset.index),
          ext: input.dataset.ext || "jpg",
          scope: input.dataset.scope || ""
        }))
        .sort((a, b) => {
          const scopeOrder = String(a.scope || "").localeCompare(String(b.scope || ""));
          if (scopeOrder) return scopeOrder;
          return traitLevels.indexOf(a.level) - traitLevels.indexOf(b.level) || a.index - b.index || String(a.ext).localeCompare(String(b.ext));
        });
      savePiles();
      renderExtraCards();
      traitDialog.close();
    }

    function clearTraitSelection() {
      traitDialogGrid.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.checked = false;
      });
    }

    function reorderExtraGridForLargeCards() {
      const children = Array.from(extraGrid.children).filter((el) => el.tagName === "IMG" || el.classList.contains("missing"));
      if (children.length === 0) return;
      const large = [];
      const small = [];
      children.forEach((el) => {
        if (el.classList.contains("panel-image")) {
          large.push(el);
        } else {
          small.push(el);
        }
      });
      if (large.length === 0) return;
      // 大卡占一整列（2行），小卡每2张占一列。
      // 按顺序排列：大卡独占一列位，小卡两两成对填列。
      const result = [];
      let li = 0;
      let si = 0;
      // 保持原始相对顺序：遍历原始列表，遇到大卡就输出，遇到小卡攒够2张或到末尾再输出
      const orig = children.slice();
      const reordered = [];
      let smallBuf = [];
      for (const el of orig) {
        if (el.classList.contains("panel-image")) {
          // 如果缓冲区有奇数张小卡，先把偶数张输出，留1张到大卡后面
          if (smallBuf.length % 2 === 1) {
            const leftover = smallBuf.pop();
            reordered.push(...smallBuf);
            smallBuf = [leftover];
          } else {
            reordered.push(...smallBuf);
            smallBuf = [];
          }
          reordered.push(el);
        } else {
          smallBuf.push(el);
        }
      }
      reordered.push(...smallBuf);
      extraGrid.replaceChildren(...reordered);
    }

    function renderExtraCards() {
      ensurePiles(currentApostle);
      const base = `ps/${currentApostle}`;
      const candidates = [];
      let loaded = 0;

      extraGrid.replaceChildren();

      const selectedTraitKeys = selectedTraitKeySet();

      piles[currentApostle].traits.forEach((card) => {
        const imageClass = isLargeTraitCard(currentApostle, card) ? "panel-image" : "";
        const alt = card.scope === "common" ? `通用特质 ${card.index}` : `TR ${card.level} ${card.index}`;
        const img = imageOrMessage(traitCardSrc(currentApostle, card), alt, imageClass);
        extraGrid.appendChild(img);
        loaded += 1;
      });

      automaticTraitLevels().forEach((level) => {
        for (let index = 1; index <= defaultTraitProbeMaxIndex; index++) {
          traitProbeExtensions.forEach((ext) => {
            if (selectedTraitKeys.has(traitKey(level, index, ext, ""))) return;
            const card = { level, index, ext };
            candidates.push({
              src: traitSrc(currentApostle, level, index, ext),
              alt: `TR ${level} ${String(index).padStart(3, "0")}`,
              className: isLargeTraitCard(currentApostle, card) ? "panel-image" : ""
            });
          });
        }
      });

      ["AI", "BP"].forEach((type) => {
        ["O", "X"].forEach((level) => {
          for (let i = 1; i <= 12; i++) {
            candidates.push({
              src: `${base}/${numberedName(currentApostle, type, level, i)}`,
              alt: numberedName(currentApostle, type, level, i)
            });
          }
        });
      });

      candidates.forEach(({ src, alt, className = "" }) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = alt || src.split("/").pop();
        img.className = className;
        img.onload = () => {
          loaded += 1;
          reorderExtraGridForLargeCards();
        };
        img.onerror = () => {
          img.remove();
          reorderExtraGridForLargeCards();
        };
        extraGrid.appendChild(img);
      });

      reorderExtraGridForLargeCards();

      window.setTimeout(() => {
        if (loaded === 0 && extraGrid.children.length === 0) {
          const empty = document.createElement("div");
          empty.className = "missing";
          empty.textContent = "暂无其他卡牌";
          extraGrid.appendChild(empty);

    function isTokenImageFileName(fileName) {
      return /\.(png|jpe?g)$/i.test(fileName || "");
    }

    function naturalCompareTokenFile(a, b) {
      return String(a).localeCompare(String(b), "zh-Hans-CN", { numeric: true, sensitivity: "base" });
    }

    function normalizeTokenFileName(file) {
      return String(file || "").replace(/\\/g, "/").split("/").pop();
    }

    function tokenProbeFileNames() {
      // 主要从 token_manifest.js 获取 token 文件夹中所有图片。
      // 如果清单不存在，则只兜底试探常见图片命名。
      const names = new Set(tokenFileNames.map(normalizeTokenFileName).filter(isTokenImageFileName));
      for (let index = 1; index <= tokenProbeMaxIndex; index++) {
        const padded3 = String(index).padStart(3, "0");
        const padded2 = String(index).padStart(2, "0");
        const loose = String(index);
        tokenProbeExtensions.forEach((ext) => {
          names.add(`${padded3}.${ext}`);
          names.add(`${padded2}.${ext}`);
          names.add(`${loose}.${ext}`);
          names.add(`TOKEN_${padded3}.${ext}`);
          names.add(`TOKEN_${padded2}.${ext}`);
          names.add(`TOKEN${padded3}.${ext}`);
          names.add(`TOKEN${loose}.${ext}`);
          names.add(`token_${padded3}.${ext}`);
          names.add(`token_${padded2}.${ext}`);
          names.add(`token${padded3}.${ext}`);
          names.add(`token${loose}.${ext}`);
          names.add(`Token_${padded3}.${ext}`);
          names.add(`Token${loose}.${ext}`);
        });
      }
      return Array.from(names).sort(naturalCompareTokenFile);
    }

    function tokenSrc(file) {
      return `${tokenBasePath}/${file}`;
    }

    function createTokenStackId() {
      tokenStackSequence += 1;
      return `token-${Date.now().toString(36)}-${tokenStackSequence.toString(36)}`;
    }

    function selectedTokenStacksMap() {
      ensurePiles(currentApostle);
      const map = new Map();
      piles[currentApostle].tokens.forEach((item) => {
        const stacks = map.get(item.file) || [];
        stacks.push(item);
        map.set(item.file, stacks);
      });
      return map;
    }

    function clampTokenCount(value) {
      return Math.max(0, Math.min(99, Math.floor(Number(value) || 0)));
    }

    function changeTokenCount(input, delta) {
      input.value = String(clampTokenCount((Number(input.value) || 0) + delta));
    }

    function appendTokenOption(file, img, selected) {
      const option = document.createElement("div");
      option.className = "trait-option token-option";

      img.alt = file;
      img.title = "点击图片：新堆数量 +1";

      const caption = document.createElement("span");
      const existingStacks = selected.get(file) || [];
      const existingTotal = existingStacks.reduce((sum, item) => sum + (Number(item.count) || 0), 0);
      caption.textContent = existingStacks.length
        ? `${file}（已有 ${existingStacks.length} 堆，共 ${existingTotal}）`
        : file;

      const countWrap = document.createElement("div");
      countWrap.className = "token-option-count";

      const countLabel = document.createElement("div");
      countLabel.className = "token-option-count-label";
      countLabel.textContent = "新增一堆的数量（点图片 +1）";

      const minusButton = document.createElement("button");
      minusButton.type = "button";
      minusButton.className = "token-count-step";
      minusButton.textContent = "−";
      minusButton.title = "数量 -1";

      const countInput = document.createElement("input");
      countInput.type = "number";
      countInput.min = "0";
      countInput.max = "99";
      countInput.step = "1";
      countInput.value = "0";
      countInput.dataset.file = file;

      const plusButton = document.createElement("button");
      plusButton.type = "button";
      plusButton.className = "token-count-step";
      plusButton.textContent = "+";
      plusButton.title = "数量 +1";

      img.addEventListener("click", () => changeTokenCount(countInput, 1));
      minusButton.addEventListener("click", () => changeTokenCount(countInput, -1));
      plusButton.addEventListener("click", () => changeTokenCount(countInput, 1));
      countInput.addEventListener("change", () => {
        countInput.value = String(clampTokenCount(countInput.value));
      });

      countWrap.append(countLabel, minusButton, countInput, plusButton);
      option.append(img, caption, countWrap);
      tokenDialogGrid.appendChild(option);
    }

    async function loadTokenFileNamesFromDirectoryIndex() {
      // 只有当你用本地服务器打开，并且 ps/other/token/ 开启目录列表时才会成功。
      // file:// 或普通静态服务器通常不允许 JS 直接枚举目录。
      try {
        const response = await fetch(`${tokenBasePath}/`, { cache: "no-store" });
        if (!response.ok) return [];
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        return Array.from(doc.querySelectorAll("a"))
          .map((a) => decodeURIComponent(a.getAttribute("href") || ""))
          .map((href) => normalizeTokenFileName(href))
          .filter(isTokenImageFileName)
          .sort(naturalCompareTokenFile);
      } catch {
        return [];
      }
    }

    async function renderTokenCandidates() {
      ensurePiles(currentApostle);
      const selected = selectedTokenStacksMap();
      const token = ++tokenLoadToken;
      let loaded = 0;

      tokenDialogTitle.textContent = `${currentApostle.replaceAll("_", " ")} - 新增 Token 堆`;
      tokenDialogGrid.replaceChildren();
      const loading = document.createElement("div");
      loading.className = "missing";
      loading.textContent = "正在从相对路径 ps/other/token/ 加载所有 Token PNG……";
      tokenDialogGrid.appendChild(loading);
      tokenFolderHint.textContent = "每次保存会新增独立 Token 堆；已有堆请点击面板上的 Token 单独增减或清空。";

      const manifestNames = tokenFileNames.map(normalizeTokenFileName).filter(isTokenImageFileName);
      const directoryNames = manifestNames.length > 0 ? [] : await loadTokenFileNamesFromDirectoryIndex();
      const candidates = Array.from(new Set((manifestNames.length > 0 ? manifestNames : directoryNames).concat(tokenProbeFileNames())))
        .filter(isTokenImageFileName)
        .sort(naturalCompareTokenFile);

      candidates.forEach((file) => {
        const img = new Image();
        img.onload = () => {
          if (token !== tokenLoadToken) return;
          if (loading.isConnected) loading.remove();
          loaded += 1;
          appendTokenOption(file, img, selected);
        };
        img.onerror = () => {};
        img.src = tokenSrc(file);
      });

      window.setTimeout(() => {
        if (token !== tokenLoadToken) return;
        if (loaded === 0 && tokenDialogGrid.children.length === 1 && loading.isConnected) {
          loading.textContent = "没有加载到 token。请先在 ps/other/token/ 里生成 token_manifest.js；静态 HTML 不能直接扫描文件夹。";
        }
      }, 900);
    }

    function setImageZoomTokenActions(context = null) {
      activeTokenContext = context;
      imageZoomTokenActions.classList.toggle("show", Boolean(context));
      if (!context) {
        imageZoomTokenTitle.textContent = "Token";
        return;
      }

      const item = piles[context.apostle]?.tokens?.find((entry) => entry.id === context.tokenId);
      const count = Number(item?.count) || 0;
      imageZoomTokenTitle.textContent = `${context.file} x${count}`;
      imageZoomTokenActions.querySelector("[data-token-zoom-action='minus']").disabled = count <= 0;
      imageZoomTokenActions.querySelector("[data-token-zoom-action='clear']").disabled = count <= 0;
    }

    function changeZoomTokenCount(action) {
      const context = activeTokenContext;
      if (!context) return;
      const tokenList = piles[context.apostle]?.tokens;
      if (!Array.isArray(tokenList)) return;
      const index = tokenList.findIndex((entry) => entry.id === context.tokenId);
      if (index < 0) return;

      const item = tokenList[index];
      if (action === "plus") {
        item.count = clampTokenCount((Number(item.count) || 0) + 1);
      } else if (action === "minus") {
        item.count = clampTokenCount((Number(item.count) || 0) - 1);
      } else if (action === "clear") {
        item.count = 0;
      }

      if ((Number(item.count) || 0) <= 0) {
        tokenList.splice(index, 1);
        savePiles();
        renderPanelTokens();
        closeImageZoom();
      } else {
        savePiles();
        renderPanelTokens();
        setImageZoomTokenActions(context);
      }
    }

    function currentPanelCardTokens(type) {
      ensurePiles(currentApostle);
      const allowedFiles = type === "BP"
        ? new Set(["AT-.png", "AT+.png"])
        : type === "AI"
          ? new Set(["DA-.png", "DA+.png", "ps-.png", "ps+.png", "ED-.png", "ED+.png"])
          : new Set();

      return piles[currentApostle].tokens
        .filter((item) => allowedFiles.has(item.file) && (Number(item.count) || 0) > 0)
        .map((item) => ({
          file: item.file,
          count: Math.max(1, Math.floor(Number(item.count) || 1)),
          autoLevelBonus: item.autoLevelBonus || ""
        }));
    }

    function setImageZoomCardTokens(tokens = []) {
      const items = Array.isArray(tokens) ? tokens : [];
      const groups = [
        { className: "token-at", matches: (file) => file.startsWith("AT") },
        { className: "token-accuracy-evasion", matches: (file) => file.startsWith("ps") || file.startsWith("ED") },
        { className: "token-danger", matches: (file) => file.startsWith("DA") }
      ];

      imageZoomCardTokens.replaceChildren(...groups.map((group) => {
        const groupElement = document.createElement("div");
        groupElement.className = `image-zoom-card-token-group ${group.className}`;

        items.filter((item) => group.matches(item.file)).forEach((item) => {
          const tokenItem = document.createElement("div");
          tokenItem.className = "image-zoom-card-token";
          if (item.autoLevelBonus === "danger" && currentApostleLevel() >= 5) {
            tokenItem.classList.add("auto-level-danger-per-hit");
          }
          tokenItem.title = `${item.file} ×${item.count}`;

          const img = document.createElement("img");
          img.src = tokenSrc(item.file);
          img.alt = item.file;
          tokenItem.appendChild(img);

          if (item.count > 1) {
            const badge = document.createElement("div");
            badge.className = "panel-token-count";
            badge.textContent = `×${item.count}`;
            tokenItem.appendChild(badge);
          }
          groupElement.appendChild(tokenItem);
        });
        return groupElement;
      }).filter((groupElement) => groupElement.childElementCount > 0));
      imageZoomCardTokens.classList.toggle("show", items.length > 0);
    }

    function openImageZoom(src, alt = "放大图片", onClose = null, options = {}) {
      if (!src) return;
      zoomCloseAction = typeof onClose === "function" ? onClose : null;
      imageZoomImg.src = src;
      imageZoomImg.alt = alt || "放大图片";
      const noticeImages = Array.isArray(options.noticeImages) ? options.noticeImages : [];
      const sideNotices = options.noticeLayout === "sides" && noticeImages.length > 0;
      imageZoomNotice.replaceChildren(...noticeImages.map((item) => {
        const img = document.createElement("img");
        img.src = item.src;
        img.alt = item.alt || "";
        return img;
      }));
      imageZoomNotice.classList.toggle("show", noticeImages.length > 0);
      imageZoomNotice.parentElement.classList.toggle("has-notice", noticeImages.length > 0);
      imageZoomNotice.parentElement.classList.toggle("has-side-notices", sideNotices);
      setImageZoomCardTokens(options.cardTokens || []);
      setImageZoomBpActions(Boolean(options.bpActions));
      setImageZoomFlipActions(options.flipContext || null);
      setImageZoomMoveActions(options.moveContext || null);
      setImageZoomTokenActions(options.tokenContext || null);
      imageZoomOverlay.classList.add("show");
      imageZoomOverlay.setAttribute("aria-hidden", "false");

    function closeImageZoom() {
      const closeAction = zoomCloseAction;
      zoomCloseAction = null;
      imageZoomOverlay.classList.remove("show");
      imageZoomOverlay.setAttribute("aria-hidden", "true");
      imageZoomImg.removeAttribute("src");
      imageZoomNotice.replaceChildren();
      imageZoomNotice.classList.remove("show");
      imageZoomNotice.parentElement.classList.remove("has-notice");
      imageZoomNotice.parentElement.classList.remove("has-side-notices");
      setImageZoomCardTokens([]);
      setImageZoomBpActions(false);
      setImageZoomFlipActions(null);
      setImageZoomMoveActions(null);
      setImageZoomTokenActions(null);

      const state = chimeraPhaseStates[phase];

    function renderPanelTokens() {
      ensurePiles(currentApostle);
      const layer = panelWrap.querySelector(".panel-token-layer");
      if (!layer) return;
      layer.replaceChildren();

      piles[currentApostle].tokens.forEach((item) => {
        const tokenItem = document.createElement("div");
        tokenItem.className = "panel-token-item";
        const isCriticalMass = item.criticalMass === true || item.chimeraCriticalMass === true;
        const threshold = criticalMassThreshold();
        if (isCriticalMass) {
          item.criticalMass = true;
          delete item.chimeraCriticalMass;
          item.x = criticalMassPosition.x;
          item.y = criticalMassPosition.y;
          tokenItem.classList.add("critical-mass-token");
          tokenItem.classList.toggle("must-resolve", (Number(item.count) || 0) >= threshold);
        }
        tokenItem.classList.toggle(
          "auto-level-danger-per-hit",

        );

        tokenItem.style.setProperty("--token-top", `${item.y}%`);

        tokenItem.dataset.file = item.file;
        tokenItem.title = isCriticalMass
          ? `临界质量通用标记 ×${item.count}${(Number(item.count) || 0) >= threshold ? "，立即处理" : ""}`
          : `${item.file} ×${item.count}，拖动可调整位置`;

          badge.className = "panel-token-count";

          tokenItem.appendChild(badge);

        if (!isCriticalMass) {
          makePanelTokenDraggable(tokenItem);
        } else {
          tokenItem.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            handleCriticalMassTokenClick();

    function renderCriticalMassSlot() {

        ? "点击放置 1 个临界质量通用标记"
        : "使徒达到 II 级后可使用";

    function makePanelTokenDraggable(tokenItem) {
      tokenItem.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        const frame = panelWrap.querySelector(".panel-frame");
        if (!frame) return;
        tokenItem.setPointerCapture(event.pointerId);
        const startX = event.clientX;
        const startY = event.clientY;
        tokenItem.dataset.dragged = "false";

        const move = (moveEvent) => {
          if (Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY) > 4) {
            tokenItem.dataset.dragged = "true";
          }
          const rect = frame.getBoundingClientRect();
          const x = Math.max(0, Math.min(100, ((moveEvent.clientX - rect.left) / rect.width) * 100));
          const y = Math.max(0, Math.min(100, ((moveEvent.clientY - rect.top) / rect.height) * 100));
          tokenItem.style.setProperty("--token-left", `${x}%`);
          tokenItem.style.setProperty("--token-top", `${y}%`);
        };

        const up = (upEvent) => {
          tokenItem.releasePointerCapture(upEvent.pointerId);
          tokenItem.removeEventListener("pointermove", move);
          tokenItem.removeEventListener("pointerup", up);
          tokenItem.removeEventListener("pointercancel", up);
          const left = parseFloat(tokenItem.style.getPropertyValue("--token-left"));
          const top = parseFloat(tokenItem.style.getPropertyValue("--token-top"));
          const item = piles[currentApostle].tokens.find((entry) => entry.id === tokenItem.dataset.tokenId);
          if (item) {
            item.x = left;
            item.y = top;
            savePiles();
          }
          if (tokenItem.dataset.dragged !== "true") {
            const img = tokenItem.querySelector("img");
            tokenItem.dataset.zoomHandled = "true";
            openZoomForImage(img);
          }
        };

        tokenItem.addEventListener("pointermove", move);
        tokenItem.addEventListener("pointerup", up);
        tokenItem.addEventListener("pointercancel", up);
      });
    }

    function renderPanelImage(base, name) {
      const img = imageOrMessage(`${base}/${name}.jpg`, `${name} panel`, "panel-image");
      const frame = document.createElement("div");
      frame.className = "panel-frame";

      const tokenLayer = document.createElement("div");
      tokenLayer.className = "panel-token-layer";

      if (name === nietzscheName || name === cyclonusName || name === chimeraName) {
        const marker = document.createElement("button");
        marker.type = "button";
        marker.className = "panel-state-marker";
        marker.addEventListener("click", cycleNietzscheState);
        if (criticalMassApostles.has(name)) {
          const criticalMassSlot = document.createElement("button");
          criticalMassSlot.type = "button";
          criticalMassSlot.className = "critical-mass-slot";
          criticalMassSlot.textContent = "+";
          criticalMassSlot.addEventListener("click", addCriticalMassFromSlot);
          frame.append(img, tokenLayer, marker, criticalMassSlot);
        } else {
          frame.append(img, tokenLayer, marker);
        }
        panelWrap.replaceChildren(frame);
        updateNietzscheStateUi(marker);
      } else {
        frame.append(img, tokenLayer);
        panelWrap.replaceChildren(frame);
        updateNietzscheStateUi();
      }

      renderPanelTokens();
    }

    function renderFlipCard(wrap, base, name, kind) {
      const frontSrc = `${base}/${name}_${kind}_X_001.jpg`;
      const backSrc = `${base}/${name}_${kind}_X_001_BACK.jpg`;
      const label = kind.toLowerCase();
      const img = imageOrMessage(frontSrc, `${name} ${label}`, "side-card-image");
      img.id = `${kind.toLowerCase()}CardImage`;
      img.dataset.frontSrc = frontSrc;
      img.dataset.backSrc = backSrc;
      img.dataset.face = "front";
      img.title = "点击放大，放大后可翻面";
      wrap.replaceChildren(img);
    }

    function cycleNietzscheState() {
      if (!hasManualPanelState()) return;
      if (isCyclonus()) {
        cyclonusStateIndex = (cyclonusStateIndex + cyclonusStates.length - 1) % cyclonusStates.length;
        localStorage.setItem(cyclonusStateKey, String(cyclonusStateIndex));
      } else {
        nietzscheStateIndex = (nietzscheStateIndex + 1) % nietzscheStates.length;
        localStorage.setItem(nietzscheStateKey, String(nietzscheStateIndex));
      }
      const marker = panelWrap.querySelector(".panel-state-marker");
      updateNietzscheStateUi(marker);
    }

    function renderApostle(name) {
      currentApostle = name;
      ensurePiles(name);
      applyCurrentApostleLevelBonuses();
      updateAiViewTabs();
      updateBpViewTabs();
      const base = `ps/${name}`;
      renderApostleTitle();
      folderPath.textContent = base;
      if (window.location.hash !== `#${name}`) {
        history.replaceState(null, "", `#${name}`);
      }

      renderPanelImage(base, name);
      renderFlipCard(routineWrap, base, name, "ROUTINE");
      renderFlipCard(signatureWrap, base, name, "SIGNATURE");

      document.querySelectorAll(".nav button").forEach((button) => {
        button.classList.toggle("active", button.dataset.name === name);
      });

      renderAibpCards();
      renderExtraCards();
      requestAnimationFrame(updateViewerScale);
    }

    function drawAi(remember = true) {
      ensurePiles(currentApostle);
      const ai = piles[currentApostle].AI;
      if (ai.pending) return;
      if (ai.deck.length === 0 && ai.discard.length === 0) return;

      if (remember) {
        rememberUndo(currentApostle, "AI");
      }
      if (ai.deck.length === 0 && ai.discard.length > 0) {
        ai.deck = shuffleCards(ai.discard);
        ai.discard = [];
        savePiles();
      }

      if (ai.deck.length === 0) {
        if (remember) {
          undoStacks[currentApostle].pop();
        }
        updateUndoButtons();
        return;
      }
      ai.pending = ai.deck[0];
      savePiles();
      renderAibpCards();
      const drawnCard = ai.pending;
      const drawnApostle = currentApostle;
      openImageZoom(cardSrc(drawnCard), "抽取的 AI", () => {
        if (currentApostle !== drawnApostle) return;
        const pending = piles[currentApostle]?.AI?.pending;
        if (!pending || pending.level !== drawnCard.level || pending.index !== drawnCard.index) return;
        discardAiPending(false);
      }, {
        noticeLayout: "sides",
        cardTokens: currentPanelCardTokens("AI"),
        noticeImages: drawnApostle === chimeraName
          ? [
              {
                src: "ps/CHIMERA_METASTASIOS/CHIMERA_METASTASIOS_TR_I_002.jpg",
                alt: "来势汹汹特性卡"
              },
              {
                src: "ps/CHIMERA_METASTASIOS/CHIMERA_METASTASIOS_TR_I_001.jpg",
                alt: "黏糊留痕特性卡"
              }
            ]
          : []
      });
    }

    function drawBp() {
      ensurePiles(currentApostle);
      const bp = piles[currentApostle].BP;
      if (bp.pending) return;
      if (bp.deck.length === 0 && bp.discard.length === 0) return;

      rememberUndo(currentApostle, "BP");
      if (bp.deck.length === 0 && bp.discard.length > 0) {
        bp.deck = shuffleCards(bp.discard);
        bp.discard = [];
        savePiles();
      }

      if (bp.deck.length === 0) {
        undoStacks[currentApostle].pop();
        updateUndoButtons();
        return;
      }
      bp.pending = bp.deck[0];
      savePiles();
      renderAibpCards();
      openImageZoom(cardSrc(bp.pending), "抽取的 BP", null, {
        bpActions: true,
        cardTokens: currentPanelCardTokens("BP"),
        noticeImages: currentChimeraStatusImages()
      });
    }

    function removePendingFromDeck(type) {
      const pile = piles[currentApostle][type];
      const pending = pile.pending;
      if (!pending) return null;

      const first = pile.deck[0];
      if (sameCard(first, pending)) {
        return pile.deck.shift();
      }

      const index = pile.deck.findIndex((card) => sameCard(card, pending));
      if (index >= 0) {
        return pile.deck.splice(index, 1)[0];
      }

      return pending;
    }

    function resolveBp(mode) {
      ensurePiles(currentApostle);
      const bp = piles[currentApostle].BP;
      if (!bp.pending) return;

      rememberUndo(currentApostle, "BP");
      const card = removePendingFromDeck("BP");
      bp.pending = null;

      if (card?.specialBp) {
        bp.removed.push(card);
        currentBpView = "移除";
      } else if (mode === "discard") {
        bp.discard.push(card);
      } else if (mode === "defeat") {
        setChimeraPhaseFromCard(card);
        resolveBpDefeat(card);
      } else if (mode === "vp-defeat") {
        setChimeraPhaseFromCard(card);
        resolveBpDefeat(card);
        addChimeraSecondDamage({ special: "SW" });
      } else if (mode === "critical") {
        setChimeraPhaseFromCard(card);
        resolveBpCritical(card);
      }

      savePiles();
      renderAibpCards();
    }

    function discardAiPending(remember = true) {
      ensurePiles(currentApostle);
      const ai = piles[currentApostle].AI;
      if (!ai.pending) return;

      if (remember) {
        rememberUndo(currentApostle, "AI");
      }
      const first = ai.deck[0];
      if (first && first.level === ai.pending.level && first.index === ai.pending.index) {
        ai.discard.push(ai.deck.shift());
      } else {
        ai.discard.push(ai.pending);
        ai.deck = ai.deck.filter((card) => card !== ai.pending);
      }
      ai.pending = null;
      savePiles();
      renderAibpCards();
    }

    function confirmAiDiscard() {
      discardAiPending(true);
    }

    function updateViewerScale() {
      const main = document.querySelector("main");
      const titleRow = document.querySelector(".title-row");
      const availableWidth = Math.max(360, main.clientWidth - 36);
      const availableHeight = Math.max(420, window.innerHeight - titleRow.offsetHeight - 70);

      const sideByHeight = (availableHeight - 2 * 38 - 4 * 8 - 14) / panelRatio;
      const sideByWidth = availableWidth / 5.55;
      const baseSideHeight = Math.max(165, Math.min(sideByHeight, sideByWidth, 380));
      const sideHeight = baseSideHeight * 1.1;
      const panelHeight = baseSideHeight * panelRatio * 1.018;

      // 只放大惯常、标志、其他卡牌、AI/BP 卡牌；面板保持原尺寸。
      document.documentElement.style.setProperty("--side-card-image-height", `${sideHeight}px`);
      document.documentElement.style.setProperty("--panel-image-height", `${panelHeight}px`);
    }

    apostles.forEach((name) => {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.name = name;
      button.textContent = name.replaceAll("_", " ");
      button.addEventListener("click", () => renderApostle(name));
      nav.appendChild(button);
    });

    aiViews.forEach((view) => {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.view = view;
      button.textContent = view;
      button.addEventListener("click", () => {
        if (view === "当前" && !confirmCurrentView()) return;
        currentAiView = view;
        renderAibpCards();
      });
      aiViewTabs.appendChild(button);
    });

    document.addEventListener("click", (event) => {
      const img = event.target.closest("img");
      if (!shouldZoomImage(img)) return;
      const tokenItem = img.closest(".panel-token-item");
      if (tokenItem && tokenItem.dataset.dragged === "true") {
        tokenItem.dataset.dragged = "false";
        return;
      }
      if (tokenItem && tokenItem.dataset.zoomHandled === "true") {
        tokenItem.dataset.zoomHandled = "false";
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      openZoomForImage(img);
    });

    imageZoomOverlay.addEventListener("click", closeImageZoom);
    imageZoomClose.addEventListener("click", (event) => {
      event.stopPropagation();
      closeImageZoom();
    });
    imageZoomImg.addEventListener("click", (event) => event.stopPropagation());
    imageZoomNotice.addEventListener("click", (event) => event.stopPropagation());
    imageZoomFlipActions.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = event.target.closest("#imageZoomFlipButton");
      if (!button || button.disabled) return;
      const showingBack = button.dataset.face === "back";
      const nextFace = showingBack ? "front" : "back";
      const nextSrc = showingBack ? button.dataset.frontSrc : button.dataset.backSrc;
      imageZoomImg.src = nextSrc;
      button.dataset.face = nextFace;
      button.textContent = showingBack ? "反面" : "正面";

      const sourceImg = document.getElementById(button.dataset.sourceId || "");
      if (sourceImg) {
        sourceImg.src = nextSrc;
        sourceImg.dataset.face = nextFace;
        sourceImg.alt = sourceImg.alt.replace(/\s+(front|back)$/, "") + ` ${nextFace}`;
      }
    });
    imageZoomBpActions.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = event.target.closest("[data-bp-zoom-action]");
      if (!button || button.disabled) return;
      const action = button.dataset.bpZoomAction;
      resolveBp(action);
      closeImageZoom();
    });
    imageZoomMoveActions.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = event.target.closest("[data-move-target-index]");
      if (!button || !activeMoveContext) return;
      const target = activeMoveContext.targets?.[Number(button.dataset.moveTargetIndex)];
      if (!target) return;
      moveVisibleCard(activeMoveContext, target);
      closeImageZoom();
    });
    imageZoomTokenActions.addEventListener("click", (event) => {
      event.stopPropagation();
      const button = event.target.closest("[data-token-zoom-action]");
      if (!button || button.disabled) return;
      changeZoomTokenCount(button.dataset.tokenZoomAction);
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && imageZoomOverlay.classList.contains("show")) {
        closeImageZoom();
      }
    });

    bpDamageTargetSelect.addEventListener("change", () => {
      if (isChimera()) {
        currentBpView = currentBpDamageView();
        renderAibpCards();
      }
    });
    apostleLevelSelect.addEventListener("change", () => {
      if (fixedLevelOneApostles.has(currentApostle)) return;
      const level = Number(apostleLevelSelect.value);
      if (level >= 1 && level <= 5) {
        apostleLevelOverrides[currentApostle] = level;
      } else {
        delete apostleLevelOverrides[currentApostle];
      }
      saveApostleLevelOverrides();
      renderApostleTitle();
      applyCurrentApostleLevelBonuses();
      renderCriticalMassSlot();
      renderExtraCards();
      renderAibpCards();
      renderPanelTokens();
    });
    sidebarToggle.addEventListener("click", () => {
      const collapsed = document.body.classList.toggle("sidebar-collapsed");
      sidebarToggle.textContent = collapsed ? "☰" : "×";
      sidebarToggle.setAttribute("aria-label", collapsed ? "展开左侧边栏" : "折叠左侧边栏");
      window.setTimeout(updateViewerScale, 80);
    });
    nietzscheStateButton.addEventListener("click", cycleNietzscheState);
    traitButton.addEventListener("click", openTraitDialog);
    tokenButton.addEventListener("click", openTokenDialog);
    traitCloseButton.addEventListener("click", () => traitDialog.close());
    traitClearButton.addEventListener("click", clearTraitSelection);
    traitSaveButton.addEventListener("click", saveTraitSelection);
    tokenCloseButton.addEventListener("click", () => tokenDialog.close());
    tokenClearButton.addEventListener("click", clearTokenSelection);
    tokenSaveButton.addEventListener("click", saveTokenSelection);
    newCampaignButton.addEventListener("click", startNewCampaign);
    drawAiButton.addEventListener("click", drawAi);
    aiDrawPreview.addEventListener("click", () => {
      if (!piles[currentApostle]?.AI?.pending) drawAi();
    });
    undoAiButton.addEventListener("click", () => undoLastAibp("AI"));
    confirmAiButton.addEventListener("click", confirmAiDiscard);
    promoteAiSingleButton.addEventListener("click", () => promoteSinglePile("AI"));
    drawFlareButton.addEventListener("click", drawFlare);
    drawBpButton.addEventListener("click", drawBp);
    bpDrawPreview.addEventListener("click", () => {
      if (!piles[currentApostle]?.BP?.pending) drawBp();
    });
    undoBpButton.addEventListener("click", () => undoLastAibp("BP"));
    discardBpButton.addEventListener("click", () => resolveBp("discard"));
    defeatBpButton.addEventListener("click", () => resolveBp("defeat"));
    criticalBpButton.addEventListener("click", () => resolveBp("critical"));
    addSwButton.addEventListener("click", () => addBpSpecialDamage("SW"));
    addDwButton.addEventListener("click", () => addBpSpecialDamage("DW"));
    addSwDamage2Button.addEventListener("click", addChimeraDamage2Sw);
    removeSwDamage2Button.addEventListener("click", removeChimeraDamage2Sw);
    addLabyrinthaurosSpecialBpButton.addEventListener("click", addLabyrinthaurosSpecialBp);
    removeLabyrinthaurosSpecialBpButton.addEventListener("click", removeLabyrinthaurosSpecialBp);
    promoteBpSingleButton.addEventListener("click", () => promoteSinglePile("BP"));
    promoteBpButton.addEventListener("click", promoteBpByRemovingLowest);
    window.addEventListener("resize", updateViewerScale);
    window.addEventListener("focus", refreshRecordApostleLevels);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) refreshRecordApostleLevels();
    });
    loadSavedPiles();
    renderApostle(currentApostle);
    refreshRecordApostleLevels();
  </script>
  <script src="ps/other/resouce/bp_resource_map.js"></script>
  <script src="ps/other/resouce/bp_resource_map_c1_c3.js"></script>
  <script src="bp_loot_calculator_addon.js?v=20260608-shared-record-resources"></script>
</body>
